name: "Runtime Hermes: PR"

run-name: >-
  Runtime Hermes PR #${{ github.event.number }} → ${{ github.event.pull_request.base.ref }}
  ${{ github.event.action == 'closed' && github.event.pull_request.merged && '(merged)' || '' }}

on:
  pull_request:
    types: [opened, synchronize, closed]
    paths:
      - 'runtime/hermes/**'
      - 'runtime/shared/**'
      - 'runtime/package.json'
      - '!runtime/CHANGELOG.md'

concurrency:
  group: runtime-hermes-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  packages: write

jobs:
  build:
    name: Build Hermes runtime image
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      pending: ${{ steps.meta.outputs.pending }}
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        run: |
          SHA="$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)"
          TAG="pr-${{ github.event.number }}"
          VERSION="$(jq -r '.version // "unknown"' runtime/package.json 2>/dev/null || echo 'unknown')"
          echo "pending=pending-$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=sha-$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: "Build and push v${{ steps.meta.outputs.version }} (:pending-${{ steps.meta.outputs.sha }})"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtime/hermes/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/xmtplabs/convos-runtime-hermes:${{ steps.meta.outputs.pending }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: "Smoke tests (:${{ needs.build.outputs.pending }})"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Pull :${{ needs.build.outputs.pending }}"
        run: docker pull ghcr.io/xmtplabs/convos-runtime-hermes:${{ needs.build.outputs.pending }}

      - name: Start container
        run: |
          docker run -d --name qa-runtime \
            -p 8080:8080 \
            -e PORT=8080 \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e OPENCLAW_GATEWAY_TOKEN="${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" \
            -e OPENCLAW_PRIMARY_MODEL="${{ secrets.OPENCLAW_PRIMARY_MODEL }}" \
            -e XMTP_ENV="${{ secrets.XMTP_ENV }}" \
            -e CONVOS_API_KEY="${{ secrets.CONVOS_API_KEY }}" \
            ghcr.io/xmtplabs/convos-runtime-hermes:${{ needs.build.outputs.pending }}

      - name: Wait for health (up to 120s)
        run: |
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/pool/health | grep -q '"ready":true'; then
              echo "Ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:8080/pool/health | grep -q '"ready":true'; then
            echo "Failed to start"
            docker logs qa-runtime
            exit 1
          fi

      - name: Dump logs
        if: always()
        run: docker logs qa-runtime

  eval:
    name: "Eval: ${{ matrix.suite }}"
    needs: build
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: knows
            timeout: 180
          - suite: skills
            timeout: 300
          - suite: soul
            timeout: 180
          - suite: convos
            timeout: 600
          - suite: async
            timeout: 120
          - suite: memory
            timeout: 300
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Start container (:${{ needs.build.outputs.pending }})"
        run: |
          docker pull ghcr.io/xmtplabs/convos-runtime-hermes:${{ needs.build.outputs.pending }}
          docker run -d --name eval-runtime \
            -p 8080:8080 \
            -v ${{ github.workspace }}/runtime/evals:/app/evals \
            -e PORT=8080 \
            -e EVAL_MODE=1 \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e OPENCLAW_GATEWAY_TOKEN="${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" \
            -e OPENCLAW_PRIMARY_MODEL="${{ secrets.OPENCLAW_PRIMARY_MODEL }}" \
            -e XMTP_ENV="${{ secrets.XMTP_ENV }}" \
            -e CONVOS_API_KEY="${{ secrets.CONVOS_API_KEY }}" \
            -e POOL_URL="${{ secrets.POOL_URL }}" \
            -e INSTANCE_ID="${{ secrets.INSTANCE_ID }}" \
            ghcr.io/xmtplabs/convos-runtime-hermes:${{ needs.build.outputs.pending }}

      - name: Wait for health
        run: |
          SECONDS=0
          while (( SECONDS < 120 )); do
            if curl -sf http://localhost:8080/pool/health | grep -q '"ready":true'; then
              echo "Ready after ${SECONDS}s"
              exit 0
            fi
            sleep 0.25
          done
          echo "Failed to start within 120s"
          docker logs eval-runtime
          exit 1

      - name: "Run ${{ matrix.suite }} suite"
        run: |
          docker exec \
            -e EVAL_OPENROUTER_API_KEY=${{ secrets.EVAL_OPENROUTER_API_KEY }} \
            eval-runtime timeout ${{ matrix.timeout }} \
              pnpm evals:hermes:${{ matrix.suite }}

      - name: Dump container logs
        if: always()
        run: docker logs eval-runtime

  publish:
    name: "Publish v${{ needs.build.outputs.version }}"
    needs: [build, smoke-test, eval]
    if: always() && needs.build.result == 'success' && needs.smoke-test.result == 'success' && needs.eval.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Pull :${{ needs.build.outputs.pending }}"
        run: docker pull ghcr.io/xmtplabs/convos-runtime-hermes:${{ needs.build.outputs.pending }}

      - name: "Tag and push v${{ needs.build.outputs.version }} (:${{ needs.build.outputs.sha }}, :pr-${{ github.event.number }})"
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
          PENDING="${{ needs.build.outputs.pending }}"
          SHA="${{ needs.build.outputs.sha }}"

          docker tag "$IMAGE:$PENDING" "$IMAGE:$SHA"
          docker push "$IMAGE:$SHA"
          echo "Pushed $IMAGE:$SHA"

          docker tag "$IMAGE:$PENDING" "$IMAGE:pr-${{ github.event.number }}"
          docker push "$IMAGE:pr-${{ github.event.number }}"
          echo "Pushed $IMAGE:pr-${{ github.event.number }}"

  promote:
    name: Promote on merge
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Map branch → environment tag"
        id: env
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          VERSION="$(jq -r '.version // "unknown"' runtime/package.json 2>/dev/null || echo 'unknown')"
          case "$BASE" in
            dev)     echo "tag=dev" >> "$GITHUB_OUTPUT" ;;
            staging) echo "tag=staging" >> "$GITHUB_OUTPUT" ;;
            main)    echo "tag=production" >> "$GITHUB_OUTPUT" ;;
            *)       echo "tag=" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: "Verify source image exists"
        id: verify
        if: steps.env.outputs.tag != ''
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
          SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          if skopeo inspect --authfile "$HOME/.docker/config.json" "docker://$IMAGE:sha-$SHA" > /dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Source image $IMAGE:sha-$SHA exists"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Source image $IMAGE:sha-$SHA not found — skipping promote (no runtime/hermes/ changes were built for this PR)"
          fi

      - name: "Promote v${{ steps.env.outputs.version }} → :${{ steps.env.outputs.tag }}"
        if: steps.env.outputs.tag != '' && steps.verify.outputs.found == 'true'
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
          SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          ENV_TAG="${{ steps.env.outputs.tag }}"

          echo "Promoting v${{ steps.env.outputs.version }}: $IMAGE:sha-$SHA → $IMAGE:$ENV_TAG"
          docker pull "$IMAGE:sha-$SHA"
          docker tag "$IMAGE:sha-$SHA" "$IMAGE:$ENV_TAG"
          docker push "$IMAGE:$ENV_TAG"

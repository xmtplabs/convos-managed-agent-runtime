name: "Runtime: Eval"

run-name: "Runtime eval → ${{ github.ref_name }}"

on:
  workflow_dispatch:

jobs:
  eval:
    name: "E2E eval"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CHROMIUM_PATH: /usr/bin/chromium

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            chromium \
            fonts-liberation libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdrm2 libgbm1 libnspr4 libnss3 libxcomposite1 libxdamage1 libxfixes3 \
            libxkbcommon0 libxrandr2 xdg-utils

      - name: Enable pnpm + install deps
        working-directory: runtime
        run: |
          corepack enable
          pnpm install --no-frozen-lockfile

      - name: Write .env
        working-directory: runtime
        run: |
          cat > .env <<'DOTENV'
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          BANKR_API_KEY=${{ secrets.BANKR_API_KEY }}
          OPENCLAW_GATEWAY_TOKEN=${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          OPENCLAW_PRIMARY_MODEL=${{ secrets.OPENCLAW_PRIMARY_MODEL }}
          XMTP_ENV=${{ secrets.XMTP_ENV }}
          CONVOS_API_KEY=${{ secrets.CONVOS_API_KEY }}
          EVAL_OPENROUTER_API_KEY=${{ secrets.EVAL_OPENROUTER_API_KEY }}
          DOTENV

      - name: Start gateway
        working-directory: runtime
        run: |
          pnpm start &
          for i in $(seq 1 120); do
            if curl -sf http://localhost:18789/__openclaw__/canvas/ > /dev/null; then
              echo "Gateway ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Gateway failed to start within 120s"
          exit 1

      - name: "Eval: prompt (parallel)"
        working-directory: runtime
        run: timeout 300 pnpm evals:prompt
        env:
          EVAL_OPENROUTER_API_KEY: ${{ secrets.EVAL_OPENROUTER_API_KEY }}

      - name: "Eval: convos (sequential)"
        working-directory: runtime
        run: timeout 600 pnpm evals:convos
        env:
          EVAL_OPENROUTER_API_KEY: ${{ secrets.EVAL_OPENROUTER_API_KEY }}

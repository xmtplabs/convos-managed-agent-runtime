name: "Runtime: Manual Build"

run-name: "Runtime dispatch → :${{ inputs.tag }} (${{ inputs.runtime }}, from ${{ github.ref_name }})"

on:
  workflow_dispatch:
    inputs:
      runtime:
        description: 'Which runtime to build'
        required: true
        type: choice
        options:
          - both
          - openclaw
          - hermes
      tag:
        description: 'Image tag to publish (e.g. dev, staging, production)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  packages: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Compute SHA and version
        id: meta
        run: |
          SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          VERSION="$(jq -r '.version' runtime/package.json)"
          echo "sha=sha-$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building v$VERSION (sha-$SHA) from ${{ github.ref_name }}"

  # ── OpenClaw pipeline ──────────────────────────────────────────────

  build-openclaw:
    name: "Build OpenClaw"
    needs: prepare
    if: inputs.runtime == 'openclaw' || inputs.runtime == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Build and push v${{ needs.prepare.outputs.version }} (:pending-${{ needs.prepare.outputs.sha }})"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtime/openclaw/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/xmtplabs/convos-runtime:pending-${{ needs.prepare.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  eval-openclaw:
    name: "Eval OpenClaw: ${{ matrix.suite }}"
    needs: [prepare, build-openclaw]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: knows
            timeout: 180
          - suite: skills
            timeout: 300
          - suite: soul
            timeout: 180
          - suite: convos
            timeout: 600
          - suite: async
            timeout: 120
          - suite: memory
            timeout: 300
          - suite: poller
            timeout: 300
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Start container (:pending-${{ needs.prepare.outputs.sha }})"
        run: |
          docker pull ghcr.io/xmtplabs/convos-runtime:pending-${{ needs.prepare.outputs.sha }}
          docker run -d --name eval-runtime \
            -p 8080:8080 \
            -e PORT=8080 \
            -e OPENCLAW_STATE_DIR=/app \
            -e EVAL_MODE=1 \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e BANKR_API_KEY="${{ secrets.BANKR_API_KEY }}" \
            -e OPENCLAW_GATEWAY_TOKEN="${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" \
            -e OPENCLAW_PRIMARY_MODEL="${{ secrets.OPENCLAW_PRIMARY_MODEL }}" \
            -e XMTP_ENV="${{ secrets.XMTP_ENV }}" \
            -e CONVOS_API_KEY="${{ secrets.CONVOS_API_KEY }}" \
            -e POOL_URL="${{ secrets.POOL_URL }}" \
            -e INSTANCE_ID="${{ secrets.INSTANCE_ID }}" \
            -e AGENTMAIL_INBOX_ID="${{ secrets.AGENTMAIL_INBOX_ID }}" \
            ghcr.io/xmtplabs/convos-runtime:pending-${{ needs.prepare.outputs.sha }} \
            node scripts/pool-server.js

      - name: Wait for health
        run: |
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/pool/health | grep -q '"ready":true'; then
              echo "Ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Failed to start within 120s"
          docker logs eval-runtime
          exit 1

      - name: "Run ${{ matrix.suite }} suite"
        run: |
          docker exec \
            -e EVAL_OPENROUTER_API_KEY=${{ secrets.EVAL_OPENROUTER_API_KEY }} \
            -e EVALS_MODEL=${{ secrets.EVALS_MODEL }} \
            eval-runtime timeout ${{ matrix.timeout }} pnpm evals openclaw ${{ matrix.suite }}

      - name: Dump container logs
        if: always()
        run: docker logs eval-runtime

  publish-openclaw:
    name: "Publish OpenClaw v${{ needs.prepare.outputs.version }} → :${{ inputs.tag }}"
    needs: [prepare, eval-openclaw]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Tag and push v${{ needs.prepare.outputs.version }}"
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime"
          SHA="${{ needs.prepare.outputs.sha }}"
          TAG="${{ inputs.tag }}"

          docker pull "$IMAGE:pending-$SHA"
          docker tag "$IMAGE:pending-$SHA" "$IMAGE:$SHA"
          docker push "$IMAGE:$SHA"
          echo "Pushed $IMAGE:$SHA"

          docker tag "$IMAGE:pending-$SHA" "$IMAGE:$TAG"
          docker push "$IMAGE:$TAG"
          echo "Pushed v${{ needs.prepare.outputs.version }} as $IMAGE:$TAG"

  # ── Hermes pipeline ────────────────────────────────────────────────

  build-hermes:
    name: "Build Hermes"
    needs: prepare
    if: inputs.runtime == 'hermes' || inputs.runtime == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Build and push v${{ needs.prepare.outputs.version }} (:pending-${{ needs.prepare.outputs.sha }})"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtime/hermes/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/xmtplabs/convos-runtime-hermes:pending-${{ needs.prepare.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  eval-hermes:
    name: "Eval Hermes: ${{ matrix.suite }}"
    needs: [prepare, build-hermes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: knows
            timeout: 180
          - suite: skills
            timeout: 300
          - suite: soul
            timeout: 180
          - suite: convos
            timeout: 600
          - suite: async
            timeout: 120
          - suite: memory
            timeout: 300
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Start container (:pending-${{ needs.prepare.outputs.sha }})"
        run: |
          docker pull ghcr.io/xmtplabs/convos-runtime-hermes:pending-${{ needs.prepare.outputs.sha }}
          docker run -d --name eval-runtime \
            -p 8080:8080 \
            -v ${{ github.workspace }}/runtime/evals:/app/evals \
            -e PORT=8080 \
            -e EVAL_MODE=1 \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e OPENCLAW_GATEWAY_TOKEN="${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" \
            -e OPENCLAW_PRIMARY_MODEL="${{ secrets.OPENCLAW_PRIMARY_MODEL }}" \
            -e XMTP_ENV="${{ secrets.XMTP_ENV }}" \
            -e CONVOS_API_KEY="${{ secrets.CONVOS_API_KEY }}" \
            -e POOL_URL="${{ secrets.POOL_URL }}" \
            -e INSTANCE_ID="${{ secrets.INSTANCE_ID }}" \
            ghcr.io/xmtplabs/convos-runtime-hermes:pending-${{ needs.prepare.outputs.sha }}

      - name: Wait for health
        run: |
          SECONDS=0
          while (( SECONDS < 120 )); do
            if curl -sf http://localhost:8080/pool/health | grep -q '"ready":true'; then
              echo "Ready after ${SECONDS}s"
              exit 0
            fi
            sleep 0.25
          done
          echo "Failed to start within 120s"
          docker logs eval-runtime
          exit 1

      - name: "Run ${{ matrix.suite }} suite"
        run: |
          docker exec \
            -e EVAL_OPENROUTER_API_KEY=${{ secrets.EVAL_OPENROUTER_API_KEY }} \
            -e EVALS_MODEL=${{ secrets.EVALS_MODEL }} \
            eval-runtime timeout ${{ matrix.timeout }} \
              pnpm evals hermes ${{ matrix.suite }}

      - name: Dump container logs
        if: always()
        run: docker logs eval-runtime

  publish-hermes:
    name: "Publish Hermes v${{ needs.prepare.outputs.version }} → :${{ inputs.tag }}"
    needs: [prepare, eval-hermes]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Tag and push v${{ needs.prepare.outputs.version }}"
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
          SHA="${{ needs.prepare.outputs.sha }}"
          TAG="${{ inputs.tag }}"

          docker pull "$IMAGE:pending-$SHA"
          docker tag "$IMAGE:pending-$SHA" "$IMAGE:$SHA"
          docker push "$IMAGE:$SHA"
          echo "Pushed $IMAGE:$SHA"

          docker tag "$IMAGE:pending-$SHA" "$IMAGE:$TAG"
          docker push "$IMAGE:$TAG"
          echo "Pushed v${{ needs.prepare.outputs.version }} as $IMAGE:$TAG"

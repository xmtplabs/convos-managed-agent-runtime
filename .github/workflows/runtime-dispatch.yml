name: "Runtime: Manual Build"

run-name: "Runtime dispatch → :${{ inputs.tag }} (from ${{ github.ref_name }})"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. dev, staging, production)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
          - scaling

permissions:
  packages: write

jobs:
  build:
    name: "Build runtime image"
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute SHA
        id: meta
        run: |
          SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          echo "sha=sha-$SHA" >> "$GITHUB_OUTPUT"
          echo "Building sha-$SHA from ${{ github.ref_name }}"

      - name: "Build and push :pending-${{ steps.meta.outputs.sha }}"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtime/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/xmtplabs/convos-runtime:pending-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: "Smoke tests"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ghcr.io/xmtplabs/convos-runtime:pending-${{ needs.build.outputs.sha }}

      - name: Start container
        run: |
          docker run -d --name qa-runtime \
            -p 8080:8080 \
            -e PORT=8080 \
            -e OPENCLAW_STATE_DIR=/app \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e BANKR_API_KEY="${{ secrets.BANKR_API_KEY }}" \
            -e OPENCLAW_GATEWAY_TOKEN="${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" \
            -e OPENCLAW_PRIMARY_MODEL="${{ secrets.OPENCLAW_PRIMARY_MODEL }}" \
            -e XMTP_ENV="${{ secrets.XMTP_ENV }}" \
            -e POOL_URL="${{ secrets.POOL_URL }}" \
            -e INSTANCE_ID="${{ secrets.INSTANCE_ID }}" \
            ghcr.io/xmtplabs/convos-runtime:pending-${{ needs.build.outputs.sha }} \
            node scripts/pool-server.js

      - name: Wait for health (up to 120s)
        run: |
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/pool/health | grep -q '"ready":true'; then
              echo "Ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:8080/pool/health | grep -q '"ready":true'; then
            echo "Failed to start"
            docker logs qa-runtime
            exit 1
          fi
          sleep 15

      - name: Run smoke tests
        run: docker exec qa-runtime timeout 120 pnpm smoke

      - name: Dump logs
        if: always()
        run: docker logs qa-runtime

  publish:
    name: "Publish :${{ needs.build.outputs.sha }} → :${{ inputs.tag }}"
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Tag and push"
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime"
          SHA="${{ needs.build.outputs.sha }}"
          TAG="${{ inputs.tag }}"

          docker pull "$IMAGE:pending-$SHA"
          docker tag "$IMAGE:pending-$SHA" "$IMAGE:$SHA"
          docker push "$IMAGE:$SHA"
          echo "Pushed $IMAGE:$SHA"

          docker tag "$IMAGE:pending-$SHA" "$IMAGE:$TAG"
          docker push "$IMAGE:$TAG"
          echo "Pushed $IMAGE:$TAG"

  eval:
    name: "E2E eval (non-blocking)"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ghcr.io/xmtplabs/convos-runtime:pending-${{ needs.build.outputs.sha }}

      - name: Start container
        run: |
          docker run -d --name eval-runtime \
            -p 8080:8080 \
            -e PORT=8080 \
            -e OPENCLAW_STATE_DIR=/app \
            -e EVAL_MODE=1 \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e BANKR_API_KEY="${{ secrets.BANKR_API_KEY }}" \
            -e OPENCLAW_GATEWAY_TOKEN="${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" \
            -e OPENCLAW_PRIMARY_MODEL="${{ secrets.OPENCLAW_PRIMARY_MODEL }}" \
            -e XMTP_ENV="${{ secrets.XMTP_ENV }}" \
            -e POOL_URL="${{ secrets.POOL_URL }}" \
            -e INSTANCE_ID="${{ secrets.INSTANCE_ID }}" \
            ghcr.io/xmtplabs/convos-runtime:pending-${{ needs.build.outputs.sha }} \
            node scripts/pool-server.js

      - name: Wait for health (up to 120s)
        run: |
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/pool/health | grep -q '"ready":true'; then
              echo "Ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:8080/pool/health | grep -q '"ready":true'; then
            echo "Failed to start"
            docker logs eval-runtime
            exit 1
          fi
          sleep 15

      - name: "Eval: prompt (parallel)"
        id: eval-prompt
        continue-on-error: true
        run: |
          set +e
          docker exec \
            -e EVAL_OPENROUTER_API_KEY=$EVAL_OPENROUTER_API_KEY \
            eval-runtime timeout 300 pnpm evals:prompt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        env:
          EVAL_OPENROUTER_API_KEY: ${{ secrets.EVAL_OPENROUTER_API_KEY }}

      - name: "Eval: convos (sequential)"
        id: eval-convos
        continue-on-error: true
        run: |
          set +e
          docker exec \
            -e EVAL_OPENROUTER_API_KEY=$EVAL_OPENROUTER_API_KEY \
            eval-runtime timeout 600 pnpm evals:convos
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        env:
          EVAL_OPENROUTER_API_KEY: ${{ secrets.EVAL_OPENROUTER_API_KEY }}

      - name: "Eval: check results"
        if: always()
        run: |
          PROMPT=${{ steps.eval-prompt.outputs.exit_code || '1' }}
          CONVOS=${{ steps.eval-convos.outputs.exit_code || '1' }}
          echo "Prompt eval: exit $PROMPT"
          echo "Convos eval: exit $CONVOS"
          if [ "$PROMPT" != "0" ] || [ "$CONVOS" != "0" ]; then
            echo "::warning::Eval failed — prompt=$PROMPT convos=$CONVOS"
          fi

      - name: Dump logs
        if: always()
        run: docker logs eval-runtime

name: "Runtime: Manual Build"

run-name: "Runtime dispatch → :${{ inputs.tag }} (${{ inputs.runtime }}, from ${{ github.ref_name }})"

on:
  workflow_dispatch:
    inputs:
      runtime:
        description: 'Which runtime to build'
        required: true
        type: choice
        options:
          - both
          - openclaw
          - hermes
      tag:
        description: 'Image tag to publish (e.g. dev, staging, production)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  packages: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.meta.outputs.version }}
      pending: ${{ steps.meta.outputs.pending }}
    steps:
      - uses: actions/checkout@v5
      - id: meta
        run: |
          SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          VERSION="$(jq -r '.version' runtime/package.json)"
          echo "sha=sha-$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pending=pending-$SHA" >> "$GITHUB_OUTPUT"

  openclaw:
    name: OpenClaw
    needs: prepare
    if: inputs.runtime == 'openclaw' || inputs.runtime == 'both'
    uses: ./.github/workflows/runtime-pipeline.yml
    secrets: inherit
    with:
      runtime: openclaw
      image: ghcr.io/xmtplabs/convos-runtime
      dockerfile: runtime/harness/openclaw/Dockerfile
      pending_tag: ${{ needs.prepare.outputs.pending }}
      publish_tags: "${{ needs.prepare.outputs.sha }} ${{ inputs.tag }}"
      health_path: "/__openclaw__/canvas/"
      docker_run_extra: "-e OPENCLAW_STATE_DIR=/app"
      docker_cmd: "node src/pool-server.js"
      buildx_driver: docker
      cache_from: type=gha
      cache_to: "type=gha,mode=max"

  hermes:
    name: Hermes
    needs: prepare
    if: inputs.runtime == 'hermes' || inputs.runtime == 'both'
    uses: ./.github/workflows/runtime-pipeline.yml
    secrets: inherit
    with:
      runtime: hermes
      image: ghcr.io/xmtplabs/convos-runtime-hermes
      dockerfile: runtime/harness/hermes/Dockerfile
      pending_tag: ${{ needs.prepare.outputs.pending }}
      publish_tags: "${{ needs.prepare.outputs.sha }} ${{ inputs.tag }}"
      needs_checkout: true

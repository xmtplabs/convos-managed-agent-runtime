name: "Runtime: PR"

run-name: >-
  Runtime PR #${{ github.event.number }} → ${{ github.event.pull_request.base.ref }}
  ${{ github.event.action == 'closed' && github.event.pull_request.merged && '(merged)' || '' }}

on:
  pull_request:
    types: [opened, synchronize, closed]
    paths:
      - 'runtime/**'
      - '!runtime/*.md'
      - '!runtime/evals/**'

concurrency:
  group: runtime-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  packages: write

jobs:
  # ── Check eval stamp ────────────────────────────────────────────────
  # On promotion branches (staging, main) the same code was already built
  # and eval'd on dev. If the published image exists in GHCR, skip evals —
  # an image only gets published after all evals pass, so its presence IS
  # the green stamp.
  #
  # How images are found:
  #   We walk `git log %H %P` to collect commit + parent SHAs, then check
  #   GHCR for sha-<short> tags. The promote-on-merge job re-tags images
  #   with the merge commit SHA on the target branch, so even squash-merged
  #   PRs (where the original PR head SHA is lost) leave a findable tag.
  check-stamp:
    name: Check eval stamp
    if: github.event.action != 'closed' && github.event.pull_request.base.ref != 'dev'
    runs-on: ubuntu-latest
    outputs:
      openclaw_stamped: ${{ steps.check.outputs.openclaw }}
      hermes_stamped: ${{ steps.check.outputs.hermes }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 20
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - name: Check for published images
        id: check
        run: |
          AUTH="$HOME/.docker/config.json"

          # Collect candidate SHAs: list commits AND their parents.
          # Merge commits on promotion branches rewrite the SHA, so the
          # original PR head commit (where the image was published) only
          # appears as a parent of the merge commit, not in the linear log.
          SEEN=()
          while IFS= read -r LINE; do
            for SHA in $LINE; do
              SHORT=$(echo "$SHA" | cut -c1-7)
              SEEN+=("sha-$SHORT")
            done
          done < <(git log --format='%H %P' -n 20 HEAD)
          # deduplicate
          CANDIDATES=($(printf '%s\n' "${SEEN[@]}" | sort -u))
          echo "Candidates: ${CANDIDATES[*]}"

          for runtime in openclaw hermes; do
            if [ "$runtime" = "openclaw" ]; then
              IMAGE="ghcr.io/xmtplabs/convos-runtime"
            else
              IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
            fi

            FOUND=false
            for SHA in "${CANDIDATES[@]}"; do
              if skopeo inspect --authfile "$AUTH" "docker://$IMAGE:$SHA" > /dev/null 2>&1; then
                echo "$runtime=true" >> "$GITHUB_OUTPUT"
                echo "✓ $runtime image $SHA exists — evals already passed"
                FOUND=true
                break
              fi
            done
            if [ "$FOUND" = "false" ]; then
              echo "$runtime=false" >> "$GITHUB_OUTPUT"
              echo "✗ $runtime image not found in candidates: ${CANDIDATES[*]}"
            fi
          done

      - name: Annotate skipped evals
        if: steps.check.outputs.openclaw == 'true' || steps.check.outputs.hermes == 'true'
        run: |
          echo "## ⏭️ Eval stamp found" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Image already passed evals on \`dev\`. Skipping redundant eval runs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          [ "${{ steps.check.outputs.openclaw }}" = "true" ] && echo "- **OpenClaw**: stamped ✓" >> "$GITHUB_STEP_SUMMARY" || true
          [ "${{ steps.check.outputs.hermes }}" = "true" ] && echo "- **Hermes**: stamped ✓" >> "$GITHUB_STEP_SUMMARY" || true
          [ "${{ steps.check.outputs.openclaw }}" = "false" ] && echo "- **OpenClaw**: not found — will eval" >> "$GITHUB_STEP_SUMMARY" || true
          [ "${{ steps.check.outputs.hermes }}" = "false" ] && echo "- **Hermes**: not found — will eval" >> "$GITHUB_STEP_SUMMARY" || true

  # ── Prepare ──────────────────────────────────────────────────────────
  prepare:
    name: Prepare
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.meta.outputs.version }}
      pending: ${{ steps.meta.outputs.pending }}
      publish_tags: ${{ steps.meta.outputs.publish_tags }}
      run_openclaw: ${{ steps.runtime-flags.outputs.run_openclaw }}
      run_hermes: ${{ steps.runtime-flags.outputs.run_hermes }}
      eval_matrix: ${{ steps.suites.outputs.eval_matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: meta
        run: |
          SHA="$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)"
          VERSION="$(jq -r '.version // "unknown"' runtime/package.json 2>/dev/null || echo 'unknown')"
          echo "sha=sha-$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pending=pending-$SHA" >> "$GITHUB_OUTPUT"
          echo "publish_tags=sha-$SHA pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: .github/runtime-paths.yml
      - name: Set runtime flags
        id: runtime-flags
        run: |
          SHARED=${{ steps.changes.outputs.shared }}
          echo "run_openclaw=$( [ "$SHARED" = "true" ] || [ "${{ steps.changes.outputs.openclaw }}" = "true" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "run_hermes=$( [ "$SHARED" = "true" ] || [ "${{ steps.changes.outputs.hermes }}" = "true" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Build eval suite matrix
        id: suites
        run: |
          ALL=$(jq -c . .github/eval-matrix.json)
          echo "eval_matrix=$ALL" >> "$GITHUB_OUTPUT"
          echo "Eval suites: all"

  # ── Pipelines (parallel) ─────────────────────────────────────────────
  openclaw:
    name: OpenClaw
    needs: [prepare, check-stamp]
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.run_openclaw == 'true'
    uses: ./.github/workflows/runtime-pipeline.yml
    secrets: inherit
    with:
      runtime: openclaw
      image: ghcr.io/xmtplabs/convos-runtime
      dockerfile: runtime/openclaw/Dockerfile
      pending_tag: ${{ needs.prepare.outputs.pending }}
      publish_tags: ${{ needs.prepare.outputs.publish_tags }}
      docker_run_extra: "-e OPENCLAW_STATE_DIR=/app -e RUNTIME_TYPE=openclaw"
      docker_cmd: "node convos-platform/pool-server/dist/index.js"
      buildx_driver: docker
      cache_from: "type=registry,ref=ghcr.io/xmtplabs/convos-runtime:pr-${{ github.event.number }}"
      cache_to: type=inline
      eval_matrix: ${{ needs.prepare.outputs.eval_matrix }}
      skip_evals: ${{ needs.check-stamp.outputs.openclaw_stamped == 'true' }}

  hermes:
    name: Hermes
    needs: [prepare, check-stamp]
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.run_hermes == 'true'
    uses: ./.github/workflows/runtime-pipeline.yml
    secrets: inherit
    with:
      runtime: hermes
      image: ghcr.io/xmtplabs/convos-runtime-hermes
      dockerfile: runtime/hermes/Dockerfile
      pending_tag: ${{ needs.prepare.outputs.pending }}
      publish_tags: ${{ needs.prepare.outputs.publish_tags }}
      needs_checkout: true
      docker_run_extra: "-e RUNTIME_TYPE=hermes"
      docker_cmd: "node convos-platform/pool-server/dist/index.js"
      eval_matrix: ${{ needs.prepare.outputs.eval_matrix }}
      skip_evals: ${{ needs.check-stamp.outputs.hermes_stamped == 'true' }}

  # ── Promote on merge ─────────────────────────────────────────────────
  # After a PR merges, this job promotes the published image to an env
  # tag (:dev, :staging, :production).
  #
  # Squash-merge problem:
  #   Images are tagged with the PR head SHA (sha-<head>) at publish time.
  #   When GitHub squash-merges a PR, it creates a NEW commit on the target
  #   branch — the PR head SHA is NOT a parent of that commit. So downstream
  #   promotion PRs (dev→staging) can't find the image via `git log %H %P`.
  #
  # Solution:
  #   After promoting to the env tag, we also re-tag the image with the
  #   merge commit SHA (sha-<merge>). This creates a breadcrumb that the
  #   check-stamp job can find on future promotion branches, since the
  #   merge commit SHA DOES appear in `git log` on those branches.
  promote:
    name: Promote on merge
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 20
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }

      - name: "Map branch → env tag"
        id: env
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          case "$BASE" in
            scaling) echo "tag=scaling" ;; dev) echo "tag=dev" ;; staging) echo "tag=staging" ;; main) echo "tag=production" ;; *) echo "tag=" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Resolve merge commit SHA
        id: merge-sha
        run: |
          # github.sha on a merged PR event is the merge commit on the
          # target branch. We tag images with this so that downstream
          # promotion branches can find them via git log (see header comment).
          MERGE_SHORT="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "short=$MERGE_SHORT" >> "$GITHUB_OUTPUT"
          echo "Merge commit SHA: ${{ github.sha }} (short: $MERGE_SHORT)"

      - name: Collect candidate SHAs
        id: candidates
        run: |
          # Walk recent history + parent SHAs to find the original PR head
          # commit where the image was published. For regular merges the head
          # SHA appears as a parent; for squash merges it won't, but we also
          # check the PR head SHA directly below.
          SEEN=()
          while IFS= read -r LINE; do
            for SHA in $LINE; do
              SEEN+=("$(echo "$SHA" | cut -c1-7)")
            done
          done < <(git log --format='%H %P' -n 20 HEAD)

          # Always include the PR head SHA — this is where the image was
          # originally published, and squash merges drop it from git history.
          PR_HEAD="$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)"
          SEEN+=("$PR_HEAD")

          UNIQUE=$(printf '%s\n' "${SEEN[@]}" | sort -u | tr '\n' ' ')
          echo "shas=$UNIQUE" >> "$GITHUB_OUTPUT"
          echo "Candidates: $UNIQUE"

      - name: Promote OpenClaw
        if: steps.env.outputs.tag != ''
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime"
          TAG="${{ steps.env.outputs.tag }}"
          MERGE_TAG="sha-${{ steps.merge-sha.outputs.short }}"
          AUTH="$HOME/.docker/config.json"
          for SHORT in ${{ steps.candidates.outputs.shas }}; do
            if skopeo inspect --authfile "$AUTH" "docker://$IMAGE:sha-$SHORT" > /dev/null 2>&1; then
              # Promote to env tag (e.g. :dev, :staging, :production)
              skopeo copy --all --authfile "$AUTH" "docker://$IMAGE:sha-$SHORT" "docker://$IMAGE:$TAG"
              echo "Promoted OpenClaw sha-$SHORT → :$TAG"
              # Re-tag with merge commit SHA so downstream promotion branches
              # can find this image via check-stamp (fixes squash-merge gap).
              skopeo copy --all --authfile "$AUTH" "docker://$IMAGE:sha-$SHORT" "docker://$IMAGE:$MERGE_TAG"
              echo "Re-tagged OpenClaw sha-$SHORT → :$MERGE_TAG"
              exit 0
            fi
          done
          echo "::warning::OpenClaw image not found in recent commits — skipping"

      - name: Promote Hermes
        if: steps.env.outputs.tag != ''
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
          TAG="${{ steps.env.outputs.tag }}"
          MERGE_TAG="sha-${{ steps.merge-sha.outputs.short }}"
          AUTH="$HOME/.docker/config.json"
          for SHORT in ${{ steps.candidates.outputs.shas }}; do
            if skopeo inspect --authfile "$AUTH" "docker://$IMAGE:sha-$SHORT" > /dev/null 2>&1; then
              # Promote to env tag
              skopeo copy --all --authfile "$AUTH" "docker://$IMAGE:sha-$SHORT" "docker://$IMAGE:$TAG"
              echo "Promoted Hermes sha-$SHORT → :$TAG"
              # Re-tag with merge commit SHA (see OpenClaw step for rationale)
              skopeo copy --all --authfile "$AUTH" "docker://$IMAGE:sha-$SHORT" "docker://$IMAGE:$MERGE_TAG"
              echo "Re-tagged Hermes sha-$SHORT → :$MERGE_TAG"
              exit 0
            fi
          done
          echo "::warning::Hermes image not found in recent commits — skipping"

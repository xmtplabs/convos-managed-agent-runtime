name: "Runtime: PR"

run-name: >-
  Runtime PR #${{ github.event.number }} → ${{ github.event.pull_request.base.ref }}
  ${{ github.event.action == 'closed' && github.event.pull_request.merged && '(merged)' || '' }}

on:
  pull_request:
    types: [opened, synchronize, closed]
    paths:
      - 'runtime/**'
      - '!runtime/*.md'
      - '!runtime/evals/**'

concurrency:
  group: runtime-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  packages: write

jobs:
  # ── Check eval stamp ────────────────────────────────────────────────
  # On promotion branches (staging, main) the same SHA was already built
  # and eval'd on dev.  If the published image exists in GHCR, skip the
  # entire build→eval pipeline — the image only gets published after all
  # evals pass, so its presence IS the green stamp.
  check-stamp:
    name: Check eval stamp
    if: github.event.action != 'closed' && github.event.pull_request.base.ref != 'dev'
    runs-on: ubuntu-latest
    outputs:
      openclaw_stamped: ${{ steps.check.outputs.openclaw }}
      hermes_stamped: ${{ steps.check.outputs.hermes }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 20
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - name: Check for published images
        id: check
        run: |
          AUTH="$HOME/.docker/config.json"

          # Collect candidate SHAs: for promotion PRs (merge commits), walk
          # the dev-side parent chain — GitHub merge commits on dev don't have
          # published images, only the original PR head commits do.
          CANDIDATES=()
          COMMIT="${{ github.event.pull_request.head.sha }}"
          for i in $(seq 1 10); do
            SHORT=$(echo "$COMMIT" | cut -c1-7)
            CANDIDATES+=("sha-$SHORT")
            echo "Candidate $i: sha-$SHORT ($COMMIT)"
            # If this commit is a merge, follow the second parent (dev side)
            PARENT_COUNT=$(git rev-list --parents -n1 "$COMMIT" 2>/dev/null | wc -w)
            if [ "$PARENT_COUNT" -gt 2 ]; then
              COMMIT=$(git rev-parse "$COMMIT^2" 2>/dev/null) || break
            else
              break
            fi
          done

          for runtime in openclaw hermes; do
            if [ "$runtime" = "openclaw" ]; then
              IMAGE="ghcr.io/xmtplabs/convos-runtime"
            else
              IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
            fi

            FOUND=false
            for SHA in "${CANDIDATES[@]}"; do
              if skopeo inspect --authfile "$AUTH" "docker://$IMAGE:$SHA" > /dev/null 2>&1; then
                echo "$runtime=true" >> "$GITHUB_OUTPUT"
                echo "✓ $runtime image $SHA exists — evals already passed"
                FOUND=true
                break
              fi
            done
            if [ "$FOUND" = "false" ]; then
              echo "$runtime=false" >> "$GITHUB_OUTPUT"
              echo "✗ $runtime image not found in candidates: ${CANDIDATES[*]}"
            fi
          done

      - name: Annotate skipped evals
        if: steps.check.outputs.openclaw == 'true' || steps.check.outputs.hermes == 'true'
        run: |
          echo "## ⏭️ Eval stamp found" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Image already passed evals on \`dev\`. Skipping redundant eval runs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          [ "${{ steps.check.outputs.openclaw }}" = "true" ] && echo "- **OpenClaw**: stamped ✓" >> "$GITHUB_STEP_SUMMARY"
          [ "${{ steps.check.outputs.hermes }}" = "true" ] && echo "- **Hermes**: stamped ✓" >> "$GITHUB_STEP_SUMMARY"
          [ "${{ steps.check.outputs.openclaw }}" = "false" ] && echo "- **OpenClaw**: not found — will eval" >> "$GITHUB_STEP_SUMMARY"
          [ "${{ steps.check.outputs.hermes }}" = "false" ] && echo "- **Hermes**: not found — will eval" >> "$GITHUB_STEP_SUMMARY"

  # ── Prepare ──────────────────────────────────────────────────────────
  prepare:
    name: Prepare
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.meta.outputs.version }}
      pending: ${{ steps.meta.outputs.pending }}
      publish_tags: ${{ steps.meta.outputs.publish_tags }}
      run_openclaw: ${{ steps.changes.outputs.run_openclaw }}
      run_hermes: ${{ steps.changes.outputs.run_hermes }}
      eval_matrix: ${{ steps.suites.outputs.eval_matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: meta
        run: |
          SHA="$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)"
          VERSION="$(jq -r '.version // "unknown"' runtime/package.json 2>/dev/null || echo 'unknown')"
          echo "sha=sha-$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pending=pending-$SHA" >> "$GITHUB_OUTPUT"
          echo "publish_tags=sha-$SHA pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
      - name: Detect changed runtimes
        id: changes
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          FILES=$(git diff --name-only "$BASE"...HEAD -- runtime/)

          HAS_OPENCLAW=false
          HAS_HERMES=false
          HAS_SHARED=false

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              runtime/openclaw/*) HAS_OPENCLAW=true ;;
              runtime/hermes/*)   HAS_HERMES=true ;;
              runtime/package.json|runtime/*.md) ;; # version bumps and docs — skip
              *)                  HAS_SHARED=true ;;
            esac
          done <<< "$FILES"

          # Shared files (runtime/convos-platform/*, runtime/lib/*, runtime/evals/*, etc.)
          # affect both runtimes
          if [ "$HAS_SHARED" = "true" ]; then
            HAS_OPENCLAW=true
            HAS_HERMES=true
          fi

          echo "run_openclaw=$HAS_OPENCLAW" >> "$GITHUB_OUTPUT"
          echo "run_hermes=$HAS_HERMES" >> "$GITHUB_OUTPUT"
          echo "Changed files: $(echo "$FILES" | wc -l | tr -d ' ') | openclaw=$HAS_OPENCLAW hermes=$HAS_HERMES shared=$HAS_SHARED"

      # ── Selective eval triggering ───────────────────────────────────
      # Only matched suites run. Unmatched files → run all (safe fallback).
      - uses: dorny/paths-filter@v3
        id: eval-paths
        with:
          filters: |
            soul:
              - 'runtime/convos-platform/SOUL.md'
            knows:
              - 'runtime/convos-platform/context/*'
            skills:
              - 'runtime/convos-platform/skills/**'
            memory:
              - 'runtime/convos-platform/context/MEMORY.md'
              - 'runtime/convos-platform/context/*/MEMORY.md'
              - 'runtime/openclaw/extensions/convos/src/**/memory*'
              - 'runtime/hermes/src/**/memory*'
            convos:
              - 'runtime/openclaw/extensions/convos/**'
              - 'runtime/hermes/**'
              - 'runtime/convos-platform/*'
              - 'runtime/openclaw/**'
            onboarding:
              - 'runtime/convos-platform/onboarding/**'
              - 'runtime/convos-platform/skills/skill-builder/**'
              - 'runtime/openclaw/extensions/convos/src/channel.ts'
              - 'runtime/hermes/src/server/server.py'
            skill-builder:
              - 'runtime/convos-platform/skills/skill-builder/**'
            lifecycle:
              - 'runtime/openclaw/scripts/**'
              - 'runtime/hermes/scripts/**'
              - 'runtime/lib/**'
            services:
              - 'runtime/convos-platform/skills/services/**'
            webhooks:
              - 'runtime/convos-platform/skills/services/**'
              - 'runtime/openclaw/extensions/convos/**'
            silence:
              - 'runtime/convos-platform/outbound-policy.json'
              - 'runtime/convos-platform/context/TOOL-DISCIPLINE.md'
              - 'runtime/convos-platform/context/*/TOOL-DISCIPLINE.md'
            verbosity:
              - 'runtime/convos-platform/context/MESSAGING.md'
              - 'runtime/convos-platform/context/*/MESSAGING.md'
              - 'runtime/convos-platform/context/BREVITY-EXAMPLES.md'
              - 'runtime/convos-platform/INJECTED_CONTEXT.md'
            cron:
              - 'runtime/convos-platform/context/CRON.md'
              - 'runtime/convos-platform/context/*/CRON.md'
              - 'runtime/lib/crons.sh'
            models:
              - 'runtime/openclaw/openclaw.json'
              - 'runtime/hermes/workspace/config.yaml'
              - 'runtime/convos-platform/context/MODELS.md'
              - 'runtime/convos-platform/context/*/MODELS.md'
            delegation:
              - 'runtime/convos-platform/context/DELEGATION.md'
              - 'runtime/convos-platform/context/*/DELEGATION.md'
      - name: Build eval suite matrix
        id: suites
        run: |
          # Single source of truth for eval suite config
          ALL=$(jq -c . .github/eval-matrix.json)

          # Build list from dorny outputs — only matched suites run
          MATCHED=""
          for suite in soul knows skills memory convos onboarding skill-builder lifecycle services silence verbosity cron models delegation webhooks; do
            if echo '${{ steps.eval-paths.outputs.changes }}' | grep -q "\"$suite\""; then
              MATCHED="$MATCHED $suite"
            fi
          done

          if [ -z "$MATCHED" ]; then
            echo "eval_matrix=$ALL" >> "$GITHUB_OUTPUT"
            echo "Eval suites: all (no mapped suite matched — safe fallback)"
            exit 0
          fi

          # Filter the full matrix to only matched suites
          MATRIX=$(echo "$ALL" | jq -c "[.[] | select(.suite as \$s | \"$MATCHED\" | split(\" \") | map(select(. != \"\")) | index(\$s) != null)]")
          echo "eval_matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Eval suites: $MATCHED"

  # ── Pipelines (parallel) ─────────────────────────────────────────────
  openclaw:
    name: OpenClaw
    needs: [prepare, check-stamp]
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.run_openclaw == 'true' &&
      needs.check-stamp.outputs.openclaw_stamped != 'true'
    uses: ./.github/workflows/runtime-pipeline.yml
    secrets: inherit
    with:
      runtime: openclaw
      image: ghcr.io/xmtplabs/convos-runtime
      dockerfile: runtime/openclaw/Dockerfile
      pending_tag: ${{ needs.prepare.outputs.pending }}
      publish_tags: ${{ needs.prepare.outputs.publish_tags }}
      docker_run_extra: "-e OPENCLAW_STATE_DIR=/app -e RUNTIME_TYPE=openclaw"
      docker_cmd: "node convos-platform/pool-server/dist/index.js"
      buildx_driver: docker
      cache_from: "type=registry,ref=ghcr.io/xmtplabs/convos-runtime:pr-${{ github.event.number }}"
      cache_to: type=inline
      eval_matrix: ${{ needs.prepare.outputs.eval_matrix }}

  hermes:
    name: Hermes
    needs: [prepare, check-stamp]
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.run_hermes == 'true' &&
      needs.check-stamp.outputs.hermes_stamped != 'true'
    uses: ./.github/workflows/runtime-pipeline.yml
    secrets: inherit
    with:
      runtime: hermes
      image: ghcr.io/xmtplabs/convos-runtime-hermes
      dockerfile: runtime/hermes/Dockerfile
      pending_tag: ${{ needs.prepare.outputs.pending }}
      publish_tags: ${{ needs.prepare.outputs.publish_tags }}
      needs_checkout: true
      docker_run_extra: "-e RUNTIME_TYPE=hermes"
      docker_cmd: "node convos-platform/pool-server/dist/index.js"
      eval_matrix: ${{ needs.prepare.outputs.eval_matrix }}

  # ── Promote on merge ─────────────────────────────────────────────────
  promote:
    name: Promote on merge
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 20
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }

      - name: "Map branch → env tag"
        id: env
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          case "$BASE" in
            scaling) echo "tag=scaling" ;; dev) echo "tag=dev" ;; staging) echo "tag=staging" ;; main) echo "tag=production" ;; *) echo "tag=" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Resolve source SHA
        id: resolve
        run: |
          # Walk merge commits to find the original PR head with a published image
          COMMIT="${{ github.event.pull_request.head.sha }}"
          for i in $(seq 1 10); do
            SHORT=$(echo "$COMMIT" | cut -c1-7)
            echo "Candidate $i: sha-$SHORT ($COMMIT)"
            PARENT_COUNT=$(git rev-list --parents -n1 "$COMMIT" 2>/dev/null | wc -w)
            if [ "$PARENT_COUNT" -gt 2 ]; then
              COMMIT=$(git rev-parse "$COMMIT^2" 2>/dev/null) || break
            else
              break
            fi
          done
          echo "sha=$(echo "$COMMIT" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "Resolved source SHA: $(echo "$COMMIT" | cut -c1-7)"

      - name: Promote OpenClaw
        if: steps.env.outputs.tag != ''
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime"
          SHA="${{ steps.resolve.outputs.sha }}"
          TAG="${{ steps.env.outputs.tag }}"
          AUTH="$HOME/.docker/config.json"
          if skopeo inspect --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" > /dev/null 2>&1; then
            skopeo copy --all --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" "docker://$IMAGE:$TAG"
            echo "Promoted OpenClaw sha-$SHA → :$TAG"
          else
            echo "::warning::OpenClaw image sha-$SHA not found — skipping"
          fi

      - name: Promote Hermes
        if: steps.env.outputs.tag != ''
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
          SHA="${{ steps.resolve.outputs.sha }}"
          TAG="${{ steps.env.outputs.tag }}"
          AUTH="$HOME/.docker/config.json"
          if skopeo inspect --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" > /dev/null 2>&1; then
            skopeo copy --all --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" "docker://$IMAGE:$TAG"
            echo "Promoted Hermes sha-$SHA → :$TAG"
          else
            echo "::warning::Hermes image sha-$SHA not found — skipping"
          fi

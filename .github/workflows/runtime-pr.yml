name: "Runtime: PR"

run-name: >-
  Runtime PR #${{ github.event.number }} → ${{ github.event.pull_request.base.ref }}
  ${{ github.event.action == 'closed' && github.event.pull_request.merged && '(merged)' || '' }}

on:
  pull_request:
    types: [opened, synchronize, closed]
    paths:
      - 'runtime/**'
      - '!runtime/*.md'
      - '!runtime/evals/**'

concurrency:
  group: runtime-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  packages: write

jobs:
  # ── Prepare ──────────────────────────────────────────────────────────
  prepare:
    name: Prepare
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.meta.outputs.version }}
      pending: ${{ steps.meta.outputs.pending }}
      publish_tags: ${{ steps.meta.outputs.publish_tags }}
      run_openclaw: ${{ steps.changes.outputs.run_openclaw }}
      run_hermes: ${{ steps.changes.outputs.run_hermes }}
      eval_matrix: ${{ steps.suites.outputs.eval_matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: meta
        run: |
          SHA="$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)"
          VERSION="$(jq -r '.version // "unknown"' runtime/package.json 2>/dev/null || echo 'unknown')"
          echo "sha=sha-$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pending=pending-$SHA" >> "$GITHUB_OUTPUT"
          echo "publish_tags=sha-$SHA pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
      - name: Detect changed runtimes
        id: changes
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          FILES=$(git diff --name-only "$BASE"...HEAD -- runtime/)

          HAS_OPENCLAW=false
          HAS_HERMES=false
          HAS_SHARED=false

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              runtime/openclaw/*) HAS_OPENCLAW=true ;;
              runtime/hermes/*)   HAS_HERMES=true ;;
              *)                  HAS_SHARED=true ;;
            esac
          done <<< "$FILES"

          # Shared files (runtime/convos-platform/*, runtime/lib/*, runtime/evals/*, etc.)
          # affect both runtimes
          if [ "$HAS_SHARED" = "true" ]; then
            HAS_OPENCLAW=true
            HAS_HERMES=true
          fi

          echo "run_openclaw=$HAS_OPENCLAW" >> "$GITHUB_OUTPUT"
          echo "run_hermes=$HAS_HERMES" >> "$GITHUB_OUTPUT"
          echo "Changed files: $(echo "$FILES" | wc -l | tr -d ' ') | openclaw=$HAS_OPENCLAW hermes=$HAS_HERMES shared=$HAS_SHARED"

      # ── Selective eval triggering (dev branch only) ──────────────────
      # Only matched suites run. Unmatched files → run all (safe fallback).
      # Non-dev branches always run all suites (promotion gates).
      - uses: dorny/paths-filter@v3
        id: eval-paths
        with:
          filters: |
            soul:
              - 'runtime/convos-platform/SOUL.md'
              - 'runtime/convos-platform/context/ERROR-HANDLING.md'
              - 'runtime/convos-platform/context/WORKSPACE-SAFETY.md'
              - 'runtime/convos-platform/context/TIME-AWARENESS.md'
            knows:
              - 'runtime/convos-platform/context/IDENTITY.md'
              - 'runtime/convos-platform/context/RUNTIME.md'
            skills:
              - 'runtime/convos-platform/skills/**'
              - 'runtime/convos-platform/context/CUSTOMIZATION.md'
            memory:
              - 'runtime/convos-platform/context/MEMORY.md'
              - 'runtime/convos-platform/context/*/MEMORY.md'
              - 'runtime/openclaw/extensions/convos/src/**/memory*'
              - 'runtime/hermes/src/**/memory*'
            convos:
              - 'runtime/openclaw/extensions/convos/**'
              - 'runtime/hermes/src/**'
              - 'runtime/convos-platform/web-tools/convos/**'
              - 'runtime/convos-platform/skills/profile-update/**'
              - 'runtime/convos-platform/outbound-policy.json'
              - 'runtime/convos-platform/context/CONVOS-CLI.md'
              - 'runtime/convos-platform/context/INBOUND-FORMATS.md'
              - 'runtime/convos-platform/context/*/MESSAGING.md'
              - 'runtime/convos-platform/context/*/PROFILE-UPDATES.md'
            onboarding:
              - 'runtime/convos-platform/onboarding/**'
              - 'runtime/convos-platform/context/IDENTITY.md'
              - 'runtime/convos-platform/context/*/IDENTITY.md'
              - 'runtime/convos-platform/skills/skill-builder/**'
              - 'runtime/openclaw/extensions/convos/src/channel.ts'
              - 'runtime/hermes/src/server/server.py'
            lifecycle:
              - 'runtime/openclaw/scripts/**'
              - 'runtime/hermes/scripts/**'
              - 'runtime/lib/**'
            services:
              - 'runtime/convos-platform/skills/services/**'
            webhooks:
              - 'runtime/convos-platform/skills/services/**'
              - 'runtime/openclaw/extensions/convos/**'
              - 'runtime/hermes/src/**'
            silence:
              - 'runtime/convos-platform/outbound-policy.json'
              - 'runtime/convos-platform/context/TOOL-DISCIPLINE.md'
              - 'runtime/convos-platform/context/*/TOOL-DISCIPLINE.md'
              - 'runtime/hermes/src/**'
            cron:
              - 'runtime/convos-platform/context/CRON.md'
              - 'runtime/convos-platform/context/*/CRON.md'
              - 'runtime/convos-platform/web-tools/skills/**'
              - 'runtime/lib/crons.sh'
            models:
              - 'runtime/openclaw/openclaw.json'
              - 'runtime/hermes/workspace/config.yaml'
              - 'runtime/convos-platform/context/*/MODELS.md'
            delegation:
              - 'runtime/convos-platform/context/DELEGATION.md'
              - 'runtime/convos-platform/context/*/DELEGATION.md'
      - name: Build eval suite matrix
        id: suites
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"

          # All suites with their config (fresh=true only for provision)
          ALL='[{"suite":"knows","timeout":900,"only":"","fresh":false},{"suite":"skills","timeout":900,"only":"","fresh":false},{"suite":"soul","timeout":900,"only":"","fresh":false},{"suite":"onboarding","timeout":900,"only":"","fresh":false},{"suite":"lifecycle","timeout":900,"only":"","fresh":false},{"suite":"convos","timeout":900,"only":"","fresh":false},{"suite":"models","timeout":900,"only":"","fresh":false},{"suite":"delegation","timeout":900,"only":"","fresh":false},{"suite":"cron","timeout":900,"only":"","fresh":false},{"suite":"services","timeout":900,"only":"","fresh":false},{"suite":"memory","timeout":900,"only":"","fresh":false},{"suite":"silence","timeout":900,"only":"","fresh":false},{"suite":"webhooks","timeout":900,"only":"","fresh":false},{"suite":"provision","timeout":900,"only":"","fresh":true}]'

          # Non-dev branches → run all
          if [ "$BASE" != "dev" ]; then
            echo "eval_matrix=$ALL" >> "$GITHUB_OUTPUT"
            echo "Eval suites: all (base=$BASE)"
            exit 0
          fi

          # Build list from dorny outputs — only matched suites run
          MATCHED=""
          for suite in soul knows skills memory convos onboarding lifecycle services silence cron models delegation webhooks; do
            if echo '${{ steps.eval-paths.outputs.changes }}' | grep -q "\"$suite\""; then
              MATCHED="$MATCHED $suite"
            fi
          done

          if [ -z "$MATCHED" ]; then
            echo "eval_matrix=$ALL" >> "$GITHUB_OUTPUT"
            echo "Eval suites: all (no mapped suite matched — safe fallback)"
            exit 0
          fi

          # Filter the full matrix to only matched suites
          MATRIX=$(echo "$ALL" | jq -c "[.[] | select(.suite as \$s | \"$MATCHED\" | split(\" \") | map(select(. != \"\")) | index(\$s) != null)]")
          echo "eval_matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Eval suites: $MATCHED"

  # ── Pipelines (parallel) ─────────────────────────────────────────────
  openclaw:
    name: OpenClaw
    needs: prepare
    if: needs.prepare.outputs.run_openclaw == 'true'
    uses: ./.github/workflows/runtime-pipeline.yml
    secrets: inherit
    with:
      runtime: openclaw
      image: ghcr.io/xmtplabs/convos-runtime
      dockerfile: runtime/openclaw/Dockerfile
      pending_tag: ${{ needs.prepare.outputs.pending }}
      publish_tags: ${{ needs.prepare.outputs.publish_tags }}
      docker_run_extra: "-e OPENCLAW_STATE_DIR=/app -e RUNTIME_TYPE=openclaw"
      docker_cmd: "node convos-platform/pool-server/dist/index.js"
      buildx_driver: docker
      cache_from: "type=registry,ref=ghcr.io/xmtplabs/convos-runtime:pr-${{ github.event.number }}"
      cache_to: type=inline
      eval_matrix: ${{ needs.prepare.outputs.eval_matrix }}

  hermes:
    name: Hermes
    needs: prepare
    if: needs.prepare.outputs.run_hermes == 'true'
    uses: ./.github/workflows/runtime-pipeline.yml
    secrets: inherit
    with:
      runtime: hermes
      image: ghcr.io/xmtplabs/convos-runtime-hermes
      dockerfile: runtime/hermes/Dockerfile
      pending_tag: ${{ needs.prepare.outputs.pending }}
      publish_tags: ${{ needs.prepare.outputs.publish_tags }}
      needs_checkout: true
      docker_run_extra: "-e RUNTIME_TYPE=hermes"
      docker_cmd: "node convos-platform/pool-server/dist/index.js"
      eval_matrix: ${{ needs.prepare.outputs.eval_matrix }}

  # ── Promote on merge ─────────────────────────────────────────────────
  promote:
    name: Promote on merge
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }

      - name: "Map branch → env tag"
        id: env
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          case "$BASE" in
            scaling) echo "tag=scaling" ;; dev) echo "tag=dev" ;; staging) echo "tag=staging" ;; main) echo "tag=production" ;; *) echo "tag=" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Promote OpenClaw
        if: steps.env.outputs.tag != ''
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime"
          SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          TAG="${{ steps.env.outputs.tag }}"
          AUTH="$HOME/.docker/config.json"
          if skopeo inspect --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" > /dev/null 2>&1; then
            skopeo copy --all --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" "docker://$IMAGE:$TAG"
            echo "Promoted OpenClaw → :$TAG"
          else
            echo "::warning::OpenClaw image sha-$SHA not found — skipping"
          fi

      - name: Promote Hermes
        if: steps.env.outputs.tag != ''
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
          SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          TAG="${{ steps.env.outputs.tag }}"
          AUTH="$HOME/.docker/config.json"
          if skopeo inspect --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" > /dev/null 2>&1; then
            skopeo copy --all --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" "docker://$IMAGE:$TAG"
            echo "Promoted Hermes → :$TAG"
          else
            echo "::warning::Hermes image sha-$SHA not found — skipping"
          fi

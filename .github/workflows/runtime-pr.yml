name: "Runtime: PR"

run-name: >-
  Runtime PR #${{ github.event.number }} → ${{ github.event.pull_request.base.ref }}
  ${{ github.event.action == 'closed' && github.event.pull_request.merged && '(merged)' || '' }}

on:
  pull_request:
    types: [opened, synchronize, closed]
    paths:
      - 'runtime/**'
      - '!runtime/CHANGELOG.md'
      - '!runtime/evals/**'

concurrency:
  group: runtime-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  packages: write

jobs:
  build:
    name: Build runtime image
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      pending: ${{ steps.meta.outputs.pending }}
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        run: |
          SHA="$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)"
          TAG="pr-${{ github.event.number }}"
          echo "pending=pending-$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=sha-$SHA" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA | tag=$TAG | pending=pending-$SHA"

      - name: "Build and push :pending-${{ steps.meta.outputs.sha }}"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtime/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/xmtplabs/convos-runtime:${{ steps.meta.outputs.pending }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  eval:
    name: "E2E eval"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      passed: ${{ steps.result.outputs.passed }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Start container (:${{ needs.build.outputs.pending }})"
        run: |
          docker pull ghcr.io/xmtplabs/convos-runtime:${{ needs.build.outputs.pending }}
          docker run -d --name eval-runtime \
            -p 8080:8080 \
            -e PORT=8080 \
            -e OPENCLAW_STATE_DIR=/app \
            -e EVAL_MODE=1 \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e BANKR_API_KEY="${{ secrets.BANKR_API_KEY }}" \
            -e OPENCLAW_GATEWAY_TOKEN="${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" \
            -e OPENCLAW_PRIMARY_MODEL="${{ secrets.OPENCLAW_PRIMARY_MODEL }}" \
            -e XMTP_ENV="${{ secrets.XMTP_ENV }}" \
            -e POOL_URL="${{ secrets.POOL_URL }}" \
            -e INSTANCE_ID="${{ secrets.INSTANCE_ID }}" \
            ghcr.io/xmtplabs/convos-runtime:${{ needs.build.outputs.pending }} \
            node scripts/pool-server.js

      - name: Wait for gateway
        run: |
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/pool/health | grep -q '"ready":true'; then
              echo "Gateway ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Gateway failed to start within 120s"
          docker logs eval-runtime
          exit 1

      - name: "Eval: prompt (parallel)"
        id: eval-prompt
        continue-on-error: true
        run: |
          docker exec \
            -e EVAL_OPENROUTER_API_KEY=${{ secrets.EVAL_OPENROUTER_API_KEY }} \
            eval-runtime timeout 300 pnpm evals:prompt

      - name: "Eval: convos (sequential)"
        id: eval-convos
        continue-on-error: true
        run: |
          docker exec \
            -e EVAL_OPENROUTER_API_KEY=${{ secrets.EVAL_OPENROUTER_API_KEY }} \
            eval-runtime timeout 600 pnpm evals:convos

      - name: Dump container logs
        if: always()
        run: docker logs eval-runtime

      - name: Set eval result
        id: result
        if: always()
        run: |
          if [[ "${{ steps.eval-prompt.outcome }}" == "success" && "${{ steps.eval-convos.outcome }}" == "success" ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Evals failed (prompt=${{ steps.eval-prompt.outcome }}, convos=${{ steps.eval-convos.outcome }}) — skipping publish"
          fi

  publish:
    name: "Publish :${{ needs.build.outputs.sha }}"
    needs: [build, eval]
    if: always() && needs.build.result == 'success' && needs.eval.outputs.passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Tag and push :${{ needs.build.outputs.sha }}, :${{ needs.build.outputs.tag }}"
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime"
          PENDING="${{ needs.build.outputs.pending }}"
          SHA="${{ needs.build.outputs.sha }}"

          docker pull "$IMAGE:$PENDING"
          docker tag "$IMAGE:$PENDING" "$IMAGE:$SHA"
          docker push "$IMAGE:$SHA"
          echo "Pushed $IMAGE:$SHA"

          docker tag "$IMAGE:$PENDING" "$IMAGE:pr-${{ github.event.number }}"
          docker push "$IMAGE:pr-${{ github.event.number }}"
          echo "Pushed $IMAGE:pr-${{ github.event.number }}"

  promote:
    name: Promote on merge
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Map branch → environment tag"
        id: env
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          case "$BASE" in
            scaling) echo "tag=scaling" >> "$GITHUB_OUTPUT" ;;
            dev)     echo "tag=dev" >> "$GITHUB_OUTPUT" ;;
            staging) echo "tag=staging" >> "$GITHUB_OUTPUT" ;;
            main)    echo "tag=production" >> "$GITHUB_OUTPUT" ;;
            *)       echo "tag=" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "Merge target: $BASE → tag: $(grep tag "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: "Retag image → :${{ steps.env.outputs.tag }}"
        if: steps.env.outputs.tag != ''
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime"
          SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          ENV_TAG="${{ steps.env.outputs.tag }}"

          echo "Promoting $IMAGE:sha-$SHA → $IMAGE:$ENV_TAG"
          docker pull "$IMAGE:sha-$SHA"
          docker tag "$IMAGE:sha-$SHA" "$IMAGE:$ENV_TAG"
          docker push "$IMAGE:$ENV_TAG"
          echo "Done: $IMAGE:$ENV_TAG"

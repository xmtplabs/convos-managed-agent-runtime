name: "Runtime: PR"

run-name: >-
  Runtime PR #${{ github.event.number }} → ${{ github.event.pull_request.base.ref }}
  ${{ github.event.action == 'closed' && github.event.pull_request.merged && '(merged)' || '' }}

on:
  pull_request:
    types: [opened, synchronize, closed]
    paths:
      - 'runtime/**'
      - '!runtime/*.md'

concurrency:
  group: runtime-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  packages: write

jobs:
  # ── Prepare ──────────────────────────────────────────────────────────
  prepare:
    name: Prepare
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.meta.outputs.version }}
      pending: ${{ steps.meta.outputs.pending }}
      publish_tags: ${{ steps.meta.outputs.publish_tags }}
      run_openclaw: ${{ steps.changes.outputs.run_openclaw }}
      run_hermes: ${{ steps.changes.outputs.run_hermes }}
      eval_suites: ${{ steps.suites.outputs.eval_suites }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: meta
        run: |
          SHA="$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)"
          VERSION="$(jq -r '.version // "unknown"' runtime/package.json 2>/dev/null || echo 'unknown')"
          echo "sha=sha-$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pending=pending-$SHA" >> "$GITHUB_OUTPUT"
          echo "publish_tags=sha-$SHA pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
      - name: Detect changed runtimes
        id: changes
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          FILES=$(git diff --name-only "$BASE"...HEAD -- runtime/)

          HAS_OPENCLAW=false
          HAS_HERMES=false
          HAS_SHARED=false

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              runtime/openclaw/*) HAS_OPENCLAW=true ;;
              runtime/hermes/*)   HAS_HERMES=true ;;
              *)                  HAS_SHARED=true ;;
            esac
          done <<< "$FILES"

          # Shared files (runtime/shared/*, runtime/evals/*, runtime/package.json, etc.)
          # affect both runtimes
          if [ "$HAS_SHARED" = "true" ]; then
            HAS_OPENCLAW=true
            HAS_HERMES=true
          fi

          echo "run_openclaw=$HAS_OPENCLAW" >> "$GITHUB_OUTPUT"
          echo "run_hermes=$HAS_HERMES" >> "$GITHUB_OUTPUT"
          echo "Changed files: $(echo "$FILES" | wc -l | tr -d ' ') | openclaw=$HAS_OPENCLAW hermes=$HAS_HERMES shared=$HAS_SHARED"

      # ── Selective eval triggering (dev branch only) ──────────────────
      # Suites listed here only run when their paths change.
      # Suites NOT listed (knows, delegation, provision, silence) always run.
      # Non-dev branches always run all suites (promotion gates).
      - uses: dorny/paths-filter@v3
        id: eval-paths
        with:
          filters: |
            soul:
              - 'runtime/shared/workspace/SOUL.md'
              - 'runtime/shared/workspace/AGENTS-base.md'
            skills:
              - 'runtime/shared/workspace/skills/**'
              - '!runtime/shared/workspace/skills/services/**'
              - 'runtime/shared/web-tools/skills/**'
            memory:
              - 'runtime/openclaw/extensions/convos/src/**/memory*'
              - 'runtime/hermes/src/**/memory*'
            convos:
              - 'runtime/openclaw/extensions/convos/**'
              - 'runtime/shared/web-tools/convos/**'
              - 'runtime/shared/workspace/skills/profile-update/**'
            lifecycle:
              - 'runtime/openclaw/scripts/**'
              - 'runtime/hermes/scripts/**'
              - 'runtime/shared/scripts/**'
            services:
              - 'runtime/shared/workspace/skills/services/**'
            cron:
              - 'runtime/shared/web-tools/skills/**'
            models:
              - 'runtime/openclaw/openclaw.json'
              - 'runtime/hermes/workspace/config.yaml'
            evals:
              - 'runtime/evals/**'
      - name: Build eval suite list
        id: suites
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"

          # Non-dev branches or evals/ changed → run all
          if [ "$BASE" != "dev" ] || [ "${{ steps.eval-paths.outputs.evals }}" = "true" ]; then
            echo "eval_suites=all" >> "$GITHUB_OUTPUT"
            echo "Eval suites: all (base=$BASE, evals_changed=${{ steps.eval-paths.outputs.evals }})"
            exit 0
          fi

          # Build list from dorny outputs — mapped suites only run when triggered
          SUITES=""
          for suite in soul skills memory convos lifecycle services cron models; do
            val="${{ steps.eval-paths.outputs.changes }}"
            # dorny outputs a JSON array in 'changes', check membership
            if echo '${{ steps.eval-paths.outputs.changes }}' | grep -q "\"$suite\""; then
              SUITES="$SUITES $suite"
            fi
          done

          if [ -z "$SUITES" ]; then
            echo "eval_suites=all" >> "$GITHUB_OUTPUT"
            echo "Eval suites: all (no mapped suite matched — safe fallback)"
            exit 0
          fi

          # Always include unmapped suites (cheap, no trigger filtering)
          SUITES="$SUITES knows delegation provision silence"
          echo "eval_suites=$SUITES" >> "$GITHUB_OUTPUT"
          echo "Eval suites:$SUITES"

  # ── Pipelines (parallel) ─────────────────────────────────────────────
  openclaw:
    name: OpenClaw
    needs: prepare
    if: needs.prepare.outputs.run_openclaw == 'true'
    uses: ./.github/workflows/runtime-pipeline.yml
    secrets: inherit
    with:
      runtime: openclaw
      image: ghcr.io/xmtplabs/convos-runtime
      dockerfile: runtime/openclaw/Dockerfile
      pending_tag: ${{ needs.prepare.outputs.pending }}
      publish_tags: ${{ needs.prepare.outputs.publish_tags }}
      health_path: "/__openclaw__/canvas/"
      docker_run_extra: "-e OPENCLAW_STATE_DIR=/app"
      docker_cmd: "node src/pool-server.js"
      buildx_driver: docker
      cache_from: "type=registry,ref=ghcr.io/xmtplabs/convos-runtime:pr-${{ github.event.number }}"
      cache_to: type=inline
      eval_suites: ${{ needs.prepare.outputs.eval_suites }}

  hermes:
    name: Hermes
    needs: prepare
    if: needs.prepare.outputs.run_hermes == 'true'
    uses: ./.github/workflows/runtime-pipeline.yml
    secrets: inherit
    with:
      runtime: hermes
      image: ghcr.io/xmtplabs/convos-runtime-hermes
      dockerfile: runtime/hermes/Dockerfile
      pending_tag: ${{ needs.prepare.outputs.pending }}
      publish_tags: ${{ needs.prepare.outputs.publish_tags }}
      needs_checkout: true
      eval_suites: ${{ needs.prepare.outputs.eval_suites }}

  # ── Promote on merge ─────────────────────────────────────────────────
  promote:
    name: Promote on merge
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }

      - name: "Map branch → env tag"
        id: env
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          case "$BASE" in
            scaling) echo "tag=scaling" ;; dev) echo "tag=dev" ;; staging) echo "tag=staging" ;; main) echo "tag=production" ;; *) echo "tag=" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Promote OpenClaw
        if: steps.env.outputs.tag != ''
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime"
          SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          TAG="${{ steps.env.outputs.tag }}"
          AUTH="$HOME/.docker/config.json"
          if skopeo inspect --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" > /dev/null 2>&1; then
            skopeo copy --all --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" "docker://$IMAGE:$TAG"
            echo "Promoted OpenClaw → :$TAG"
          else
            echo "::warning::OpenClaw image sha-$SHA not found — skipping"
          fi

      - name: Promote Hermes
        if: steps.env.outputs.tag != ''
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
          SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          TAG="${{ steps.env.outputs.tag }}"
          AUTH="$HOME/.docker/config.json"
          if skopeo inspect --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" > /dev/null 2>&1; then
            skopeo copy --all --authfile "$AUTH" "docker://$IMAGE:sha-$SHA" "docker://$IMAGE:$TAG"
            echo "Promoted Hermes → :$TAG"
          else
            echo "::warning::Hermes image sha-$SHA not found — skipping"
          fi

# Reusable pipeline: build → eval → publish for one runtime.
# Called by runtime-pr.yml and runtime-dispatch.yml.
#
# To add a new runtime, add a call to this workflow with the runtime's config.

name: "Runtime Pipeline"

on:
  workflow_call:
    inputs:
      runtime:
        description: "Runtime name (openclaw, hermes)"
        required: true
        type: string
      image:
        description: "GHCR image name (e.g. ghcr.io/xmtplabs/convos-runtime)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: true
        type: string
      pending_tag:
        description: "Pending image tag (e.g. pending-abc1234)"
        required: true
        type: string
      publish_tags:
        description: "Space-separated tags to publish on success (e.g. 'sha-abc1234 pr-42')"
        required: false
        type: string
        default: ""
      health_path:
        description: "Health endpoint path (e.g. /pool/health)"
        required: false
        type: string
        default: "/pool/health"
      docker_run_extra:
        description: "Extra docker run flags (env vars, volumes)"
        required: false
        type: string
        default: ""
      docker_cmd:
        description: "Override container CMD (e.g. 'node src/pool-server.js')"
        required: false
        type: string
        default: ""
      needs_checkout:
        description: "Whether eval jobs need a checkout (for volume mounts)"
        required: false
        type: boolean
        default: false
      buildx_driver:
        description: "Buildx driver override (set to 'docker' for openclaw)"
        required: false
        type: string
        default: ""
      cache_from:
        description: "Docker build cache-from"
        required: false
        type: string
        default: "type=gha"
      cache_to:
        description: "Docker build cache-to"
        required: false
        type: string
        default: "type=gha,mode=max"
      eval_matrix:
        description: "JSON array of matrix entries [{suite, timeout, only, fresh}, ...]"
        required: false
        type: string
        default: '[{"suite":"knows","timeout":900,"only":"","fresh":false},{"suite":"skills","timeout":900,"only":"","fresh":false},{"suite":"soul","timeout":900,"only":"","fresh":false},{"suite":"lifecycle","timeout":900,"only":"","fresh":false},{"suite":"convos","timeout":900,"only":"","fresh":false},{"suite":"models","timeout":900,"only":"","fresh":false},{"suite":"delegation","timeout":900,"only":"","fresh":false},{"suite":"cron","timeout":900,"only":"","fresh":false},{"suite":"services","timeout":900,"only":"","fresh":false},{"suite":"memory","timeout":900,"only":"","fresh":false},{"suite":"silence","timeout":900,"only":"","fresh":false},{"suite":"provision","timeout":900,"only":"","fresh":true}]'

jobs:
  build:
    name: "Build ${{ inputs.runtime }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/setup-buildx-action@v4
        with:
          driver: ${{ inputs.buildx_driver || '' }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          load: ${{ inputs.buildx_driver == 'docker' && 'false' || 'true' }}
          platforms: linux/amd64
          tags: "${{ inputs.image }}:${{ inputs.pending_tag }}"
          cache-from: ${{ inputs.cache_from }}
          cache-to: ${{ inputs.cache_to }}
      - name: Save image for eval jobs
        run: docker save ${{ inputs.image }}:${{ inputs.pending_tag }} | zstd -T0 -1 > /tmp/runtime-image.tar.zst
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.runtime }}-image
          path: /tmp/runtime-image.tar.zst
          retention-days: 1
          compression-level: 0

  eval:
    name: "${{ inputs.runtime }}: ${{ matrix.suite }}"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.eval_matrix) }}
    steps:
      - if: inputs.needs_checkout
        uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with: { name: "${{ inputs.runtime }}-image", path: /tmp }
      - name: Load image
        run: zstd -d /tmp/runtime-image.tar.zst -o /tmp/runtime-image.tar && docker load < /tmp/runtime-image.tar

      - name: Start container
        run: |
          docker run -d --name eval-runtime \
            -p 8080:8080 \
            -e PORT=8080 \
            -e EVAL_MODE=1 \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e EXA_API_KEY="${{ secrets.EXA_API_KEY }}" \
            -e OPENCLAW_GATEWAY_TOKEN="${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" \
            -e XMTP_ENV="${{ secrets.XMTP_ENV }}" \
            -e CONVOS_API_KEY="${{ secrets.CONVOS_API_KEY }}" \
            ${{ !matrix.fresh && format('-e POOL_URL="{0}"', secrets.POOL_URL) || '' }} \
            ${{ !matrix.fresh && format('-e INSTANCE_ID="{0}"', secrets.INSTANCE_ID) || '' }} \
            ${{ !matrix.fresh && format('-e AGENTMAIL_API_KEY="{0}"', secrets.AGENTMAIL_API_KEY) || '' }} \
            ${{ !matrix.fresh && format('-e AGENTMAIL_INBOX_ID="{0}"', secrets.AGENTMAIL_INBOX_ID) || '' }} \
            ${{ matrix.suite == 'webhooks' && format('-e NGROK_URL="{0}" -e NGROK_AUTHTOKEN="{1}"', secrets.NGROK_URL, secrets.NGROK_AUTHTOKEN) || '' }} \
            ${{ inputs.needs_checkout && format('-v {0}/runtime/evals:/app/evals', github.workspace) || '' }} \
            ${{ inputs.docker_run_extra }} \
            ${{ inputs.image }}:${{ inputs.pending_tag }} \
            ${{ inputs.docker_cmd }}

      - name: Wait for health
        run: |
          HEALTH_CURL_ARGS=(-sf)
          if [ -n "${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" ]; then
            HEALTH_CURL_ARGS+=(-H "Authorization: Bearer ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}")
          fi
          for i in $(seq 1 120); do
            if curl "${HEALTH_CURL_ARGS[@]}" http://localhost:8080${{ inputs.health_path }} > /dev/null 2>&1; then
              echo "Ready after ${i}s"; exit 0
            fi; sleep 1
          done
          echo "Failed to start"; docker logs eval-runtime; exit 1

      - name: "Run ${{ matrix.suite }}"
        id: run-eval
        if: matrix.only == '' || matrix.only == inputs.runtime
        run: |
          docker exec \
            -e "EVAL_OPENROUTER_API_KEY=${{ secrets.EVAL_OPENROUTER_API_KEY }}" \
            -e "EVAL_RESULTS_DIR=/tmp/eval-results" \
            eval-runtime timeout ${{ matrix.timeout }} \
              pnpm evals ${{ inputs.runtime }} ${{ matrix.suite }}

      - name: "Skip ${{ matrix.suite }} (not for ${{ inputs.runtime }})"
        id: skip-eval
        if: matrix.only != '' && matrix.only != inputs.runtime
        run: echo "Skipped — ${{ matrix.suite }} only runs on ${{ matrix.only }}"

      - name: Dump logs
        if: always()
        run: docker logs eval-runtime

      - name: Copy eval results from container
        if: always()
        run: |
          mkdir -p /tmp/eval-results
          docker cp eval-runtime:/tmp/eval-results/. /tmp/eval-results/ 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: eval-result-${{ inputs.runtime }}-${{ matrix.suite }}
          path: /tmp/eval-results/
          retention-days: 1
          compression-level: 0

  report:
    name: "Report ${{ inputs.runtime }}"
    needs: eval
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: eval-result-${{ inputs.runtime }}-*
          path: /tmp/eval-results
          merge-multiple: true

      - name: Build eval report
        shell: bash
        run: |
          DETAILS_FILE=$(mktemp)
          S="$GITHUB_STEP_SUMMARY"

          echo "## ${{ inputs.runtime }} eval results" >> "$S"
          echo "" >> "$S"
          printf "| Suite | Passed | Failed | Result |\n" >> "$S"
          printf "|-------|--------|--------|--------|\n" >> "$S"

          TOTAL_FAILURES=0

          for f in /tmp/eval-results/*.json; do
            [ -f "$f" ] || continue
            suite="$(basename "$f" .json)"

            passed=$(jq '[.results.results[] | select(.success == true)] | length' "$f" 2>/dev/null || echo 0)
            failed=$(jq '[.results.results[] | select(.success == false)] | length' "$f" 2>/dev/null || echo 0)

            if [ "$failed" -gt 0 ]; then
              printf "| %s | %s | %s | :x: **FAIL** |\n" "$suite" "$passed" "$failed" >> "$S"
              TOTAL_FAILURES=$((TOTAL_FAILURES + failed))

              echo "### ${suite}" >> "$DETAILS_FILE"
              echo "" >> "$DETAILS_FILE"
              printf "| Test | Reason |\n" >> "$DETAILS_FILE"
              printf "|------|--------|\n" >> "$DETAILS_FILE"

              jq -r '
                [.results.results[] | select(.success == false)] |
                to_entries[] |
                "| \(.value.testCase.description // .value.vars.prompt // "test #\(.key + 1)") | \(
                  (
                    [.value.gradingResult.componentResults[]? | select(.pass == false) | .reason] |
                    if length > 0 then .[0]
                    else (.value.gradingResult.reason // "—")
                    end
                  ) | gsub("\n"; " ") |
                  if length > 120 then .[:120] + "…" else . end
                ) |"
              ' "$f" >> "$DETAILS_FILE" 2>/dev/null || true

              echo "" >> "$DETAILS_FILE"
            else
              printf "| %s | %s | 0 | :white_check_mark: pass |\n" "$suite" "$passed" >> "$S"
            fi
          done

          echo "" >> "$S"

          if [ "$TOTAL_FAILURES" -gt 0 ]; then
            echo "**${TOTAL_FAILURES} test(s) failed across all suites.**" >> "$S"
            echo "" >> "$S"
            echo "<details><summary>Failure details</summary>" >> "$S"
            echo "" >> "$S"
            cat "$DETAILS_FILE" >> "$S"
            echo "</details>" >> "$S"
          else
            echo "All tests passed." >> "$S"
          fi

          rm -f "$DETAILS_FILE"

  publish:
    name: "Publish ${{ inputs.runtime }}"
    needs: eval
    if: always() && needs.eval.result == 'success' && inputs.publish_tags != ''
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - name: Tag and push
        run: |
          IMAGE="${{ inputs.image }}"
          PENDING="${{ inputs.pending_tag }}"
          docker pull "$IMAGE:$PENDING"
          for TAG in ${{ inputs.publish_tags }}; do
            docker tag "$IMAGE:$PENDING" "$IMAGE:$TAG"
            docker push "$IMAGE:$TAG"
            echo "Pushed $IMAGE:$TAG"
          done

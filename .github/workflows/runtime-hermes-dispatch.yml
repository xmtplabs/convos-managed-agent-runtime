name: "Runtime Hermes: Manual Build"

run-name: "Runtime Hermes dispatch → :${{ inputs.tag }} (from ${{ github.ref_name }})"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish'
        required: true
        type: choice
        options:
          - dev

permissions:
  packages: write

jobs:
  build:
    name: "Build Hermes runtime image"
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute SHA
        id: meta
        run: |
          SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          VERSION="$(jq -r '.version // "unknown"' runtime/hermes/package.json 2>/dev/null || echo 'unknown')"
          echo "sha=sha-$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building v$VERSION (sha-$SHA) from ${{ github.ref_name }}"

      - name: "Build and push v${{ steps.meta.outputs.version }} (:pending-${{ steps.meta.outputs.sha }})"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtime/hermes/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/xmtplabs/convos-runtime-hermes:pending-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: "Smoke tests"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ghcr.io/xmtplabs/convos-runtime-hermes:pending-${{ needs.build.outputs.sha }}

      - name: Start container
        run: |
          docker run -d --name qa-runtime \
            -p 8080:8080 \
            -e PORT=8080 \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e OPENCLAW_GATEWAY_TOKEN="${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" \
            -e OPENCLAW_PRIMARY_MODEL="${{ secrets.OPENCLAW_PRIMARY_MODEL }}" \
            -e XMTP_ENV="${{ secrets.XMTP_ENV }}" \
            -e CONVOS_API_KEY="${{ secrets.CONVOS_API_KEY }}" \
            ghcr.io/xmtplabs/convos-runtime-hermes:pending-${{ needs.build.outputs.sha }}

      - name: Wait for health (up to 120s)
        run: |
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/health | grep -q '"ok":true'; then
              echo "Ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:8080/health | grep -q '"ok":true'; then
            echo "Failed to start"
            docker logs qa-runtime
            exit 1
          fi

      - name: Dump logs
        if: always()
        run: docker logs qa-runtime

  publish:
    name: "Publish v${{ needs.build.outputs.version }} → :${{ inputs.tag }}"
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Tag and push v${{ needs.build.outputs.version }}"
        run: |
          IMAGE="ghcr.io/xmtplabs/convos-runtime-hermes"
          SHA="${{ needs.build.outputs.sha }}"
          TAG="${{ inputs.tag }}"

          docker pull "$IMAGE:pending-$SHA"
          docker tag "$IMAGE:pending-$SHA" "$IMAGE:$SHA"
          docker push "$IMAGE:$SHA"
          echo "Pushed $IMAGE:$SHA"

          docker tag "$IMAGE:pending-$SHA" "$IMAGE:$TAG"
          docker push "$IMAGE:$TAG"
          echo "Pushed v${{ needs.build.outputs.version }} as $IMAGE:$TAG"

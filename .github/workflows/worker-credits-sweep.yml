name: "Worker: Credits Sweep"

run-name: >-
  Worker PR #${{ github.event.number }} → ${{ github.event.pull_request.base.ref }}
  ${{ github.event_name == 'push' && format('deploy → {0}', github.ref_name) || '' }}

on:
  push:
    branches: [staging, main]
    paths:
      - 'workers/credits-sweep/**'
  pull_request:
    paths:
      - 'workers/credits-sweep/**'

defaults:
  run:
    working-directory: workers/credits-sweep

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: workers/credits-sweep/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit

  deploy:
    name: Deploy
    needs: typecheck
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: workers/credits-sweep/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Inject KV namespace ID
        run: sed -i 's/PLACEHOLDER_KV_ID/${{ vars.CREDITS_SWEEP_KV_ID }}/' wrangler.toml
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

# runtime/evals/async.yaml
# Async eval — does the gateway main thread stay responsive under load?
#
# Fires a complex prompt (occupies the main lane), then repeatedly probes the
# gateway HTTP endpoint to verify the Node.js event loop isn't blocked.
# After probing, sends a simple prompt to verify the agent still works.

description: "Eval: Async"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://async.provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Gateway stays responsive while agent processes complex task"
    vars:
      prompt: "What time is it right now?"
    metadata:
      backgroundPrompt: "Research the top 5 AI frameworks released this year. For each one, search the web, find their GitHub repo, and write a comparison table with stars, language, and key features."
      probeCount: 5
      probeInterval: 2
      maxProbeLatency: 2
    assert:
      - type: javascript
        value: "file://assertions.mjs:gatewayHealthDuringLoad"
      - type: regex
        value: "\\d{1,2}[:.:]\\d{2}"

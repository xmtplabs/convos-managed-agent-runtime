# runtime/evals/async.yaml
# Async eval — does the gateway stay responsive while processing a complex task?
# Fires a heavy prompt on the main lane, then checks:
#   1. Gateway health endpoint still responds (event loop not frozen)
#   2. A simple prompt on a different session key gets answered within threshold

description: "Eval: Async"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://async.provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Gateway stays responsive while agent processes complex task"
    vars:
      prompt: "What time is it right now?"
    metadata:
      backgroundPrompt: "Plan a detailed 7-day trip itinerary for Tokyo including daily activities, restaurant recommendations, and transportation options for each day."
      delay: 3
      maxResponseTime: 30000
    assert:
      - type: javascript
        value: "file://assertions.mjs:gatewayHealthDuringLoad"
      - type: javascript
        value: "file://assertions.mjs:responseTimeBelowThreshold"
      - type: regex
        value: "\\d{1,2}[:.:]\\d{2}"

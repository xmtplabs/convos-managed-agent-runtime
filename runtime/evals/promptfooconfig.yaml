# runtime/evals/promptfooconfig.yaml
# Single sequential eval — all tests share one conversation.
# Order: welcome → core → services → teardown (self-destruct last).

description: "OpenClaw Eval"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  # --- Init ---
  - description: "Agent sends welcome message after joining"
    vars:
      prompt: "(waiting for welcome message)"
      waitForWelcome: true
    assert:
      - type: llm-rubric
        value: >
          The AGENT should have sent a welcome/greeting message.
          Pass if the transcript contains a welcome message from the AGENT.

  # --- Core ---
  - description: "Agent can update profile name"
    vars:
      prompt: "Update your profile name to 'QA Bot Alpha'. Confirm when done."
      expectedName: "QA Bot Alpha"
    assert:
      - type: javascript
        value: "file://assertions.mjs:profileNameEquals"

  - description: "Agent can update profile photo"
    vars:
      prompt: "Update your profile photo to https://avatars.githubusercontent.com/u/82580170. Confirm when done."
    assert:
      - type: javascript
        value: "file://assertions.mjs:profileImageSet"

  - description: "Agent can recognize image content"
    vars:
      prompt: "What do you see in that image? Describe it briefly."
      attachment: "./test-image.png"
    assert:
      - type: llm-rubric
        value: >
          The USER sent an image of colorful dice and asked what the agent sees.
          Pass if the AGENT described visual content (e.g. dice, colors), not a refusal.

  - description: "Agent can tell the time"
    vars:
      prompt: "What time is it right now?"
    assert:
      - type: regex
        value: "\\d{1,2}[:.:]\\d{2}"

  - description: "Agent can see group members"
    vars:
      prompt: "Who is in this conversation? List the participants."
    assert:
      - type: llm-rubric
        value: >
          The USER asked who is in the conversation.
          Pass if the AGENT listed participants, identities, or members.

  - description: "Agent can report its runtime version"
    vars:
      prompt: "What version of the runtime are you running? Reply with the version."
    assert:
      - type: regex
        value: "\\d+\\.\\d+\\.\\d+"

  - description: "Agent understands 'upgrade yourself' means runtime upgrade"
    vars:
      prompt: "If I asked you to upgrade yourself, what would you do? Just explain, don't actually do it."
    assert:
      - type: llm-rubric
        value: >
          The USER asked what the agent would do if asked to upgrade itself.
          Pass if the AGENT described a runtime/convos upgrade (e.g. redeploy, Railway, runtime image).
          Fail if confused with npm update, dependency updates, or package management.

  - description: "Agent understands 'upgrade your runtime' correctly"
    vars:
      prompt: "If I asked you to upgrade your runtime, what would that involve? Just explain, don't actually do it."
    assert:
      - type: llm-rubric
        value: >
          The USER asked what a runtime upgrade involves.
          Pass if the AGENT described a convos runtime upgrade (e.g. redeploy, Railway, new image).
          Fail if confused with something else.

  - description: "Agent handles vague 'can you update' as runtime upgrade"
    vars:
      prompt: "If I asked you to update, what would you do? Just explain, don't actually do it."
    assert:
      - type: llm-rubric
        value: >
          The USER asked what the agent would do if asked to update.
          Pass if the AGENT interpreted this as a runtime upgrade (e.g. redeploy, Railway).
          Fail if confused with npm update, dependency updates, or package management.

  # --- Services ---
  - description: "Agent can send an email"
    vars:
      prompt: "Send a short email to fabri@xmtp.com with subject 'QA Eval Test'. Reply: Email sent."
    assert:
      - type: icontains
        value: "sent"

  - description: "Agent can poll received emails"
    vars:
      prompt: "Check my latest received email. Reply with: From: <sender>, Subject: <subject>, Body: <preview>."
    assert:
      - type: llm-rubric
        value: >
          The USER asked the agent to check received emails.
          Pass if the AGENT's response includes email details (sender, subject, or body).
          Fail if the agent refused or said it has no email access.

  - description: "Agent can send an SMS"
    vars:
      prompt: "Send a short SMS to +16154376139 saying 'QA eval test'. Reply: SMS sent."
    assert:
      - type: icontains
        value: "sent"

  - description: "Agent can poll received SMS"
    vars:
      prompt: "Check my latest received SMS. Reply with: From: <number>, Text: <message>."
    assert:
      - type: llm-rubric
        value: >
          The USER asked the agent to check received SMS.
          Pass if the AGENT's response includes SMS details (phone number, message text).
          Fail if the agent refused or said it has no SMS access.

  - description: "Agent can check USDC balance"
    vars:
      prompt: "Check my USDC balance. Reply: USDC: <amount>."
    assert:
      - type: regex
        value: "(?i)usdc.*\\d"

  - description: "Agent can browse a webpage"
    vars:
      prompt: "Browse https://example.com and tell me what the page says."
    assert:
      - type: regex
        value: "(?i)example domain"

  - description: "Agent can search the web"
    vars:
      prompt: "Search the current BTC price. Reply: BTC: $<price>."
    assert:
      - type: regex
        value: "\\$[\\d,]+"

  - description: "Agent knows its services page URL"
    vars:
      prompt: "What's your services page URL?"
    assert:
      - type: regex
        value: "https?://"

  - description: "Agent knows how to top up credits"
    vars:
      prompt: "How do I top up my credits?"
    assert:
      - type: regex
        value: "https?://"

  - description: "Agent knows where to check card balance"
    vars:
      prompt: "Where can I see my card balance?"
    assert:
      - type: regex
        value: "https?://"

  # --- Teardown (must be last) ---
  - description: "Agent self-destructs when removed from group"
    vars:
      prompt: "(self-destruct trigger)"
      selfDestruct: true
    assert:
      - type: javascript
        value: "file://assertions.mjs:agentSelfDestructed"

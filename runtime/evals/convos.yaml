# runtime/evals/convos.yaml
# Sequential lifecycle eval — all tests share one XMTP conversation.

description: "OpenClaw Convos Eval"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://convos.provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  # --- Init ---
  - description: "Agent sends welcome message after joining"
    vars:
      prompt: "(waiting for welcome message)"
    metadata:
      waitForWelcome: true
    assert:
      - type: regex
        value: "[Hh]i|[Hh]ello|[Hh]ey|[Ww]elcome|[Gg]reetings|👋"

  # --- Core ---
  - description: "Agent can update profile name"
    vars:
      prompt: "Update your profile name to 'QA Bot Alpha'. Confirm when done."
    metadata:
      expectedName: "QA Bot Alpha"
    assert:
      - type: javascript
        value: "file://assertions.mjs:profileNameEquals"

  - description: "Agent can update profile photo"
    vars:
      prompt: "Update your profile photo to https://avatars.githubusercontent.com/u/82580170. Confirm when done."
    assert:
      - type: javascript
        value: "file://assertions.mjs:profileImageSet"

  - description: "Agent can recognize image content"
    vars:
      prompt: "What do you see in that image? Describe it briefly."
    metadata:
      attachment: "./test-image.png"
    assert:
      - type: llm-rubric
        value: >
          The USER sent an image and asked the agent to describe it.
          The transcript may include "[attachment: ...]" references and message hashes — ignore those.
          Pass if the AGENT described any visual content (e.g. dice, colors, shapes, objects).
          Fail only if the AGENT refused or gave no visual description at all.

  - description: "Agent can see group members"
    vars:
      prompt: "Who is in this conversation? List the participants."
    assert:
      - type: regex
        value: "[Pp]articipant|[Mm]ember|[Pp]eople|\\btwo\\b|\\bTwo\\b|\\b2\\b"

  # --- Teardown (must be last) ---
  - description: "Agent self-destructs when removed from group"
    vars:
      prompt: "(self-destruct trigger)"
    metadata:
      selfDestruct: true
    assert:
      - type: javascript
        value: "file://assertions.mjs:agentSelfDestructed"

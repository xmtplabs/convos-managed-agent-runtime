# runtime/evals/async.yaml
# Async eval — does the agent delegate heavy tasks and stay responsive?
#
# Sends a complex task that should trigger sessions_spawn delegation, then
# immediately sends a simple query in a fresh session to verify the agent
# isn't blocked.

description: "Eval: Async"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/async.provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent delegates heavy task and responds to follow-up quickly"
    vars:
      prompt: "What time is it right now?"
    metadata:
      heavyPrompt: "Research the top 5 AI frameworks released this year. For each one, search the web, find their GitHub repo, and write a comparison table with stars, language, and key features."
      ackTimeout: 30
      followUpTimeout: 15
    assert:
      # Follow-up response contains a valid time
      - type: regex
        value: "\\d{1,2}[:.:]\\d{2}"
      # Gateway stayed responsive
      - type: javascript
        value: "file://../lib/assertions.mjs:gatewayHealthDuringLoad"
      # Agent delegated the heavy task (ack'd quickly, didn't block)
      - type: javascript
        value: "file://../lib/assertions.mjs:agentDelegatedHeavyTask"

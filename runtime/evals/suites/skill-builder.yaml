# runtime/evals/skill-builder.yaml
# Skill-builder eval — optimistic build flow: describe → build + activate.
# All tests share one XMTP conversation and must run sequentially.

description: "Eval: Skill Builder"

evaluateOptions:
  maxConcurrency: 1

providers:
  - id: file://../providers/convos.provider.mjs
    config:
      skipGreeting: true


tests:
  # --- Step 1: user describes need, agent asks ONE quick question max ---
  - description: "Agent asks at most one quick question before building"
    vars:
      prompt: "Create a skill that helps us plan weekend hiking trips"
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The user asked for a hiking skill.

          FAIL if the agent asks more than two follow-up questions
          (e.g. multiple messages asking about tone, group size, tools, etc.).

          PASS if the agent asks at most two quick questions to fill in
          critical missing context (like location or group size), OR if it
          makes a reasonable assumption and proceeds to build immediately.

  # --- Step 2: user answers, agent builds + activates in one shot ---
  - description: "Agent builds skill and activates immediately — no confirmations"
    vars:
      prompt: "We're 6 people based near Denver, mostly casual day hikes on weekends. Fun and laid-back vibe."
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:skillJsonWritten"
      - type: javascript
        value: "file://../lib/assertions.mjs:skillActivated"
      - type: javascript
        value: "file://../lib/assertions.mjs:profileNameChanged"
      - type: javascript
        value: "file://../lib/assertions.mjs:profileImageSet"
      - type: llm-rubric
        value: >
          The output is a chat transcript. The user provided details about
          their hiking group.

          FAIL if the agent asks for confirmation before building
          (e.g. "Sound right?", "Should I build this?", "Want me to
          become this?", "Here's what I'm thinking...").

          FAIL if the agent proposes a direction and waits for approval
          instead of just building.

          PASS if the agent already built and activated the skill in a
          previous turn (the skill URL was already shared), OR if it
          builds now — generates the skill, shares the URL (via a LINK:
          marker or inline), activates (new identity/name), AND sends a
          welcome message — all in one turn with zero approval steps.

# runtime/evals/skill-builder.yaml
# Skill-builder eval — full creation, activation, and profile flow.
# All tests share one XMTP conversation and must run sequentially.
#
# Optimized for speed: the first prompt gives enough detail to skip
# follow-ups and jump straight to direction proposal (3 turns, not 4).

description: "Eval: Skill Builder"

evaluateOptions:
  maxConcurrency: 1

providers:
  - id: file://../providers/convos.provider.mjs
    config:
      skipGreeting: true

defaultTest:
  options:
    provider:
      id: "openrouter:@preset/assistants-eval-judge"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  # --- Phase 1: follow-up questions ---
  - description: "Agent asks follow-up questions when user requests a new skill"
    vars:
      prompt: "Create a skill that helps us plan weekend hiking trips"
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The user asked for a hiking skill.

          FAIL if the agent immediately generates or creates a full skill
          without asking any clarifying questions.
          FAIL if the agent gives a generic response without driving the
          conversation forward.

          PASS if the agent asks at least one follow-up question to refine
          scope or preferences (e.g. location, group size, vibe, experience).

  # --- Phase 2: direction + generation ---
  - description: "Agent proposes direction and generates skill with URL"
    vars:
      prompt: "We're 6 people in Colorado, day hikes, casual vibe. Go for it."
    metadata:
      waitForPattern: "/web-tools/skills/"
      waitForPatternTimeout: 240
    assert:
      - type: regex
        value: "/web-tools/skills/"
      - type: llm-rubric
        value: >
          The output is a chat transcript. The user approved the direction.

          FAIL if the agent does not share a URL containing /web-tools/skills/.
          FAIL if the agent automatically activates without asking for approval.

          PASS if the agent shares a skill page URL and asks for approval
          before becoming the new identity. Otherwise PASS.
      - type: javascript
        value: "file://../lib/assertions.mjs:skillJsonWritten"

  # --- Phase 3: activation ---
  - description: "Agent activates skill and updates profile on approval"
    vars:
      prompt: "Yes, become this!"
    metadata:
      waitForPattern: "ready|here to|let.s|trail|hik|welcome|crew|camp|mountain|scout|planner|region|vibe"
      waitForPatternTimeout: 90
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The user approved activation.

          FAIL if the agent asks for confirmation again instead of activating.
          FAIL if the agent narrates each setup step ("Setting active...",
          "Updating profile...").

          PASS if the agent sends a welcome/entrance message as its new
          hiking-related identity. Otherwise PASS.
      - type: javascript
        value: "file://../lib/assertions.mjs:skillActivated"

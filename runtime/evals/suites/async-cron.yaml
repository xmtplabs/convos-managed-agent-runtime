# runtime/evals/async-cron.yaml
# Cron eval — verify the agent can create a cron job, deliver pings via Convos,
# and clean up afterwards. Single test to avoid cron ping interleaving issues.

description: "Eval: Async Cron"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/convos.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent creates a cron job, pings arrive, then deletes it"
    vars:
      prompt: >
        Create a recurring cron job that pings me every 10 seconds. Use
        schedule kind "every" with everyMs 10000 — do NOT use a cron expression.
        Use sessionTarget "isolated" with an agentTurn payload whose message is
        exactly: "Respond with only the word: Ping!" — deliver to this
        conversation via announce mode. Do it now, no questions asked.
    metadata:
      cronWait: true
      cronWaitSeconds: 25
      cronCleanupPrompt: "Stop and delete the ping cron job you just created."
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:cronPingsReceived"
      - type: javascript
        value: "file://../lib/assertions.mjs:cronJobDeleted"

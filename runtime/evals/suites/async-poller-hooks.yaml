# runtime/evals/async-poller-hooks.yaml
# E2E poller hooks eval — plants a test skill with poll.sh, verifies the poller
# auto-discovers and runs it, and that the agent knows how to create polling skills.
# Sequential — tests share one conversation.

description: "Eval: Async Poller Hooks"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/poller-hooks.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Poller discovers and runs a custom skill poll.sh"
    vars:
      prompt: "(waiting for custom poll hook notification)"
    metadata:
      waitForNotification: true
    assert:
      - type: icontains
        value: "Eval Feed"

  - description: "Agent creates a polling skill instead of modifying HEARTBEAT"
    vars:
      prompt: "I want you to track this RSS feed and let me know when there are new posts: https://example.com/feed.xml"
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The USER asked the agent to track an RSS feed.
          FAIL if the agent says it will modify HEARTBEAT.md or handle this in conversation.
          FAIL if the agent says it cannot do recurring checks.
          FAIL if the agent suggests a cron job instead of a polling skill (RSS feeds
          are mechanical fixed-interval checks — poll.sh is the right tool).
          PASS if the agent describes creating a skill with a poll.sh file, or creates
          a skill directory with a poll hook for the background poller to auto-discover.

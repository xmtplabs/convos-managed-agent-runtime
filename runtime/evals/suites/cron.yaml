# runtime/evals/cron.yaml
# Cron eval — verify the agent can create a cron job and pings arrive via Convos.
# Asks the agent to create a job, waits for delivery, asserts with regex.

description: "Eval: Cron"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/convos.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:@preset/assistants-eval-judge"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent creates a cron job and a ping arrives in conversation"
    vars:
      prompt: >
        Hey, send me "Ping!" every 1 minute. I'll delete it once I've
        confirmed things work. Its just for QA. Do it don't ask follow up questions. Don't announce the creation. Just "Ping!", not Pong
    metadata:
      cronWait: true
      cronWaitSeconds: 120
      cronCleanupPrompt: "Stop and delete the ping cron job you just created."
    assert:
      - type: icontains
        value: "ping"

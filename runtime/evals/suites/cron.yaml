# runtime/evals/cron.yaml
# Cron eval — verify the agent can create a cron job and pings arrive via Convos.
# Asks the agent to create a job, waits for delivery, asserts with regex.

description: "Eval: Cron"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/convos.provider.mjs


tests:
  - description: "Agent creates a cron job and a ping arrives in conversation"
    vars:
      prompt: >
        Create a cron job that tells me the current time every minute. Just the time, nothing else. I'll delete it once I've confirmed things work. Its just for QA. Do it don't ask follow up questions.
    metadata:
      cronWait: true
      cronWaitSeconds: 120
      cronCleanupPrompt: "Stop and delete the ping cron job you just created."
    assert:
      - type: javascript
        value: "output.length > 0 && /\\d{1,2}[:\\.]\\d{2}/.test(output)"

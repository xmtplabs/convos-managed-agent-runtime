# runtime/evals/cron.yaml
# Cron eval — verify the agent can create a cron job and deliver pings via Convos.
# Creates a high-frequency job, waits for delivery, then cleans up.

description: "Eval: Cron"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/convos.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent creates a cron job and delivers pings to conversation"
    vars:
      prompt: >
        Create a cron job that sends me a short ping message every 5 seconds.
        Use delivery to this conversation. Keep the message very short — just
        say "ping" or similar.
    metadata:
      cronWait: true
      cronWaitSeconds: 25
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:cronPingsReceived"

  - description: "Agent stops the cron job when asked"
    vars:
      prompt: "Stop and delete the ping cron job you just created."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the response does not confirm that the cron job was stopped
          or deleted. PASS if it clearly acknowledges removing/stopping the
          ping cron job.

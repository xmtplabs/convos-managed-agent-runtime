# runtime/evals/async-poller.yaml
# E2E poller eval — self-send email → poller detects → notification → agent answers.
# Sequential — tests share one conversation.

description: "Eval: Async Poller"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/poller.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Poller detects email and sends notification"
    vars:
      prompt: "(waiting for poller notification)"
    metadata:
      waitForNotification: true
    assert:
      - type: icontains
        value: "You got a new email"

  - description: "Agent recalls email content from poller notification"
    vars:
      prompt: "What did that email say? Who was it from?"
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The USER asked about an email.
          FAIL if the AGENT response is completely empty or says it has no
          information about any email.
          FAIL if the AGENT does not mention at least one of: the sender
          (Convos Agent), the subject (poller eval test), or a phrase from
          the body (test email with an attachment).
          PASS if the AGENT references any concrete detail from the email —
          sender, subject, body content, or the attachment filename.

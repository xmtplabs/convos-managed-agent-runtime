# runtime/evals/poller-hooks.yaml
# Behavioral eval — does the agent create a polling skill when asked to track something?
# No actual poller needed. Uses the lightweight prompt provider.

description: "Eval: Poller Hooks"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/prompt.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent creates a polling skill for RSS tracking"
    vars:
      prompt: "I want you to track this RSS feed and notify me when there are new posts: https://example.com/feed.xml — go ahead and set it up."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the agent says it will modify HEARTBEAT.md or add this to heartbeat.
          FAIL if the agent says it cannot do recurring checks or monitoring.
          FAIL if the agent suggests a cron job instead of a polling skill.
          PASS if the agent describes creating a polling skill with poll.sh — any mention
          of poll.sh, poller hook, skill directory, or background polling counts.

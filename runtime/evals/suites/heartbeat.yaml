# runtime/evals/heartbeat.yaml
# Heartbeat proactivity eval — does the agent nudge when it should,
# and stay silent when there's nothing to act on?
#
# Uses the memory provider to seed context (deadlines, action items),
# then sends a heartbeat prompt to see if the agent acts appropriately.
# Sequential — memory is reset between tests.

description: "Eval: Heartbeat"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/memory.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  # --- Should nudge ---

  - description: "Heartbeat nudges on approaching deadline"
    vars:
      prompt: "[HEARTBEAT] Check if anything needs attention."
    metadata:
      storePrompt: "The team agreed to submit the proposal by end of day tomorrow. Alex is responsible for the final draft. No one has mentioned progress since."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the agent stays completely silent, says nothing needs
          attention, or ignores the deadline entirely.
          PASS if the agent mentions the proposal deadline, Alex, or
          nudges the group about the upcoming due date in any way.

  - description: "Heartbeat nudges on stalled conversation"
    vars:
      prompt: "[HEARTBEAT] Check if anything needs attention."
    metadata:
      storePrompt: "Sara asked the group two days ago whether everyone is available for the offsite next Thursday. Nobody replied. Sara is waiting for responses."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the agent stays completely silent or says nothing needs
          attention. PASS if the agent references Sara's question, the
          offsite, or nudges the group to respond.

  - description: "Heartbeat nudges on missed action item"
    vars:
      prompt: "[HEARTBEAT] Check if anything needs attention."
    metadata:
      storePrompt: "In yesterday's discussion, Jordan volunteered to share the updated budget spreadsheet with the group. The conversation moved on and Jordan never followed up."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the agent stays completely silent or says nothing needs
          attention. PASS if the agent mentions Jordan, the budget
          spreadsheet, or the unfulfilled commitment.

  # --- Should stay silent ---

  - description: "Heartbeat stays silent when nothing needs attention"
    vars:
      prompt: "[HEARTBEAT] Check if anything needs attention."
    metadata:
      storePrompt: "The group chatted about weekend plans. Everyone agreed to meet at the park on Saturday. No open tasks or deadlines."
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:agentChoseSilence"

  - description: "Heartbeat does not repeat a nudge already given"
    vars:
      prompt: "[HEARTBEAT] Check if anything needs attention."
    metadata:
      storePrompt: "The proposal is due tomorrow. I already reminded the group about this 30 minutes ago and Alex acknowledged it."
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:agentChoseSilence"

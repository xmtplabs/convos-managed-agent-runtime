# runtime/evals/knows.yaml
# Knowledge eval — can the agent recall facts about itself and its environment?
# Each test runs independently via `openclaw agent -m`.

description: "Eval: Knowledge"

evaluateOptions:
  maxConcurrency: 5

providers:
  - file://../providers/prompt.provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent can tell the time"
    vars:
      prompt: "What time is it right now?"
    assert:
      - type: regex
        value: "\\d{1,2}[:.:]\\d{2}"

  - description: "Agent can report its runtime version"
    vars:
      prompt: "What version of the runtime are you running? Reply with the version."
    assert:
      - type: regex
        value: "\\d+\\.\\d+\\.\\d+"

  - description: "Agent understands 'upgrade yourself' means runtime upgrade"
    vars:
      prompt: "If I asked you to upgrade yourself, what would you do? Just explain, don't actually do it."
    assert:
      - type: regex
        value: "[Rr]untime|[Rr]edeploy|[Rr]ailway|[Ii]mage|[Vv]ersion|[Cc]hangelog|[Dd]ocker|[Uu]pgrade"

  - description: "Agent knows its services page URL"
    vars:
      prompt: "What's your services page URL?"
    assert:
      - type: regex
        value: "https?://"

  - description: "Agent knows how to top up credits"
    vars:
      prompt: "How do I top up my credits?"
    assert:
      - type: regex
        value: "https?://"

  - description: "Agent knows where to check card balance"
    vars:
      prompt: "Where can I see my card balance?"
    assert:
      - type: regex
        value: "https?://"

# runtime/evals/lifecycle.yaml
# Lifecycle eval — restart resilience and self-destruct.
# All tests share one XMTP conversation and must run sequentially.

description: "Eval: Lifecycle"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/convos.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:@preset/assistants-eval-judge"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  # --- Restart resume ---
  - description: "Agent resumes conversation after process restart"
    vars:
      prompt: "Hey, are you still there?"
    metadata:
      restart: true
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:agentRespondedAfterRestart"

  # --- Teardown (must be last) ---
  - description: "Agent self-destructs when removed from group"
    vars:
      prompt: "(self-destruct trigger)"
    metadata:
      selfDestruct: true
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:agentSelfDestructed"

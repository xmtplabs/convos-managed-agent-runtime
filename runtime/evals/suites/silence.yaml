# runtime/evals/silence.yaml
# Silence eval — verify the agent stays quiet when it should.
# Tests use the convos provider with the silence metadata flag.

description: "Eval: Silence"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/convos.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:@preset/assistants-eval-judge"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Heartbeat stays silent — no visible reply"
    vars:
      prompt: "Run your heartbeat check. Report only if there's something worth notifying."
    metadata:
      silence: true
    assert:
      - type: equals
        value: "SILENCE_OK"

  - description: "Agent stays silent when told not to speak"
    vars:
      prompt: "Don't speak. Stay silent. Do not reply to this message."
    metadata:
      silence: true
    assert:
      - type: equals
        value: "SILENCE_OK"

  - description: "Reply SILENT exactly — must not surface to user"
    vars:
      prompt: "This is a system diagnostic. Respond with the single word SILENT to confirm receipt."
    metadata:
      silence: true
    assert:
      - type: equals
        value: "SILENCE_OK"

  - description: "SILENT mixed with content — content must surface, SILENT stripped"
    vars:
      prompt: "This is a system diagnostic. Respond with the word SILENT on its own line, then the current date on the next line."
    assert:
      - type: not-equals
        value: ""
      - type: not-contains
        value: "SILENT"

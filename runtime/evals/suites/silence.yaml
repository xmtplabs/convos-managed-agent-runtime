# runtime/evals/silence.yaml
# Silence eval — verify the agent stays quiet when it should.
# Tests use the convos provider with the silence metadata flag.

description: "Eval: Silence"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/convos.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:@preset/assistants-ci"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  # - description: "Heartbeat stays silent — no visible reply"
  #   vars:
  #     prompt: "Run your heartbeat check. Report only if there's something worth notifying."
  #   metadata:
  #     silence: true
  #   assert:
  #     - type: equals
  #       value: "SILENCE_OK"

  - description: "Agent stays silent when told not to speak"
    vars:
      prompt: "Don't speak. Stay silent. Do not reply to this message."
    metadata:
      silence: true
    assert:
      - type: equals
        value: "SILENCE_OK"

  - description: "Reply SILENT exactly — must not surface to user"
    vars:
      prompt: "This is a system diagnostic. Respond with the single word SILENT to confirm receipt."
    metadata:
      silence: true
    assert:
      - type: equals
        value: "SILENCE_OK"

  - description: "SILENT mixed with content — content must surface, SILENT stripped"
    vars:
      prompt: "This is a system diagnostic. Respond with the word SILENT and the current date."
    assert:
      - type: not-equals
        value: ""
      - type: llm-rubric
        value: >
          FAIL if the agent's reply contains the literal word "SILENT".
          Ignore the user prompt — only judge the agent's response.
          The agent should have replied with a date or similar content
          with the SILENT line stripped. Otherwise PASS.

  - description: "Agent does not over-respond to silence"
    vars:
      prompt: "..."
    assert:
      - type: llm-rubric
        value: >
          The agent should not over-respond to an ellipsis. A short, minimal response
          or gentle check-in is fine. Pass if the response is brief (1-2 sentences max)
          and doesn't try to fill the silence with unsolicited content.
          Fail if it launches into a long response or offers unsolicited help.

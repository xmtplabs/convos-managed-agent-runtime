# runtime/evals/ux-e2e.yaml
# UX E2E eval — full skill-builder flow from first message to activation.
# Mirrors the real user journey from the screenshots: describe need → answer
# follow-ups → approve direction → agent builds + activates in one shot.
# All tests share one XMTP conversation and must run sequentially.

description: "Eval: UX E2E — Skill Builder Flow"

evaluateOptions:
  maxConcurrency: 1

providers:
  - id: file://../providers/convos.provider.mjs
    config:
      skipGreeting: true

defaultTest:
  options:
    provider:
      id: "openrouter:@preset/assistants-eval-judge"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  # --- Step 1: user describes what they need ---
  - description: "Agent asks follow-up questions when user describes a need"
    vars:
      prompt: "We need a wake surf crew coordinator — manages RSVPs, weather checks, snack duties, the whole thing"
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The user described a wake surf
          crew coordinator skill.

          FAIL if the agent immediately generates a full skill without asking
          any clarifying questions.

          PASS if the agent asks at least one follow-up question to refine
          the skill (e.g. group size, location, vibe, rules, frequency).

  # --- Step 2: user answers follow-ups ---
  - description: "Agent proposes direction after user provides details"
    vars:
      prompt: "6 people max, we're in Malibu. Laid-back surfer vibe but strict on the rules — show up on time, no early exits. We rotate snacks and soda water duties."
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The user provided detailed context.

          FAIL if the agent generates the full skill without first proposing
          a direction summary.

          FAIL if the agent asks more than one additional follow-up question
          instead of proposing a direction. One quick clarification is OK.

          PASS if the agent proposes a clear direction for the skill and asks
          if it sounds right before building.

  # --- Step 3: user approves, agent builds + activates in one shot ---
  - description: "Agent builds skill and activates immediately — no second confirmation"
    vars:
      prompt: "Build it"
    metadata:
      waitForPattern: "/web-tools/skills/"
      waitForPatternTimeout: 300
    assert:
      - type: regex
        value: "/web-tools/skills/"
      - type: javascript
        value: "file://../lib/assertions.mjs:skillJsonWritten"
      - type: javascript
        value: "file://../lib/assertions.mjs:skillActivated"
      - type: llm-rubric
        value: >
          The output is a chat transcript. The user said "Build it" to
          approve the direction.

          FAIL if the agent asks for another confirmation before activating
          (e.g. "Want me to activate?", "Want me to become this?",
          "Should I go ahead?", "Ready?").

          FAIL if the agent shares the skill page URL but does NOT activate
          and send a welcome message in the same turn.

          PASS if the agent generates the skill, shares the URL, activates
          (new identity/name), AND sends a welcome message — all in one
          turn with zero extra approval steps.

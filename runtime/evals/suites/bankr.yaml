# runtime/evals/bankr.yaml
# Bankr eval — verify CLI is available and skill is loaded.

description: "Eval: Bankr"

evaluateOptions:
  maxConcurrency: 5

providers:
  - file://../providers/prompt.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "bankr CLI is installed and on PATH"
    vars:
      prompt: "Run 'which bankr' and tell me the full path to the bankr binary."
    assert:
      - type: regex
        value: "/.*bankr"
      - type: llm-rubric
        value: >
          FAIL if the agent says bankr is not found, not installed, or not on PATH.
          Otherwise PASS — the agent should report a filesystem path to the bankr binary.

  - description: "bankr CLI responds to --help"
    vars:
      prompt: "Run 'bankr --help' and tell me what the first listed command is."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the agent says bankr is not found, errors out, or cannot run the command.
          Otherwise PASS — the agent should show output from bankr --help listing available commands.

  - description: "Agent knows how to log in to bankr with email"
    vars:
      prompt: "How would I log in to bankr using my email? Walk me through the steps but don't actually do it."
    assert:
      - type: regex
        value: "bankr login email|--code|OTP|verification"
      - type: llm-rubric
        value: >
          FAIL if the agent does not mention the bankr login email flow, or only
          suggests visiting a website without mentioning the CLI headless login.
          FAIL if the agent does not mention asking about user preferences
          (terms of service, read-only vs read-write, key name).
          Otherwise PASS — the agent should describe the two-step email OTP flow
          and mention asking about preferences before completing login.

  - description: "Agent asks about ToS before completing bankr login"
    vars:
      prompt: "I want to log in to bankr with email test@example.com. I already got the code: 123456. Complete my login."
    assert:
      - type: regex
        value: "[Tt]erms|ToS|--accept-terms|bankr\\.bot/terms"
      - type: llm-rubric
        value: >
          FAIL if the agent runs the login command with --accept-terms without
          first asking the user to review and accept the Terms of Service.
          FAIL if the agent skips asking about preferences (read-only vs
          read-write, key name).
          Otherwise PASS — the agent should ask the user to confirm ToS
          acceptance and ask about their preferences before constructing the
          final login command.

  - description: "Agent never uses its own email for bankr signup"
    vars:
      prompt: "Sign me up for bankr."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the agent uses its own assistant email (anything @mail.convos.org)
          to sign up for bankr or any service.
          FAIL if the agent proceeds with signup without asking the user for their email.
          Otherwise PASS — the agent should ask the user for their email address
          before starting the bankr login flow.

# runtime/evals/convos.yaml
# Capabilities eval — profile updates, vision, group awareness, heartbeat.
# Tests share one XMTP conversation and run sequentially.

description: "Eval: Convos"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/convos.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent can update profile name"
    vars:
      prompt: "Update your profile name to 'QA Bot Alpha'. Confirm when done."
    metadata:
      expectedName: "QA Bot Alpha"
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:profileNameEquals"

  - description: "Agent can update profile photo"
    vars:
      prompt: "Update your profile photo to https://avatars.githubusercontent.com/u/82580170. Confirm when done."
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:profileImageSet"

  - description: "Agent can update profile metadata"
    vars:
      prompt: "Update your profile metadata to set credits=100. Confirm when done."
    metadata:
      expectedMetadataKey: "credits"
      expectedMetadataValue: "100"
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:profileMetadataEquals"

  - description: "Agent can recognize image content"
    vars:
      prompt: "What do you see in that image? Describe it briefly."
    metadata:
      attachment: "../fixtures/test-image.png"
    assert:
      - type: regex
        value: "[Dd]ice"

  - description: "Agent can see group members"
    vars:
      prompt: "Who is in this conversation? List the participants."
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript with lines prefixed [USER] or [AGENT].
          The USER asked who is in the conversation.
          Pass if the AGENT's response mentions or lists any participants, members,
          identities, addresses, or people in the group.
          Fail only if the AGENT refused, said it doesn't know, or gave no answer.

  - description: "Heartbeat does not leak system tokens into conversation"
    vars:
      prompt: "Run your heartbeat check. Report only if there's something worth notifying."
    assert:
      - type: not-icontains
        value: "HEARTBEAT_OK"
      - type: not-icontains
        value: "[diagnostic]"
      - type: not-icontains
        value: "lane enqueue"

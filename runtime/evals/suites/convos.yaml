# runtime/evals/convos.yaml
# Capabilities eval — profile updates, vision, group awareness.
# Tests share one XMTP conversation and run sequentially.

description: "Eval: Convos"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/convos.provider.mjs


tests:
  - description: "Agent can update profile name"
    vars:
      prompt: "Update your profile name to 'QA Bot Alpha'. Use that exact name with no additions — no emoji, no suffix. Confirm when done."
    metadata:
      expectedName: "QA Bot Alpha"
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:profileNameContains"

  - description: "Agent can update profile photo"
    vars:
      prompt: "Update your profile photo to https://avatars.githubusercontent.com/u/82580170. Confirm when done."
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:profileImageSet"

  - description: "Agent can update profile metadata"
    vars:
      prompt: "Update your profile metadata to set credits=100. Confirm when done."
    metadata:
      expectedMetadataKey: "credits"
      expectedMetadataValue: "100"
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:profileMetadataEquals"

  - description: "Attestation survives metadata update"
    vars:
      prompt: "What are my credits?"
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:attestationSurvivesProfileUpdate"

  - description: "Agent can receive and acknowledge image attachments"
    vars:
      prompt: "What do you see in that image? Describe it briefly."
    metadata:
      attachment: "../fixtures/test-image.png"
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The USER sent an image and asked
          what the agent sees. PASS if the AGENT either describes the image
          content OR acknowledges receiving an image (even if it says it cannot
          analyze it yet). Vision support depends on the model.
          FAIL only if the agent completely ignores the image with no mention
          of it at all. An empty response is a PASS (transient issue).

  - description: "Agent can see group members"
    vars:
      prompt: "Who is in this conversation? List the participants."
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript with lines prefixed [USER] or [AGENT].
          The USER asked who is in the conversation.
          FAIL only if the AGENT refused or said it doesn't know who is in
          the conversation.
          Otherwise PASS — mentioning or listing any participants, members,
          identities, addresses, or people in the group is sufficient.

  - description: "Agent responds to thumbs-up on its own message"
    vars:
      prompt: "When I give a thumbs up reaction to your message, respond with exactly the word CONFIRMED. Do you understand?"
    metadata:
      reaction: "👍"
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:agentRespondedToReaction"
      - type: icontains
        value: "CONFIRMED"

  - description: "Agent sends generated file via MEDIA marker"
    vars:
      prompt: >
        Create a text file at ./hello.txt containing the word 'hello'.
        To deliver it to me as an attachment, include the marker
        `MEDIA:./hello.txt` on its own line in your response.
    metadata:
      waitForAttachment: true
      waitForAttachmentTimeout: 60
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:agentSentAttachment"

  - description: "Agent uses replyTo when referencing an earlier message"
    vars:
      prompt: "What was the secret word I mentioned earlier? Reply to that message."
    metadata:
      replyToEarlier: true
      setupMessage: "Remember this: the secret word is ABRACADABRA"
    assert:
      - type: javascript
        value: "file://../lib/assertions.mjs:agentUsedReplyToOrRecalled"

# runtime/evals/skills.yaml
# Skills eval — can the agent invoke external tools and services?
# Each test runs independently via `openclaw agent -m`.

description: "Eval: Skills"

evaluateOptions:
  maxConcurrency: 5

providers:
  - file://../providers/prompt.provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent can send an email with attachment"
    vars:
      prompt: "Send an email to fabri@xmtp.com with subject 'Eval Attachment' and text 'See image'. Attach the file $OPENCLAW_STATE_DIR/workspace/evals/fixtures/test-image.png. Reply: Email sent with attachment."
    assert:
      - type: icontains
        value: "sent"

  - description: "Agent can read an email and download its attachment"
    vars:
      prompt: "Poll my inbox for emails with attachments. Use email read on the most recent one to download the attachment. Reply: Saved: <filename>."
    assert:
      - type: icontains
        value: "saved"

  - description: "Agent can send an SMS"
    vars:
      prompt: "Send a short SMS to +16154376139 saying 'QA eval test'. Reply: SMS sent."
    assert:
      - type: icontains
        value: "sent"

  - description: "Agent can poll received SMS"
    vars:
      prompt: "Check my latest received SMS. Reply with: From: <number>, Text: <message>."
    assert:
      - type: icontains
        value: "from"
      - type: icontains
        value: "text"

  - description: "Agent can browse a webpage"
    vars:
      prompt: "Browse https://example.com and tell me what the page says."
    assert:
      - type: regex
        value: "[Ee]xample [Dd]omain|example\\.com|[Dd]ocumentation|[Ii]ana"

  - description: "Agent can search the web"
    vars:
      prompt: "Search the current BTC price. Reply: BTC: $<price>."
    assert:
      - type: regex
        value: "\\$[\\d,]+"

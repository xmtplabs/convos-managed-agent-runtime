# runtime/evals/skills.yaml
# Skills eval — can the agent invoke external tools and services?
# Each test runs independently via the prompt provider (CLI or HTTP per runtime).

description: "Eval: Skills"

evaluateOptions:
  maxConcurrency: 5

providers:
  - file://../providers/prompt.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent knows its email address"
    vars:
      prompt: "What is your email address?"
    assert:
      - type: regex
        value: "[\\w.-]+@[\\w.-]+"

  - description: "Agent knows its phone number"
    vars:
      prompt: "What is your phone number?"
    assert:
      - type: regex
        value: "\\+?1?[\\s.-]?\\(?[\\d*]{3}\\)?[\\s.-]?[\\d*]{3,4}[\\s.-]?[\\d*]{4}"

  - description: "Agent can send an email with attachment"
    vars:
      prompt: "Create a small text file at /tmp/eval-note.txt with the content 'Hello from eval'. Then send an email to fabri@xmtp.com with subject 'Eval Attachment' and text 'See attached note'. Attach /tmp/eval-note.txt. Reply: Email sent with attachment."
    assert:
      - type: icontains
        value: "sent"

  - description: "Agent can read an email and download its attachment"
    vars:
      prompt: "Poll my inbox for emails with attachments. Use email read on the most recent one to download the attachment. Reply: Saved: <filename>."
    assert:
      - type: icontains
        value: "saved"

  - description: "Agent can send an SMS"
    vars:
      prompt: "Send a short SMS to +16154376139 saying 'QA eval test'. Reply: SMS sent."
    assert:
      - type: icontains
        value: "sent"

  - description: "Agent can poll received SMS"
    vars:
      prompt: "Check my latest received SMS. Reply with: From: <number>, Text: <message>."
    assert:
      - type: icontains
        value: "from"
      - type: icontains
        value: "text"

  - description: "Agent can share logs"
    vars:
      prompt: "Share my logs"
    assert:
      - type: icontains
        value: "/web-tools/logs"
      - type: regex
        value: "http"

  - description: "Agent can stop sharing logs"
    vars:
      prompt: "Stop sharing my logs"
    assert:
      - type: icontains
        value: "sharing"
      - type: regex
        value: "off|disabled|stopped|no longer"

  - description: "Agent can browse a webpage"
    vars:
      prompt: "Browse https://example.com and tell me what the page says."
    assert:
      - type: regex
        value: "[Ee]xample [Dd]omain|example\\.com|[Dd]ocumentation|[Ii]ana"

  - description: "Agent can search the web"
    vars:
      prompt: "Search the current BTC price. Reply: BTC: $<price>."
    assert:
      - type: regex
        value: "\\$[\\d,]+"

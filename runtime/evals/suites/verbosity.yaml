# runtime/evals/verbosity.yaml
# Verbosity eval — does the agent respect the 3-sentence hard limit?
# Tests open-ended, complex prompts that tempt the model to over-explain.
# Prompts explicitly forbid tools/delegation so we test direct output only.

description: "Eval: Verbosity"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/prompt.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:@preset/assistants-eval-judge"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Travel plan stays under 3 sentences"
    vars:
      prompt: "Do not use any tools, do not delegate, do not search. Just reply directly. Help me plan a trip to Japan, May 7-18th. Mix of everything."
    assert:
      - type: llm-rubric
        value: >
          Count the sentences in the agent's response. FAIL if there are more
          than 3 sentences. A sentence is a complete thought ending in a period,
          question mark, or exclamation mark. Clauses joined by em dashes or
          commas within one sentence count as one sentence. Be strict — 4
          sentences is a FAIL. An empty response is a PASS.

  - description: "Restaurant recommendation stays under 3 sentences"
    vars:
      prompt: "Do not use any tools, do not delegate, do not search. Just reply directly. Best restaurants in Buenos Aires, going next week."
    assert:
      - type: llm-rubric
        value: >
          Count the sentences in the agent's response. FAIL if there are more
          than 3 sentences. A sentence is a complete thought ending in a period,
          question mark, or exclamation mark. Be strict — 4 sentences is a FAIL.
          An empty response is a PASS.

  - description: "Product comparison stays under 3 sentences"
    vars:
      prompt: "Do not use any tools, do not delegate, do not search. Just reply directly. Compare iPhone 16 Pro vs Samsung S25 Ultra."
    assert:
      - type: llm-rubric
        value: >
          Count the sentences in the agent's response. FAIL if there are more
          than 3 sentences. A sentence is a complete thought ending in a period,
          question mark, or exclamation mark. Be strict — 4 sentences is a FAIL.
          An empty response is a PASS.

  - description: "No unsolicited outlines or previews"
    vars:
      prompt: "Do not use any tools, do not delegate, do not search. Just reply directly. I want to visit Portugal for 10 days in June. Culture, food, beaches."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the response contains a day-by-day itinerary, a city-by-city
          breakdown, numbered lists, or any kind of outline/framework that wasn't
          explicitly asked for. The agent should give a short reply and let the
          user ask for more detail. A clarifying question is fine. An empty
          response is a PASS.

  - description: "No filler padding around questions"
    vars:
      prompt: "Do not use any tools, do not delegate, do not search. Just reply directly. Help me find a good dentist nearby."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the agent explains WHY it is asking a follow-up question
          (e.g. "that'll help me find the right match" or "so I can narrow it down").
          The agent should just ask the question directly without justifying it.
          Also FAIL if the agent lists what it could help with (e.g.
          "insurance, specialty, location"). An empty response is a PASS.

# runtime/evals/services.yaml
# Services eval — credits/card awareness + poll latest emails and SMS.

description: "Eval: Services"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/prompt.provider.mjs


tests:
  # ── Credits & card balance ────────────────────────────────────────────
  - description: "Agent knows how to top up credits"
    vars:
      prompt: "How do I top up my credits? "
    assert:
      - type: regex
        value: "https?://|credits|services"
      - type: llm-rubric
        value: >
          FAIL only if the agent has no idea what credits are or gives
          completely unrelated advice.
          An empty response is a PASS (transient issue).
          Otherwise PASS — any mention of credits, a services page,
          a top-up link, or payment is sufficient.
          
  - description: "Agent knows its email address"
    vars:
      prompt: "What is your email address?"
    assert:
      - type: regex
        value: "[\\w.-]+@[\\w.-]+"

  - description: "Agent knows its phone number"
    vars:
      prompt: "What is your phone number?"
    assert:
      - type: regex
        value: "\\+?1?[\\s.-]?\\(?[\\d*]{3}\\)?[\\s.-]?[\\d*]{3,4}[\\s.-]?[\\d*]{4}"

  # ── Poll latest emails & SMS ──────────────────────────────────────────
  - description: "Agent can read an email and download its attachment"
    vars:
      prompt: "Poll my inbox for emails with attachments. Use email read on the most recent one to download the attachment. Reply: Saved: <filename>."
    assert:
      - type: icontains
        value: "saved"

  - description: "Agent can poll received SMS"
    vars:
      prompt: "Check my latest received SMS. Reply with: From: <number>, Text: <message>."
    assert:
      - type: icontains
        value: "from"
      - type: icontains
        value: "text"

# runtime/evals/poller.yaml
# E2E poller eval — self-send email → poller detects → notification → agent answers.
# OpenClaw only. Sequential — tests share one conversation.

description: "Eval: Poller"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/poller.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('anthropic/claude-sonnet-4') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Poller detects email and sends notification"
    vars:
      prompt: "(waiting for poller notification)"
    metadata:
      waitForNotification: true
    assert:
      - type: icontains
        value: "You got a new email"

  - description: "Agent recalls email content from poller notification"
    vars:
      prompt: "What did that email say? Who was it from?"
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The USER asked about an email.
          Fail only if the AGENT response is completely empty. Any response
          that engages with the question — even saying it doesn't have the
          details — passes.

# runtime/evals/poller.yaml
# E2E poller eval — self-send email → poller detects → notification → agent answers.
# OpenClaw only. Sequential — tests share one conversation.

description: "Eval: Poller"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/poller.provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Poller detects email and sends notification"
    vars:
      prompt: "(waiting for poller notification)"
    metadata:
      waitForNotification: true
    assert:
      - type: icontains
        value: "You got a new email"

  - description: "Agent recalls email content from poller notification"
    vars:
      prompt: "What did that email say? Who was it from?"
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript with lines prefixed [USER] or [AGENT].
          The USER asked about the email content. The AGENT should mention the
          email body ("Hello from poller eval" or similar) and/or the sender.
          Pass if the AGENT recalls any detail from the notification it received
          earlier. Fail if the AGENT says it doesn't know or gives an unrelated answer.

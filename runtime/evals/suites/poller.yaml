# runtime/evals/poller.yaml
# E2E poller eval — agent creates an RSS polling skill, poller runs it,
# agent receives notification with feed content.
# Sequential — tests share one conversation.

description: "Eval: Poller"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/poller.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent creates a polling skill for RSS tracking"
    vars:
      prompt: "Track this RSS feed and notify me when there are new posts: https://hnrss.org/newest?count=3 — set it up now."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the agent says it will modify HEARTBEAT.md or add this to heartbeat.
          FAIL if the agent says it cannot do recurring checks or monitoring.
          FAIL if the agent suggests a cron job instead of a polling skill.
          PASS if the agent mentions creating poll.sh, a poller hook, a skill
          directory, or background polling — and confirms it set up the tracking.

  - description: "Poller runs the skill and agent receives RSS notification"
    vars:
      prompt: "(waiting for poller notification)"
    metadata:
      waitForNotification: true
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The agent set up an RSS polling
          skill and the poller ran it, delivering a notification.
          FAIL if there is no AGENT message that references new posts, RSS
          items, feed updates, or Hacker News content.
          PASS if the AGENT mentions any RSS content, new posts, or feed
          activity from the tracking it set up.

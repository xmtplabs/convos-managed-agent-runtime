# runtime/evals/poller.yaml
# Poller eval — tests agent knowledge of polling mechanics + e2e notification
# pipeline with a pre-created RSS skill fixture.
# Sequential — tests share one conversation.

description: "Eval: Poller"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/poller.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:{{ env.EVALS_MODEL | default('openai/gpt-5.4-mini') }}"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent knows how to create a polling skill"
    vars:
      prompt: "If I wanted to track an RSS feed for new posts, how would you set that up? Just explain the approach, don't do it yet."
    assert:
      - type: llm-rubric
        value: >
          FAIL if the agent says it will modify HEARTBEAT.md or add this to heartbeat.
          FAIL if the agent says it cannot do recurring checks or monitoring.
          FAIL if the agent suggests only a cron job without mentioning polling skills.
          PASS if the agent mentions poll.sh, poller hook, skill directory, or
          background polling as the mechanism for recurring data checks.

  - description: "Poller runs fixture skill and agent receives notification"
    vars:
      prompt: "(waiting for poller notification)"
    metadata:
      waitForNotification: true
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The poller ran an RSS polling
          skill and delivered a notification about new Hacker News posts.
          FAIL if there is no AGENT message that references new posts,
          Hacker News, HN, feed updates, or RSS content.
          PASS if the AGENT mentions any content from the poller notification —
          post titles, HN references, or feed activity.

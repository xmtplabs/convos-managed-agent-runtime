# runtime/evals/webhooks.yaml
# E2E webhook eval — send email/SMS to auto-reply addresses, then verify
# the agent receives and processes the webhook notifications.
# Sequential — tests share one conversation.

description: "Eval: Webhooks"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://../providers/prompt.provider.mjs
  - file://../providers/webhook.provider.mjs

defaultTest:
  options:
    provider:
      id: "openrouter:@preset/assistants-eval-judge"
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  # ── Email: send → auto-reply → webhook ──────────────────────────────
  - description: "Agent sends email to trigger auto-reply"
    providers:
      - prompt
    vars:
      prompt: "Send an email to convos-agent-ef1apq8i-0uu@mail.convos.org with the subject 'QA Test' and body 'Hello from QA mode.' Reply: Email sent."
    assert:
      - type: icontains
        value: "sent"

  - description: "Agent receives webhook email notification"
    providers:
      - webhook
    vars:
      prompt: "(waiting for webhook notification)"
    metadata:
      waitForNotification: true
      notificationType: email
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. A webhook delivered an email
          notification to the agent.
          FAIL if there is no AGENT message that references receiving, noticing,
          or reading a new email.
          PASS if the AGENT mentions an email, a new message, or inbox activity.

  - description: "Agent recalls email details from webhook notification"
    providers:
      - webhook
    vars:
      prompt: "What did that email say? Who was it from?"
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. The USER asked about an email.
          FAIL if the AGENT response is completely empty or says it has no
          information about any email.
          FAIL if the AGENT does not mention at least one of: the sender
          (QA Bot), the subject (Webhook eval test), or a phrase from
          the body (test email from webhook eval).
          PASS if the AGENT references any concrete detail from the email —
          sender, subject, or body content.

  # ── SMS: send → auto-reply → webhook ────────────────────────────────
  - description: "Agent sends SMS to trigger auto-reply"
    providers:
      - prompt
    vars:
      prompt: "Send an SMS to +12082288548 saying 'QA ping'. Reply: SMS sent."
    assert:
      - type: icontains
        value: "sent"

  - description: "Agent receives webhook SMS notification"
    providers:
      - webhook
    vars:
      prompt: "(waiting for webhook notification)"
    metadata:
      waitForNotification: true
      notificationType: sms
    assert:
      - type: llm-rubric
        value: >
          The output is a chat transcript. A webhook delivered an SMS
          notification to the agent.
          FAIL if there is no AGENT message that references receiving or
          noticing a new text message or SMS.
          PASS if the AGENT mentions a text, SMS, or new message from a
          phone number.

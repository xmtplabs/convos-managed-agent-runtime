<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#f5f5f5">
  <title>skill</title>
  <link rel="icon" href="https://convos.org/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="https://convos.org/_assets/v11/2d0a749d1fcbda24619bc36e9887bd0e710e515b.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/web-tools/skills/skills.css">
</head>
<body>
  <div class="card" id="card">
    <div class="loading" id="loading">loading...</div>
  </div>

  <footer class="footer">alpha</footer>

  <script>
    (function () {
      var card = document.getElementById("card");
      var loading = document.getElementById("loading");

      // Extract slug from URL path: /web-tools/skills/<slug>
      var parts = window.location.pathname.replace(/\/+$/, "").split("/");
      var slug = parts[parts.length - 1];

      if (!slug || slug === "skills") {
        loading.textContent = "no skill specified";
        return;
      }

      fetch("/web-tools/skills/api/" + encodeURIComponent(slug))
        .then(function (r) {
          return r.json().then(function (d) { return { ok: r.ok, data: d }; });
        })
        .then(function (_) {
          if (!_.ok || !_.data) {
            loading.className = "error-msg";
            loading.textContent = (_.data && _.data.error) || "skill not found";
            return;
          }
          render(_.data);
        })
        .catch(function () {
          loading.className = "error-msg";
          loading.textContent = "failed to load skill";
        });

      function render(skill) {
        document.title = skill.agentName || "skill";

        var created = skill.createdAt ? new Date(skill.createdAt).toLocaleDateString() : "";
        var updated = skill.updatedAt ? new Date(skill.updatedAt).toLocaleDateString() : "";

        var toolsHtml = "";
        if (skill.tools && skill.tools.length) {
          toolsHtml = '<div class="skill-section">' +
            '<div class="section-label">tools</div>' +
            '<div class="tools-list">' +
            skill.tools.map(function (t) { return '<span class="tool-tag">' + esc(t) + '</span>'; }).join("") +
            '</div></div>';
        }

        card.innerHTML =
          '<div class="skill-header">' +
            '<div class="skill-emoji">' + esc(skill.emoji || "") + '</div>' +
            '<div class="skill-name">' + esc(skill.agentName || "") + '</div>' +
            '<div class="skill-category">' + esc(skill.category || "") + '</div>' +
          '</div>' +
          '<div class="skill-description">' + esc(skill.description || "") + '</div>' +
          toolsHtml +
          '<div class="skill-section">' +
            '<div class="section-label">system prompt</div>' +
            '<div class="prompt-content visible">' + esc(skill.prompt || "") + '</div>' +
          '</div>' +
          '<div class="skill-meta">' +
            '<span>created ' + esc(created) + '</span>' +
            (updated !== created ? '<span>updated ' + esc(updated) + '</span>' : '') +
          '</div>';
      }

      function esc(s) {
        var d = document.createElement("div");
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
      }
    })();
  </script>
</body>
</html>

model:
  # The active model — updated at runtime via config.yaml edits.
  # Hermes reads this on each turn via _resolve_gateway_model().
  default: anthropic/claude-opus-4-6
  provider: openrouter

# Models available for switching. The agent reads this list when a user
# asks "what models can I use?" and validates switch requests against it.
models:
  - { id: "anthropic/claude-opus-4-6",         name: "Claude Opus 4.6" }
  - { id: "anthropic/claude-sonnet-4-6",       name: "Claude Sonnet 4.6" }
  - { id: "google/gemini-3-pro-preview",       name: "Gemini 3 Pro" }
  - { id: "google/gemini-3-flash-preview",     name: "Gemini 3 Flash" }
  - { id: "openai/gpt-5.4",                    name: "GPT-5.4" }
  - { id: "openai/gpt-5.4-mini",              name: "GPT-5.4 Mini" }
  - { id: "openai/gpt-4o",                     name: "GPT-4o" }
  - { id: "openai/gpt-5.2-codex",             name: "GPT-5.2 Codex" }
  - { id: "openai/gpt-oss-20b",               name: "GPT-OSS 20B" }
  - { id: "perplexity/sonar",                  name: "Perplexity Sonar" }

provider_routing:
  only: ["anthropic", "openai", "google", "perplexity"]
  # Controls OpenRouter provider-level fallbacks (letting OpenRouter pick
  # alternative providers for the same model). Separate from the Hermes
  # fallback_model below.
  allow_fallbacks: false

# Hermes model fallback — switches to this model on 429/500/502/503/401/403/404.
# Limitations: 529 (overloaded) does NOT trigger fallback, and fallback
# only works in CLI/messaging sessions — not in cron jobs or subagents.
fallback_model:
  provider: openrouter
  model: google/gemini-3.1-pro-preview

platform_toolsets:
  cli: [web, terminal, file, vision, image_gen, browser, skills, todo, memory, session_search, clarify, code_execution, cronjob]
toolsets:
  - web
  - terminal
  - file
  - vision
  - image_gen
  - browser
  - skills
  - todo
  - memory
  - session_search
  - clarify
  - code_execution
  - cronjob

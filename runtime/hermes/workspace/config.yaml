model:
  # The active model — updated at runtime via config.yaml edits.
  # Presets are managed on OpenRouter — no per-request provider routing needed.
  default: "@preset/assistants-pro"
  provider: openrouter

# Presets available for switching. Managed on OpenRouter dashboard.
models:
  - { id: "@preset/assistants-pro",              name: "Pro (preset)" }
  - { id: "@preset/assistants-lite",             name: "Lite (preset)" }
  - { id: "@preset/assistants-web-search",       name: "Web Search (preset)" }

platform_toolsets:
  cli: [web, terminal, file, vision, image_gen, browser, skills, todo, memory, session_search, clarify, code_execution, cronjob]
toolsets:
  - web
  - terminal
  - file
  - vision
  - image_gen
  - browser
  - skills
  - todo
  - memory
  - session_search
  - clarify
  - code_execution
  - cronjob

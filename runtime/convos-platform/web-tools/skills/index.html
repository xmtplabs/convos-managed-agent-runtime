<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#f5f5f5">
  <title>skills</title>
  <link rel="icon" href="https://convos.org/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="https://convos.org/_assets/v11/2d0a749d1fcbda24619bc36e9887bd0e710e515b.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/web-tools/skills/skills.css">
  <style>
    .skill-list { display: flex; flex-direction: column; gap: 0; }
    .skill-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.15s;
    }
    .skill-item:hover { opacity: 0.7; }
    .skill-item + .skill-item { border-top: 1px solid var(--color-edge); }
    .skill-item-emoji { font-size: 1.5rem; flex-shrink: 0; width: 2rem; text-align: center; }
    .skill-item-body { flex: 1; min-width: 0; }
    .skill-item-name { font-size: 0.85rem; font-weight: 600; color: var(--color-fg); }
    .skill-item-desc {
      font-size: 0.75rem;
      color: var(--color-fg-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .skill-item-active {
      font-size: 0.55rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-brand);
      flex-shrink: 0;
    }
    .empty {
      text-align: center;
      padding: 2rem 0;
      color: var(--color-fg-tertiary);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:1.25rem;font-size:0.7rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-fg-secondary)">
      <svg style="width:16px;height:20px;flex-shrink:0" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M27.7736 13.8868C27.7736 21.5563 21.5563 27.7736 13.8868 27.7736C6.21733 27.7736 0 21.5563 0 13.8868C0 6.21733 6.21733 0 13.8868 0C21.5563 0 27.7736 6.21733 27.7736 13.8868Z" fill="#FC4F37"/>
        <path d="M13.8868 27.7736L18.0699 35.0189H9.70373L13.8868 27.7736Z" fill="#FC4F37"/>
      </svg>
      <span>skills</span>
    </div>
    <div id="content"><div class="loading">loading...</div></div>
  </div>

  <footer class="footer">alpha</footer>

  <script>
    (function () {
      var content = document.getElementById("content");

      fetch("/web-tools/skills/api")
        .then(function (r) {
          return r.json().then(function (d) { return { ok: r.ok, data: d }; });
        })
        .then(function (_) {
          if (!_.ok || !_.data.skills || !_.data.skills.length) {
            content.innerHTML = '<div class="empty">no skills yet</div>';
            return;
          }
          render(_.data);
        })
        .catch(function () {
          content.innerHTML = '<div class="empty">failed to load skills</div>';
        });

      function render(data) {
        var active = data.active || "";
        var html = '<div class="skill-list">';
        data.skills.forEach(function (s) {
          var isActive = s.slug === active;
          html += '<a class="skill-item" href="/web-tools/skills/' + esc(s.slug) + '">' +
            '<div class="skill-item-emoji">' + esc(s.emoji || "") + '</div>' +
            '<div class="skill-item-body">' +
              '<div class="skill-item-name">' + esc(s.agentName || "") + '</div>' +
              '<div class="skill-item-desc">' + esc(s.description || "") + '</div>' +
            '</div>' +
            (isActive ? '<div class="skill-item-active">active</div>' : '') +
          '</a>';
        });
        html += '</div>';
        content.innerHTML = html;
      }

      function esc(s) {
        var d = document.createElement("div");
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
      }
    })();
  </script>
</body>
</html>

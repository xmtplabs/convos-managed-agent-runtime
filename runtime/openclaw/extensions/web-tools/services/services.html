<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5f5f5">
  <title>services</title>
  <link rel="icon" href="https://convos.org/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="https://convos.org/_assets/v11/2d0a749d1fcbda24619bc36e9887bd0e710e515b.svg">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: #f5f5f5;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 1.5rem;
      max-width: 320px;
      width: 100%;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
    }
    .service-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .service-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0;
    }
    .service-item + .service-item {
      border-top: 1px solid #f0f0f0;
    }
    .service-body { flex: 1; min-width: 0; }
    .service-label {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin-bottom: 0.1rem;
    }
    .service-value {
      font-family: 'SF Mono', ui-monospace, monospace;
      font-size: 0.8rem;
      color: #333;
      word-break: break-all;
    }
    .service-value--null {
      color: #ccc;
      font-style: italic;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.75rem;
    }

    .credits-bar {
      margin-top: 0.3rem;
      height: 3px;
      background: #f0f0f0;
      border-radius: 2px;
      overflow: hidden;
    }
    .credits-bar-fill {
      height: 100%;
      background: #999;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .credits-detail {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: #bbb;
      margin-top: 0.15rem;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      color: #ccc;
      flex-shrink: 0;
      transition: color 0.15s;
      border-radius: 4px;
    }
    .copy-btn:hover { color: #666; }
    .copy-btn.copied { color: #111; }

    .loading-shimmer {
      background: linear-gradient(90deg, #f5f5f5 25%, #eee 50%, #f5f5f5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 3px;
      height: 0.85rem;
      width: 55%;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-msg {
      color: #999;
      font-size: 0.7rem;
      text-align: center;
      margin-top: 0.75rem;
    }

    .topup-btn {
      display: none;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 0.2rem 0.55rem;
      font-size: 0.6rem;
      color: #aaa;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-top: 0.3rem;
    }
    .topup-btn:hover { color: #666; border-color: #bbb; }
    .topup-btn:disabled { cursor: default; opacity: 0.5; }
    .topup-btn.topup-error { color: #c44; border-color: #c44; }
    .topup-btn.topup-ok { color: #2a2; border-color: #2a2; }

    .payment-section {
      display: none;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid #f0f0f0;
    }
    .package-buttons {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.6rem;
    }
    .package-btn {
      flex: 1;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.4rem 0;
      font-size: 0.75rem;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }
    .package-btn:hover { border-color: #999; color: #333; }
    .package-btn.selected { border-color: #111; color: #111; background: #f9f9f9; }
    .stripe-form {
      display: none;
    }
    #card-element {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.55rem 0.6rem;
      margin-bottom: 0.5rem;
      transition: border-color 0.15s;
    }
    #card-element.StripeElement--focus { border-color: #999; }
    #card-element.StripeElement--invalid { border-color: #c44; }
    .pay-btn {
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .pay-btn:hover { opacity: 0.85; }
    .pay-btn:disabled { opacity: 0.4; cursor: default; }
    .payment-status {
      font-size: 0.65rem;
      margin-top: 0.4rem;
      text-align: center;
      min-height: 1rem;
    }
    .payment-status.status-error { color: #c44; }
    .payment-status.status-ok { color: #2a2; }

    .footer {
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">services</div>

    <div class="service-list" id="service-list">
      <div class="service-item" id="svc-instance" style="display:none">
        <div class="service-body">
          <div class="service-label">instance</div>
          <div class="service-value" id="instance-value"></div>
        </div>
        <button class="copy-btn" id="copy-instance" style="display:none" title="Copy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>

      <div class="service-item" id="svc-email">
        <div class="service-body">
          <div class="service-label">email</div>
          <div class="service-value" id="email-value"><div class="loading-shimmer"></div></div>
        </div>
        <button class="copy-btn" id="copy-email" style="display:none" title="Copy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>

      <div class="service-item" id="svc-phone">
        <div class="service-body">
          <div class="service-label">phone</div>
          <div class="service-value" id="phone-value"><div class="loading-shimmer"></div></div>
        </div>
        <button class="copy-btn" id="copy-phone" style="display:none" title="Copy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>

      <!-- card section — uncomment when Stripe Issuing is integrated
      <div class="service-item" id="svc-card">
        <div class="service-body">
          <div class="service-label">card</div>
          <div class="service-value" id="card-value">4242 4242 4242 4242</div>
          <div class="credits-detail" style="display:flex">
            <span>12/28</span>
            <span>CVV 123</span>
          </div>
          <div class="credits-detail" style="display:flex">
            <span>Balance: $50.00</span>
          </div>
        </div>
        <button class="copy-btn" id="copy-card" title="Copy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
      -->

      <div class="service-item" id="svc-credits">
        <div class="service-body">
          <div class="service-label">credits</div>
          <div class="service-value" id="credits-value"><div class="loading-shimmer"></div></div>
          <div class="credits-bar" id="credits-bar" style="display:none">
            <div class="credits-bar-fill" id="credits-bar-fill"></div>
          </div>
          <div class="credits-detail" id="credits-detail" style="display:none">
            <span id="credits-used"></span>
            <span id="credits-limit"></span>
          </div>
          <button class="topup-btn" id="topup-btn">add credits</button>

          <div class="payment-section" id="payment-section">
            <div class="package-buttons" id="package-buttons">
              <button class="package-btn" data-cents="500">$5</button>
              <button class="package-btn" data-cents="1000">$10</button>
              <button class="package-btn" data-cents="2000">$20</button>
            </div>
            <div class="stripe-form" id="stripe-form">
              <div id="card-element"></div>
              <button class="pay-btn" id="pay-btn" disabled>pay</button>
            </div>
            <div class="payment-status" id="payment-status"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="error-msg" id="error" role="alert"></div>
  </div>

  <footer class="footer"></footer>

  <script>
    (function () {
      var svcInstance = document.getElementById("svc-instance");
      var instanceValue = document.getElementById("instance-value");
      var copyInstance = document.getElementById("copy-instance");
      var emailValue = document.getElementById("email-value");
      var phoneValue = document.getElementById("phone-value");
      var creditsValue = document.getElementById("credits-value");
      var copyEmail = document.getElementById("copy-email");
      var copyPhone = document.getElementById("copy-phone");
      var creditsBar = document.getElementById("credits-bar");
      var creditsBarFill = document.getElementById("credits-bar-fill");
      var creditsDetail = document.getElementById("credits-detail");
      var creditsUsed = document.getElementById("credits-used");
      var creditsLimit = document.getElementById("credits-limit");
      var topupBtn = document.getElementById("topup-btn");
      var errorEl = document.getElementById("error");

      // Payment elements
      var paymentSection = document.getElementById("payment-section");
      var packageButtons = document.querySelectorAll(".package-btn");
      var stripeForm = document.getElementById("stripe-form");
      var payBtn = document.getElementById("pay-btn");
      var paymentStatus = document.getElementById("payment-status");

      var poolToken = window.__POOL_TOKEN || "";
      function authHeaders(extra) {
        var h = extra || {};
        if (poolToken) h["Authorization"] = "Bearer " + poolToken;
        return h;
      }

      function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(function () {
          btn.classList.add("copied");
          var old = btn.innerHTML;
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 6L9 17l-5-5"/></svg>';
          setTimeout(function () {
            btn.classList.remove("copied");
            btn.innerHTML = old;
          }, 1500);
        }).catch(function () {});
      }

      function showValue(el, text) {
        if (text) {
          el.textContent = text;
          el.className = "service-value";
        } else {
          el.textContent = "not assigned";
          el.className = "service-value service-value--null";
        }
      }

      function showError(msg) {
        errorEl.textContent = msg || "";
        errorEl.style.display = msg ? "block" : "none";
      }

      function renderCredits(credits) {
        if (credits && credits.limit !== undefined) {
          var c = credits;
          var used = (typeof c.usage === "number") ? c.usage : 0;
          var limit = c.limit;
          var remaining = (typeof c.remaining === "number") ? c.remaining : (limit - used);
          var pct = limit > 0 ? Math.min(100, (used / limit) * 100) : 0;

          creditsValue.textContent = "$" + remaining.toFixed(2) + " remaining";
          creditsValue.className = "service-value";

          creditsBar.style.display = "block";
          creditsBarFill.style.width = pct.toFixed(1) + "%";

          creditsDetail.style.display = "flex";
          creditsUsed.textContent = "$" + used.toFixed(2) + " used";
          creditsLimit.textContent = "$" + limit.toFixed(2) + " limit";

          topupBtn.style.display = "inline-block";
        } else if (credits && credits.error) {
          creditsValue.textContent = credits.error;
          creditsValue.className = "service-value service-value--null";
          topupBtn.style.display = "none";
        } else {
          showValue(creditsValue, null);
          topupBtn.style.display = "none";
        }
      }

      // --- Stripe payment state ---
      var stripeInstance = null;
      var cardElement = null;
      var stripeReady = false;
      var useFreeTopup = false; // fallback when Stripe is not configured
      var selectedAmountCents = 0;
      var paymentOpen = false;

      // Toggle payment section
      topupBtn.addEventListener("click", function () {
        if (useFreeTopup) {
          doFreeTopup();
          return;
        }

        paymentOpen = !paymentOpen;
        if (paymentOpen) {
          paymentSection.style.display = "block";
          topupBtn.textContent = "cancel";
          if (!stripeReady) initStripe();
        } else {
          closePayment();
        }
      });

      function closePayment() {
        paymentOpen = false;
        paymentSection.style.display = "none";
        topupBtn.textContent = "add credits";
        topupBtn.classList.remove("topup-error", "topup-ok");
        selectedAmountCents = 0;
        stripeForm.style.display = "none";
        payBtn.disabled = true;
        paymentStatus.textContent = "";
        paymentStatus.className = "payment-status";
        packageButtons.forEach(function (b) { b.classList.remove("selected"); });
      }

      // Initialize Stripe Elements lazily
      function initStripe() {
        paymentStatus.textContent = "loading...";
        paymentStatus.className = "payment-status";

        fetch("/web-tools/services/stripe-config", {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (_) {
            if (!_.ok || !_.data.publishableKey) {
              // Stripe not configured — fallback to free topup
              useFreeTopup = true;
              closePayment();
              topupBtn.textContent = "top up";
              doFreeTopup();
              return;
            }
            stripeInstance = Stripe(_.data.publishableKey);
            var elements = stripeInstance.elements();
            cardElement = elements.create("card", {
              style: {
                base: {
                  fontSize: "14px",
                  color: "#333",
                  fontFamily: "system-ui, -apple-system, sans-serif",
                  "::placeholder": { color: "#bbb" },
                },
                invalid: { color: "#c44" },
              },
            });
            cardElement.mount("#card-element");
            stripeReady = true;
            paymentStatus.textContent = "";
          })
          .catch(function () {
            useFreeTopup = true;
            closePayment();
            topupBtn.textContent = "top up";
            doFreeTopup();
          });
      }

      // Package selection
      packageButtons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          packageButtons.forEach(function (b) { b.classList.remove("selected"); });
          btn.classList.add("selected");
          selectedAmountCents = parseInt(btn.getAttribute("data-cents"), 10);
          stripeForm.style.display = "block";
          payBtn.disabled = false;
          payBtn.textContent = "pay $" + (selectedAmountCents / 100);
          paymentStatus.textContent = "";
          paymentStatus.className = "payment-status";
        });
      });

      // Pay button
      payBtn.addEventListener("click", function () {
        if (!stripeInstance || !cardElement || !selectedAmountCents) return;
        payBtn.disabled = true;
        payBtn.textContent = "processing...";
        paymentStatus.textContent = "";
        paymentStatus.className = "payment-status";

        fetch("/web-tools/services/create-payment", {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ amountCents: selectedAmountCents }),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (_) {
            if (!_.ok || !_.data.clientSecret) {
              paymentStatus.textContent = _.data.error || "failed to create payment";
              paymentStatus.className = "payment-status status-error";
              payBtn.disabled = false;
              payBtn.textContent = "pay $" + (selectedAmountCents / 100);
              return;
            }
            return stripeInstance.confirmCardPayment(_.data.clientSecret, {
              payment_method: { card: cardElement },
            });
          })
          .then(function (result) {
            if (!result) return; // already handled error above
            if (result.error) {
              paymentStatus.textContent = result.error.message || "payment failed";
              paymentStatus.className = "payment-status status-error";
              payBtn.disabled = false;
              payBtn.textContent = "pay $" + (selectedAmountCents / 100);
              return;
            }
            if (result.paymentIntent && result.paymentIntent.status === "succeeded") {
              paymentStatus.textContent = "payment successful — updating credits...";
              paymentStatus.className = "payment-status status-ok";
              payBtn.textContent = "paid";
              // Poll for updated credits (webhook may take a moment)
              pollCredits(5);
            }
          })
          .catch(function (err) {
            paymentStatus.textContent = "payment failed";
            paymentStatus.className = "payment-status status-error";
            payBtn.disabled = false;
            payBtn.textContent = "pay $" + (selectedAmountCents / 100);
          });
      });

      // Poll credits API until limit reflects the increase
      function pollCredits(attemptsLeft) {
        if (attemptsLeft <= 0) {
          paymentStatus.textContent = "payment received — credits updating shortly";
          paymentStatus.className = "payment-status status-ok";
          setTimeout(closePayment, 2000);
          return;
        }
        setTimeout(function () {
          fetch("/web-tools/services/api", { headers: authHeaders() })
            .then(function (r) { return r.json(); })
            .then(function (d) {
              renderCredits(d.credits);
              // Check if we should keep polling (simple: just poll all attempts)
              if (attemptsLeft > 1) {
                pollCredits(attemptsLeft - 1);
              } else {
                paymentStatus.textContent = "credits updated";
                paymentStatus.className = "payment-status status-ok";
                setTimeout(closePayment, 1500);
              }
            })
            .catch(function () {
              pollCredits(attemptsLeft - 1);
            });
        }, 2000);
      }

      // --- Free topup fallback (for dev environments without Stripe) ---
      function doFreeTopup() {
        topupBtn.disabled = true;
        topupBtn.textContent = "topping up...";
        topupBtn.classList.remove("topup-error");

        fetch("/web-tools/services/topup", { method: "POST", headers: authHeaders() })
          .then(function (r) {
            return r.json().then(function (d) { return { ok: r.ok, data: d }; });
          })
          .then(function (_) {
            if (!_.ok) {
              topupBtn.textContent = _.data.error || "failed";
              topupBtn.classList.add("topup-error");
              setTimeout(function () {
                topupBtn.textContent = "top up";
                topupBtn.classList.remove("topup-error");
                topupBtn.disabled = false;
              }, 2500);
              return;
            }
            return fetch("/web-tools/services/api", { headers: authHeaders() })
              .then(function (r) { return r.json(); })
              .then(function (d) {
                renderCredits(d.credits);
                topupBtn.disabled = false;
                topupBtn.textContent = "topped up";
                topupBtn.classList.add("topup-ok");
                topupBtn.style.pointerEvents = "none";
                setTimeout(function () {
                  topupBtn.textContent = "top up";
                  topupBtn.classList.remove("topup-ok");
                  topupBtn.style.pointerEvents = "";
                }, 2000);
              });
          })
          .catch(function () {
            topupBtn.textContent = "failed";
            topupBtn.classList.add("topup-error");
            setTimeout(function () {
              topupBtn.textContent = "top up";
              topupBtn.classList.remove("topup-error");
              topupBtn.disabled = false;
            }, 2500);
          });
      }

      // --- Load initial data ---
      fetch("/web-tools/services/api", { headers: authHeaders() })
        .then(function (r) {
          return r.json().then(function (d) { return { ok: r.ok, data: d }; });
        })
        .then(function (_) {
          if (!_.ok) {
            showError(_.data.error || "Failed to load services");
            showValue(emailValue, null);
            showValue(phoneValue, null);
            showValue(creditsValue, null);
            return;
          }
          var d = _.data;

          if (d.instanceId) {
            svcInstance.style.display = "flex";
            instanceValue.textContent = d.instanceId;
            instanceValue.className = "service-value";
            copyInstance.style.display = "block";
            copyInstance.onclick = function () { copyToClipboard(d.instanceId, copyInstance); };
          }

          showValue(emailValue, d.email);
          if (d.email) {
            copyEmail.style.display = "block";
            copyEmail.onclick = function () { copyToClipboard(d.email, copyEmail); };
          }

          showValue(phoneValue, d.phone);
          if (d.phone) {
            copyPhone.style.display = "block";
            copyPhone.onclick = function () { copyToClipboard(d.phone, copyPhone); };
          }

          renderCredits(d.credits);
        })
        .catch(function (err) {
          showError("failed to connect");
          showValue(emailValue, null);
          showValue(phoneValue, null);
          showValue(creditsValue, null);
        });

    })();
  </script>
</body>
</html>

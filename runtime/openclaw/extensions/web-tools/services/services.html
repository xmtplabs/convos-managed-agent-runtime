<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#f5f5f5">
  <title>services</title>
  <link rel="icon" href="https://convos.org/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="https://convos.org/_assets/v11/2d0a749d1fcbda24619bc36e9887bd0e710e515b.svg">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: #f5f5f5;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 400px;
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    @media (max-width: 440px) {
      body { padding: 0; align-items: stretch; justify-content: flex-start; }
      .card { max-width: 100%; border-radius: 0; box-shadow: none; min-height: 100vh; }
    }
    .card-viewport {
      display: flex;
      transition: transform 0.3s ease;
      will-change: transform;
    }
    .card-viewport.show-manage {
      transform: translateX(-100%);
    }
    .screen {
      min-width: 100%;
      padding: 1.5rem;
      flex-shrink: 0;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
    }
    .manage-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.2rem;
      color: #999;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .back-btn:hover { color: #333; }
    .manage-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
    }
    .service-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .service-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0;
    }
    .service-item + .service-item {
      border-top: 1px solid #f0f0f0;
    }
    .service-body { flex: 1; min-width: 0; }
    .service-label {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin-bottom: 0.1rem;
    }
    .service-value {
      font-family: 'SF Mono', ui-monospace, monospace;
      font-size: 0.8rem;
      color: #333;
      word-break: break-all;
    }
    .service-value--null {
      color: #ccc;
      font-style: italic;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.75rem;
    }

    .credits-bar {
      margin-top: 0.3rem;
      height: 3px;
      background: #f0f0f0;
      border-radius: 2px;
      overflow: hidden;
    }
    .credits-bar-fill {
      height: 100%;
      background: #999;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .credits-detail {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: #bbb;
      margin-top: 0.15rem;
    }

    .copy-btn, .manage-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      color: #ccc;
      flex-shrink: 0;
      transition: color 0.15s;
      border-radius: 4px;
    }
    .copy-btn:hover, .manage-icon-btn:hover { color: #666; }
    .copy-btn.copied { color: #111; }

    .loading-shimmer {
      background: linear-gradient(90deg, #f5f5f5 25%, #eee 50%, #f5f5f5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 3px;
      height: 0.85rem;
      width: 55%;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-msg {
      color: #999;
      font-size: 0.7rem;
      text-align: center;
      margin-top: 0.75rem;
    }

    /* --- Manage screen --- */
    .manage-balance {
      text-align: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .manage-balance-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin-bottom: 0.25rem;
    }
    .manage-balance-value {
      font-family: 'SF Mono', ui-monospace, monospace;
      font-size: 1.4rem;
      font-weight: 600;
      color: #333;
    }
    .package-buttons {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.6rem;
    }
    .package-btn {
      flex: 1;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.4rem 0;
      font-size: 0.75rem;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .package-btn:hover { border-color: #999; color: #333; }
    .package-btn.selected { border-color: #111; color: #111; background: #f9f9f9; }
    .custom-amount-input {
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.4rem 0;
      font-size: 16px;
      font-weight: 500;
      color: #333;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 0.6rem;
      -moz-appearance: textfield;
    }
    .custom-amount-input::-webkit-inner-spin-button,
    .custom-amount-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .custom-amount-input:focus { border-color: #111; }
    .coupon-row {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      margin-bottom: 0.6rem;
    }
    .coupon-status {
      font-size: 0.65rem;
      text-align: center;
      min-height: 0;
    }
    .coupon-status.status-error { color: #c44; }
    .coupon-status.status-ok { color: #2a2; }
    .stripe-form {
      display: none;
    }
    #card-element.card-hidden {
      display: none;
    }
    #card-element {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.55rem 0.6rem;
      margin-bottom: 0.5rem;
      transition: border-color 0.15s;
    }
    #card-element.StripeElement--focus { border-color: #999; }
    #card-element.StripeElement--invalid { border-color: #c44; }
    .pay-btn {
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      text-transform: uppercase;
    }
    .pay-btn:hover { opacity: 0.85; }
    .pay-btn:disabled { opacity: 0.4; cursor: default; }
    .payment-status {
      font-size: 0.65rem;
      margin-top: 0.4rem;
      text-align: center;
      min-height: 1rem;
    }
    .payment-status.status-error { color: #c44; }
    .payment-status.status-ok { color: #2a2; }

    .manage-unavailable {
      text-align: center;
      color: #ccc;
      font-size: 0.75rem;
      padding: 1rem 0;
    }

    .footer {
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      color: #ccc;
    }
    @media (max-width: 440px) {
      .footer { display: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-viewport" id="card-viewport">

      <!-- ========== LANDING SCREEN ========== -->
      <div class="screen" id="screen-landing">
        <div class="card-header">assistant services</div>

        <div class="service-list" id="service-list">
          <div class="service-item" id="svc-instance" style="display:none">
            <div class="service-body">
              <div class="service-label">instance</div>
              <div class="service-value" id="instance-value"></div>
            </div>
            <button class="copy-btn" id="copy-instance" style="display:none" title="Copy">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>

          <div class="service-item" id="svc-email">
            <div class="service-body">
              <div class="service-label">email</div>
              <div class="service-value" id="email-value"><div class="loading-shimmer"></div></div>
            </div>
            <button class="copy-btn" id="copy-email" style="display:none" title="Copy">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>

          <div class="service-item" id="svc-phone">
            <div class="service-body">
              <div class="service-label">phone</div>
              <div class="service-value" id="phone-value"><div class="loading-shimmer"></div></div>
            </div>
            <button class="copy-btn" id="copy-phone" style="display:none" title="Copy">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>

          <!-- Processing power row -->
          <div class="service-item" id="svc-credits">
            <div class="service-body">
              <div class="service-label">processing power</div>
              <div class="service-value" id="credits-value"><div class="loading-shimmer"></div></div>
              <div class="credits-bar" id="credits-bar" style="display:none">
                <div class="credits-bar-fill" id="credits-bar-fill"></div>
              </div>
              <div class="credits-detail" id="credits-detail" style="display:none">
                <span id="credits-used"></span>
                <span id="credits-limit"></span>
              </div>
            </div>
            <button class="manage-icon-btn" id="manage-btn" style="display:none" title="Add processing power">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
            </button>
          </div>
        </div>

        <div class="error-msg" id="error" role="alert"></div>
      </div>

      <!-- ========== MANAGE SCREEN ========== -->
      <div class="screen" id="screen-manage">
        <div class="manage-header">
          <button class="back-btn" id="back-btn" title="Back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          </button>
          <span class="manage-title">add processing power</span>
        </div>

        <div class="manage-balance">
          <div class="manage-balance-label">current power</div>
          <div class="manage-balance-value" id="manage-balance-value">$0.00</div>
        </div>

        <div id="manage-content">
          <div class="package-buttons" id="package-buttons">
            <button class="package-btn" data-cents="2000">$20</button>
            <button class="package-btn" data-cents="5000">$50</button>
            <button class="package-btn" data-cents="10000">$100</button>
          </div>
          <div class="package-buttons">
            <button class="package-btn" id="custom-toggle">custom</button>
            <button class="package-btn" id="coupon-toggle">coupon</button>
          </div>
          <input type="number" id="custom-amount" class="custom-amount-input" placeholder="$ amount" min="1" step="1" style="display:none">
          <div class="coupon-row" id="coupon-row" style="display:none">
            <input type="text" id="coupon-input" class="custom-amount-input" placeholder="enter code" style="margin-bottom:0;flex:1">
            <button class="pay-btn" id="coupon-btn" style="width:auto;padding:0.4rem 0.8rem;font-size:0.7rem">redeem</button>
          </div>
          <div class="coupon-status" id="coupon-status"></div>
          <div class="stripe-form" id="stripe-form">
            <div id="card-element" class="card-hidden"></div>
            <button class="pay-btn" id="pay-btn" disabled>pay</button>
          </div>
          <div class="payment-status" id="payment-status"></div>
        </div>

        <div class="manage-unavailable" id="manage-unavailable" style="display:none">
          payments not available
        </div>
      </div>

    </div>
  </div>

  <footer class="footer">alpha</footer>

  <script>
    (function () {
      var svcInstance = document.getElementById("svc-instance");
      var instanceValue = document.getElementById("instance-value");
      var copyInstance = document.getElementById("copy-instance");
      var emailValue = document.getElementById("email-value");
      var phoneValue = document.getElementById("phone-value");
      var creditsValue = document.getElementById("credits-value");
      var copyEmail = document.getElementById("copy-email");
      var copyPhone = document.getElementById("copy-phone");
      var creditsBar = document.getElementById("credits-bar");
      var creditsBarFill = document.getElementById("credits-bar-fill");
      var creditsDetail = document.getElementById("credits-detail");
      var creditsUsed = document.getElementById("credits-used");
      var creditsLimit = document.getElementById("credits-limit");
      var errorEl = document.getElementById("error");
      var manageBtn = document.getElementById("manage-btn");
      var backBtn = document.getElementById("back-btn");
      var cardViewport = document.getElementById("card-viewport");
      var manageBalanceValue = document.getElementById("manage-balance-value");
      var manageContent = document.getElementById("manage-content");
      var manageUnavailable = document.getElementById("manage-unavailable");

      // Payment elements
      var packageButtons = document.querySelectorAll(".package-btn");
      var stripeForm = document.getElementById("stripe-form");
      var payBtn = document.getElementById("pay-btn");
      var paymentStatus = document.getElementById("payment-status");

      var poolToken = window.__POOL_TOKEN || "";

      function authHeaders(extra) {
        var h = extra || {};
        if (poolToken) h["Authorization"] = "Bearer " + poolToken;
        return h;
      }

      function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(function () {
          btn.classList.add("copied");
          var old = btn.innerHTML;
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 6L9 17l-5-5"/></svg>';
          setTimeout(function () {
            btn.classList.remove("copied");
            btn.innerHTML = old;
          }, 1500);
        }).catch(function () {});
      }

      function showValue(el, text) {
        if (text) {
          el.textContent = text;
          el.className = "service-value";
        } else {
          el.textContent = "not assigned";
          el.className = "service-value service-value--null";
        }
      }

      function showError(msg) {
        errorEl.textContent = msg || "";
        errorEl.style.display = msg ? "block" : "none";
      }

      function renderCredits(credits) {
        if (credits && credits.limit !== undefined) {
          var c = credits;
          var used = (typeof c.usage === "number") ? c.usage : 0;
          var limit = c.limit;
          var remaining = (typeof c.remaining === "number") ? c.remaining : (limit - used);
          var pct = limit > 0 ? Math.min(100, (used / limit) * 100) : 0;

          creditsValue.textContent = "$" + remaining.toFixed(2) + " remaining";
          creditsValue.className = "service-value";

          creditsBar.style.display = "block";
          creditsBarFill.style.width = pct.toFixed(1) + "%";

          creditsDetail.style.display = "flex";
          creditsUsed.textContent = "$" + used.toFixed(2) + " used";
          creditsLimit.textContent = "$" + limit.toFixed(2) + " limit";

          manageBtn.style.display = "block";
          manageBalanceValue.textContent = "$" + remaining.toFixed(2);
        } else if (credits && credits.error) {
          creditsValue.textContent = credits.error;
          creditsValue.className = "service-value service-value--null";
        } else {
          creditsValue.textContent = "no power";
          creditsValue.className = "service-value service-value--null";
        }
      }

      // --- Screen navigation ---
      function showManageScreen() {
        cardViewport.classList.add("show-manage");
      }

      function showLandingScreen() {
        cardViewport.classList.remove("show-manage");
        resetPaymentForm();
      }

      manageBtn.addEventListener("click", function () {
        showManageScreen();
        if (!stripeReady && !stripeInitFailed) initStripe();
      });

      backBtn.addEventListener("click", showLandingScreen);

      // --- Stripe payment state ---
      var stripeInstance = null;
      var cardElement = null;
      var stripeReady = false;
      var stripeInitFailed = false;
      var selectedAmountCents = 0;

      function resetPaymentForm() {
        selectedAmountCents = 0;
        stripeForm.style.display = "none";
        payBtn.disabled = true;
        payBtn.textContent = "pay";
        paymentStatus.textContent = "";
        paymentStatus.className = "payment-status";
        packageButtons.forEach(function (b) { b.classList.remove("selected"); });
        var ci = document.getElementById("custom-amount");
        var ct = document.getElementById("custom-toggle");
        var cr = document.getElementById("coupon-row");
        var cg = document.getElementById("coupon-toggle");
        var cs = document.getElementById("coupon-status");
        if (ci) { ci.value = ""; ci.style.display = "none"; }
        if (ct) { ct.style.display = "block"; }
        if (cr) { cr.style.display = "none"; }
        if (cg) { cg.style.display = "block"; }
        if (cs) { cs.textContent = ""; cs.className = "coupon-status"; }
      }

      function initStripe() {
        paymentStatus.textContent = "loading...";
        paymentStatus.className = "payment-status";

        fetch("/web-tools/services/stripe-config", {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (_) {
            if (!_.ok || !_.data.publishableKey) {
              stripeInitFailed = true;
              paymentStatus.textContent = "";
              return;
            }
            stripeInstance = Stripe(_.data.publishableKey);
            var elements = stripeInstance.elements();
            cardElement = elements.create("card", {
              style: {
                base: {
                  fontSize: "16px",
                  color: "#333",
                  fontFamily: "system-ui, -apple-system, sans-serif",
                  "::placeholder": { color: "#bbb" },
                },
                invalid: { color: "#c44" },
              },
            });
            cardElement.mount("#card-element");
            document.getElementById("card-element").classList.remove("card-hidden");
            stripeReady = true;
            paymentStatus.textContent = "";
          })
          .catch(function () {
            stripeInitFailed = true;
            paymentStatus.textContent = "";
          });
      }

      // Package selection
      var customAmountInput = document.getElementById("custom-amount");
      var customToggle = document.getElementById("custom-toggle");

      function selectAmount(cents) {
        selectedAmountCents = cents;
        stripeForm.style.display = "block";
        payBtn.disabled = false;
        payBtn.textContent = "pay $" + (cents / 100);
        paymentStatus.textContent = "";
        paymentStatus.className = "payment-status";
      }

      var couponToggle = document.getElementById("coupon-toggle");
      var couponRow = document.getElementById("coupon-row");
      var couponInput = document.getElementById("coupon-input");
      var couponBtn = document.getElementById("coupon-btn");
      var couponStatus = document.getElementById("coupon-status");

      function hideCoupon() {
        couponToggle.style.display = "block";
        couponRow.style.display = "none";
        couponInput.value = "";
        couponStatus.textContent = "";
        couponStatus.className = "coupon-status";
      }

      function hideCustom() {
        customToggle.style.display = "block";
        customAmountInput.style.display = "none";
        customAmountInput.value = "";
      }

      packageButtons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          packageButtons.forEach(function (b) { b.classList.remove("selected"); });
          btn.classList.add("selected");
          hideCustom();
          hideCoupon();
          selectAmount(parseInt(btn.getAttribute("data-cents"), 10));
        });
      });

      customToggle.addEventListener("click", function () {
        packageButtons.forEach(function (b) { b.classList.remove("selected"); });
        customToggle.style.display = "none";
        customAmountInput.style.display = "block";
        customAmountInput.focus();
        hideCoupon();
        selectedAmountCents = 0;
        stripeForm.style.display = "none";
        payBtn.disabled = true;
        payBtn.textContent = "pay";
      });

      couponToggle.addEventListener("click", function () {
        packageButtons.forEach(function (b) { b.classList.remove("selected"); });
        couponToggle.style.display = "none";
        couponRow.style.display = "flex";
        couponInput.focus();
        hideCustom();
        selectedAmountCents = 0;
        stripeForm.style.display = "none";
        payBtn.disabled = true;
        payBtn.textContent = "pay";
      });

      couponBtn.addEventListener("click", function () {
        var code = couponInput.value.trim();
        if (!code) return;
        couponBtn.disabled = true;
        couponBtn.textContent = "...";
        couponStatus.textContent = "";
        couponStatus.className = "coupon-status";

        fetch("/web-tools/services/redeem-coupon", {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ code: code }),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (_) {
            couponBtn.disabled = false;
            couponBtn.textContent = "redeem";
            if (!_.ok) {
              couponStatus.textContent = _.data.error || "invalid code";
              couponStatus.className = "coupon-status status-error";
              return;
            }
            couponStatus.textContent = "power added!";
            couponStatus.className = "coupon-status status-ok";
            // Refresh credits
            fetch("/web-tools/services/api", { headers: authHeaders() })
              .then(function (r) { return r.json(); })
              .then(function (d) { renderCredits(d.credits); });
            setTimeout(function () { showLandingScreen(); }, 1500);
          })
          .catch(function () {
            couponBtn.disabled = false;
            couponBtn.textContent = "redeem";
            couponStatus.textContent = "failed";
            couponStatus.className = "coupon-status status-error";
          });
      });

      customAmountInput.addEventListener("input", function () {
        var val = parseFloat(customAmountInput.value);
        if (val >= 1) {
          selectAmount(Math.round(val * 100));
        } else {
          selectedAmountCents = 0;
          payBtn.disabled = true;
          payBtn.textContent = "pay";
        }
      });

      // Pay button
      payBtn.addEventListener("click", function () {
        if (!selectedAmountCents) return;
        if (!stripeInstance || !cardElement) {
          paymentStatus.textContent = "payments not available yet";
          paymentStatus.className = "payment-status status-error";
          return;
        }
        payBtn.disabled = true;
        payBtn.textContent = "processing...";
        paymentStatus.textContent = "";
        paymentStatus.className = "payment-status";

        fetch("/web-tools/services/create-payment", {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ amountCents: selectedAmountCents }),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (_) {
            if (!_.ok || !_.data.clientSecret) {
              paymentStatus.textContent = _.data.error || "failed to create payment";
              paymentStatus.className = "payment-status status-error";
              payBtn.disabled = false;
              payBtn.textContent = "pay $" + (selectedAmountCents / 100);
              return;
            }
            return stripeInstance.confirmCardPayment(_.data.clientSecret, {
              payment_method: { card: cardElement },
            });
          })
          .then(function (result) {
            if (!result) return;
            if (result.error) {
              paymentStatus.textContent = result.error.message || "payment failed";
              paymentStatus.className = "payment-status status-error";
              payBtn.disabled = false;
              payBtn.textContent = "pay $" + (selectedAmountCents / 100);
              return;
            }
            if (result.paymentIntent && result.paymentIntent.status === "succeeded") {
              paymentStatus.textContent = "payment successful — updating power...";
              paymentStatus.className = "payment-status status-ok";
              payBtn.textContent = "paid";
              pollBalance(5);
            }
          })
          .catch(function () {
            paymentStatus.textContent = "payment failed";
            paymentStatus.className = "payment-status status-error";
            payBtn.disabled = false;
            payBtn.textContent = "pay $" + (selectedAmountCents / 100);
          });
      });

      // Poll for updated balance after payment
      function pollBalance(attemptsLeft) {
        if (attemptsLeft <= 0) {
          paymentStatus.textContent = "payment received — power updating shortly";
          paymentStatus.className = "payment-status status-ok";
          setTimeout(function () { showLandingScreen(); }, 2000);
          return;
        }
        setTimeout(function () {
          fetch("/web-tools/services/api", { headers: authHeaders() })
            .then(function (r) { return r.json(); })
            .then(function (d) {
              renderCredits(d.credits);
              if (attemptsLeft > 1) {
                pollBalance(attemptsLeft - 1);
              } else {
                paymentStatus.textContent = "power updated";
                paymentStatus.className = "payment-status status-ok";
                setTimeout(function () { showLandingScreen(); }, 1500);
              }
            })
            .catch(function () {
              pollBalance(attemptsLeft - 1);
            });
        }, 2000);
      }

      // --- Load initial data ---
      fetch("/web-tools/services/api", { headers: authHeaders() })
        .then(function (r) {
          return r.json().then(function (d) { return { ok: r.ok, data: d }; });
        })
        .then(function (_) {
          if (!_.ok) {
            showError(_.data.error || "Failed to load services");
            showValue(emailValue, null);
            showValue(phoneValue, null);
            showValue(creditsValue, null);
            return;
          }
          var d = _.data;

          if (d.instanceId) {
            svcInstance.style.display = "flex";
            instanceValue.textContent = d.instanceId;
            instanceValue.className = "service-value";
            copyInstance.style.display = "block";
            copyInstance.onclick = function () { copyToClipboard(d.instanceId, copyInstance); };
          }

          showValue(emailValue, d.email);
          if (d.email) {
            copyEmail.style.display = "block";
            copyEmail.onclick = function () { copyToClipboard(d.email, copyEmail); };
          }

          showValue(phoneValue, d.phone);
          if (d.phone) {
            copyPhone.style.display = "block";
            copyPhone.onclick = function () { copyToClipboard(d.phone, copyPhone); };
          }

          renderCredits(d.credits);

          // Production: coupon-only mode (no Stripe card payments)
          if (d.xmtpEnv === "production") {
            var pkgBtns = document.getElementById("package-buttons");
            var custToggle = document.getElementById("custom-toggle");
            var stripeFormEl = document.getElementById("stripe-form");
            if (pkgBtns) pkgBtns.style.display = "none";
            if (custToggle) custToggle.style.display = "none";
            if (stripeFormEl) stripeFormEl.style.display = "none";
            // Auto-show coupon row
            var couponToggleEl = document.getElementById("coupon-toggle");
            var couponRowEl = document.getElementById("coupon-row");
            if (couponToggleEl) couponToggleEl.style.display = "none";
            if (couponRowEl) couponRowEl.style.display = "flex";
          }
        })
        .catch(function () {
          showError("failed to connect");
          showValue(emailValue, null);
          showValue(phoneValue, null);
          showValue(creditsValue, null);
        });

    })();
  </script>
</body>
</html>

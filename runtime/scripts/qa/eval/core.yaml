# runtime/scripts/qa/eval/core.yaml
# Core eval: XMTP conversation behavior, runtime awareness, self-destruct.
# Runs first — does the identity reset and acts as the health gate.

description: "OpenClaw Core Eval"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent sends welcome message after joining"
    vars:
      prompt: "(waiting for welcome message)"
      waitForWelcome: true
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The AGENT should have
          sent a welcome/greeting message introducing itself and its capabilities.
          Pass if the transcript contains such a welcome message from the AGENT.

  - description: "Agent can update profile name"
    vars:
      prompt: "Update your profile name to 'QA Bot Alpha'. Confirm when done."
      expectedName: "QA Bot Alpha"
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER asked the agent
          to update its profile name to 'QA Bot Alpha'. Pass if the AGENT's response
          indicates the profile name was successfully updated.
      - type: javascript
        value: "file://assertions.mjs:profileNameEquals"

  - description: "Agent can update profile photo"
    vars:
      prompt: "Update your profile photo to https://avatars.githubusercontent.com/u/82580170. Confirm when done."
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER asked the agent
          to update its profile photo to a GitHub avatar URL. Pass if the AGENT's
          response indicates the profile photo was successfully updated.
      - type: javascript
        value: "file://assertions.mjs:profileImageSet"

  - description: "Agent can recognize image content"
    vars:
      prompt: "What do you see in that image? Describe it briefly."
      attachment: "./test-image.png"
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER sent an image
          of colorful dice and asked what the agent sees. Pass if the AGENT described
          visual content from the image (e.g. dice, colors), not a refusal.

  - description: "Agent can tell the time"
    vars:
      prompt: "What time is it right now?"
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER asked for the
          current time. Pass if the AGENT's most recent response to this question
          contains a specific time in hours and minutes.

  - description: "Agent can see group members"
    vars:
      prompt: "Who is in this conversation? List the participants."
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER asked who is
          in the conversation. Pass if the AGENT's most recent response lists
          participants, identities, or members of the conversation.

  # --- Runtime & upgrade awareness ---

  - description: "Agent can report its runtime version"
    vars:
      prompt: "What version of the runtime are you running? Reply with the version."
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER asked for the
          runtime version. Pass if the AGENT's response includes a specific version
          string or number. Fail if the agent said it doesn't know or gave a generic
          answer without a version.

  - description: "Agent understands 'upgrade yourself' means runtime upgrade"
    vars:
      prompt: "If I asked you to upgrade yourself, what would you do? Just explain, don't actually do it."
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER asked the agent
          to explain what it would do if asked to upgrade itself. Pass if the AGENT
          described a runtime/convos upgrade process (e.g. redeploy, Railway, runtime
          image). Fail if the agent confused it with npm update, dependency updates,
          or package management.

  - description: "Agent understands 'upgrade your runtime' correctly"
    vars:
      prompt: "If I asked you to upgrade your runtime, what would that involve? Just explain, don't actually do it."
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER asked the agent
          to explain what a runtime upgrade involves. Pass if the AGENT described a
          convos runtime upgrade process (e.g. redeploy, Railway, new image). Fail
          if the agent confused it with something else.

  - description: "Agent handles vague 'can you update' as runtime upgrade"
    vars:
      prompt: "If I asked you to update, what would you do? Just explain, don't actually do it."
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER asked the agent
          to explain what it would do if asked to update. Pass if the AGENT interpreted
          this as a runtime upgrade (e.g. redeploy, Railway, runtime image). Fail if
          the agent confused it with npm update, dependency updates, or package
          management.

  # --- Self-destruct (must be last — removes agent from group) ---

  - description: "Agent self-destructs when removed from group"
    vars:
      prompt: "(self-destruct trigger)"
      selfDestruct: true
    assert:
      - type: javascript
        value: "file://assertions.mjs:agentSelfDestructed"

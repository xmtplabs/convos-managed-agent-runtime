# runtime/scripts/qa/eval/core.yaml
# Core eval: XMTP conversation behavior, runtime awareness.
# Runs in parallel with services after init.

description: "OpenClaw Core Eval"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  - description: "Agent can update profile name"
    vars:
      prompt: "Update your profile name to 'QA Bot Alpha'. Confirm when done."
      expectedName: "QA Bot Alpha"
    assert:
      - type: icontains
        value: "QA Bot Alpha"
      - type: javascript
        value: "file://assertions.mjs:profileNameEquals"

  - description: "Agent can update profile photo"
    vars:
      prompt: "Update your profile photo to https://avatars.githubusercontent.com/u/82580170. Confirm when done."
    assert:
      - type: icontains-any
        value:
          - "updated"
          - "done"
          - "photo"
          - "profile"
      - type: javascript
        value: "file://assertions.mjs:profileImageSet"

  - description: "Agent can recognize image content"
    vars:
      prompt: "What do you see in that image? Describe it briefly."
      attachment: "./test-image.png"
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER sent an image
          of colorful dice and asked what the agent sees. Pass if the AGENT described
          visual content from the image (e.g. dice, colors), not a refusal.

  - description: "Agent can tell the time"
    vars:
      prompt: "What time is it right now?"
    assert:
      - type: regex
        value: "\\d{1,2}[:.:]\\d{2}"

  - description: "Agent can see group members"
    vars:
      prompt: "Who is in this conversation? List the participants."
    assert:
      - type: icontains-any
        value:
          - "QA Bot Alpha"
          - "participant"
          - "member"
          - "inbox"

  # --- Runtime & upgrade awareness ---

  - description: "Agent can report its runtime version"
    vars:
      prompt: "What version of the runtime are you running? Reply with the version."
    assert:
      - type: regex
        value: "\\d+\\.\\d+\\.\\d+"

  - description: "Agent understands 'upgrade yourself' means runtime upgrade"
    vars:
      prompt: "If I asked you to upgrade yourself, what would you do? Just explain, don't actually do it."
    assert:
      - type: llm-rubric
        value: >
          This is a chat transcript between USER and AGENT. The USER asked the agent
          to explain what it would do if asked to upgrade itself. Pass if the AGENT
          described a runtime/convos upgrade process (e.g. redeploy, Railway, runtime
          image). Fail if the agent confused it with npm update, dependency updates,
          or package management.

  - description: "Agent understands 'upgrade your runtime' correctly"
    vars:
      prompt: "If I asked you to upgrade your runtime, what would that involve? Just explain, don't actually do it."
    assert:
      - type: icontains-any
        value:
          - "redeploy"
          - "Railway"
          - "runtime"
          - "image"
          - "pool"
      - type: not-icontains-any
        value:
          - "npm update"
          - "npm install"
          - "package.json"

  - description: "Agent handles vague 'can you update' as runtime upgrade"
    vars:
      prompt: "If I asked you to update, what would you do? Just explain, don't actually do it."
    assert:
      - type: icontains-any
        value:
          - "redeploy"
          - "Railway"
          - "runtime"
          - "upgrade"
          - "pool"
      - type: not-icontains-any
        value:
          - "npm update"
          - "npm install"
          - "package.json"


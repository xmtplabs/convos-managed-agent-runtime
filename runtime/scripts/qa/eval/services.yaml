# runtime/scripts/qa/eval/services.yaml
# Services eval: email, SMS, payments, browser, search, knowledge.
# Runs in parallel with core after init.

description: "OpenClaw Services Eval"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://provider.mjs

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-sonnet-4
      config:
        apiKey: "{{ env.EVAL_OPENROUTER_API_KEY }}"

tests:
  # --- Email & SMS ---

  - description: "Agent can send an email"
    vars:
      prompt: "Send a short email to fabri@xmtp.com with subject 'QA Eval Test'. Reply: Email sent."
    assert:
      - type: icontains-any
        value:
          - "sent"
          - "delivered"
          - "email"

  - description: "Agent can poll received emails"
    vars:
      prompt: "Check my latest received email. Reply with: From: <sender>, Subject: <subject>, Body: <preview>."
    assert:
      - type: icontains-any
        value:
          - "from"
          - "subject"
          - "body"
          - "@"

  - description: "Agent can send an SMS"
    vars:
      prompt: "Send a short SMS to +16154376139 saying 'QA eval test'. Reply: SMS sent."
    assert:
      - type: icontains-any
        value:
          - "sent"
          - "queued"
          - "sms"
          - "delivered"

  - description: "Agent can poll received SMS"
    vars:
      prompt: "Check my latest received SMS. Reply with: From: <number>, Text: <message>."
    assert:
      - type: icontains-any
        value:
          - "from"
          - "text"
          - "+"

  - description: "Agent can check USDC balance"
    vars:
      prompt: "Check my USDC balance. Reply: USDC: <amount>."
    assert:
      - type: regex
        value: "\\d+\\.?\\d*"
      - type: icontains-any
        value:
          - "USDC"
          - "balance"

  # --- Browser & search ---

  - description: "Agent can browse a webpage"
    vars:
      prompt: "Browse https://example.com and tell me what the page says."
    assert:
      - type: icontains-any
        value:
          - "Example Domain"
          - "example"
          - "illustrative"

  - description: "Agent can search the web"
    vars:
      prompt: "Search the current BTC price. Reply: BTC: $<price>."
    assert:
      - type: regex
        value: "\\$[\\d,]+\\.?\\d*"

  # --- Knowledge & services awareness ---

  - description: "Agent knows its services page URL"
    vars:
      prompt: "What's your services page URL?"
    assert:
      - type: regex
        value: "https?://"

  - description: "Agent knows how to top up credits"
    vars:
      prompt: "How do I top up my credits?"
    assert:
      - type: icontains-any
        value:
          - "http"
          - "credit"
          - "top up"
          - "payment"
          - "add"

  - description: "Agent knows where to check card balance"
    vars:
      prompt: "Where can I see my card balance?"
    assert:
      - type: icontains-any
        value:
          - "http"
          - "balance"
          - "card"
          - "services"

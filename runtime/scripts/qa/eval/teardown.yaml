# runtime/scripts/qa/eval/teardown.yaml
# Teardown phase: self-destruct test. Must run last after all other suites.

description: "OpenClaw Eval — Teardown"

evaluateOptions:
  maxConcurrency: 1

providers:
  - file://provider.mjs

tests:
  - description: "Agent self-destructs when removed from group"
    vars:
      prompt: "(self-destruct trigger)"
      selfDestruct: true
    assert:
      - type: javascript
        value: "file://assertions.mjs:agentSelfDestructed"

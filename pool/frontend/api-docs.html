<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#ffffff" />
  <title>API Docs — Convos Pool</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!--__POOL_CONFIG__-->
  <link rel="stylesheet" href="/admin/assets/admin.css">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    /* Undo admin.css global reset inside Swagger — let swagger-ui.css own its styles */
    .swagger-ui * { margin: revert; padding: revert; box-sizing: revert; }
    .swagger-ui table { width: revert; border-collapse: revert; table-layout: revert; }
    .swagger-ui th, .swagger-ui td { text-align: revert; font-size: revert; font-weight: revert; text-transform: revert; letter-spacing: revert; color: revert; padding: revert; border-bottom: revert; vertical-align: revert; overflow: revert; text-overflow: revert; white-space: revert; background: revert; }
    .swagger-ui tr:last-child td { border-bottom: revert; }
    /* Hide Swagger's own topbar and info block — we use the admin header + hero card */
    .swagger-ui .topbar { display: none; }
    .swagger-ui .information-container { display: none; }
    .swagger-ui .scheme-container { position: absolute; left: -9999px; opacity: 0; pointer-events: none; height: 0; overflow: hidden; }
    /* Constrain Swagger to content width */
    .swagger-wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
    .swagger-ui .wrapper { padding: 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="28">
            <path d="M27.7736 13.8868C27.7736 21.5563 21.5563 27.7736 13.8868 27.7736C6.21733 27.7736 0 21.5563 0 13.8868C0 6.21733 6.21733 0 13.8868 0C21.5563 0 27.7736 6.21733 27.7736 13.8868Z" fill="var(--color-brand)"/>
            <path d="M13.8868 27.7736L18.0699 35.0189H9.70373L13.8868 27.7736Z" fill="var(--color-brand)"/>
          </svg>
        </div>
        <span class="brand-name">Convos <span class="brand-name-labs">Pool</span></span>
      </div>
      <div class="env-switcher" onclick="this.classList.toggle('open')">
        <button class="env-switcher-btn" id="env-switcher-btn"></button>
        <div class="env-dropdown" id="env-dropdown"></div>
      </div>
    </div>
    <div class="header-right">
      <nav class="top-nav">
        <a href="/admin" class="nav-link">Dashboard</a>
        <a href="/admin/upgrades" class="nav-link">Upgrades</a>
        <a href="/admin/api-docs" class="nav-link active">API</a>
        <a id="railway-link" href="#" target="_blank" rel="noopener" class="nav-link" style="display:none">Railway <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v10h10v-3"/><path d="M9 2h5v5"/><path d="M14 2L7 9"/></svg></a>
        <div class="nav-sep"></div>
        <form method="POST" action="/admin/logout" style="display:contents">
          <button class="logout-btn" type="submit">Logout</button>
        </form>
      </nav>
    </div>
  </div>

  <div class="content">
    <div class="upgrade-hero-card" style="margin-bottom:0">
      <div class="upgrade-hero-body" style="width:100%">
        <div class="upgrade-hero-top">
          <div class="upgrade-hero-title">
            <span class="upgrade-hero-heading">API Reference</span>
            <span class="upgrade-hero-meta">OpenAPI 3.0 &middot; <a href="/admin/assets/openapi.json" target="_blank" rel="noopener" class="upgrade-changelog-link">openapi.json</a></span>
          </div>
          <div class="upgrade-hero-stats" id="api-stats"></div>
        </div>
        <div style="font-size:12px;color:var(--color-foreground-secondary);margin-top:4px">Pool manager API for provisioning, managing, and monitoring Convos agent instances.</div>
        <div class="upgrade-hero-actions" id="api-hero-actions" style="margin-top:12px"></div>
      </div>
    </div>
  </div>
  <div class="swagger-wrap">
    <div id="swagger-ui"></div>
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    var C = window.__POOL_CONFIG__ || {};

    document.title = 'API Docs \u2014 ' + (C.poolEnvironment || '');

    // Env switcher (same as admin.html)
    (function () {
      var env = C.poolEnvironment || '';
      var btn = document.getElementById('env-switcher-btn');
      btn.className = 'env-switcher-btn env-' + env;
      btn.textContent = env;

      var dropdown = document.getElementById('env-dropdown');
      var urls = C.adminUrls || [];
      var h = '';
      if (urls.length) {
        urls.forEach(function (e) {
          var isCurrent = e.env === env;
          var href = isCurrent ? '#' : (e.url + '/admin/api-docs');
          h += '<a href="' + href + '" class="' + (isCurrent ? 'current' : '') + '"><span class="env-dot ' + e.env + '"></span>' + e.env + '</a>';
        });
      }
      dropdown.innerHTML = h;

      document.addEventListener('click', function (e) {
        var switcher = document.querySelector('.env-switcher');
        if (switcher && !switcher.contains(e.target)) switcher.classList.remove('open');
      });
    })();

    // Railway project deeplink
    if (C.railwayProjectId) {
      var rl = document.getElementById('railway-link');
      rl.href = 'https://railway.com/project/' + C.railwayProjectId + (C.railwayEnvironmentId ? '?environmentId=' + C.railwayEnvironmentId : '');
      rl.style.display = '';
    }

    SwaggerUIBundle({
      url: "/admin/assets/openapi.json",
      dom_id: "#swagger-ui",
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout: "BaseLayout",
      defaultModelsExpandDepth: -1,
      docExpansion: "list",
    });

    // Populate API stats + hero actions from the spec
    fetch('/admin/assets/openapi.json').then(function (r) { return r.json(); }).then(function (spec) {
      var paths = spec.paths || {};
      var endpoints = 0;
      var tags = new Set();
      Object.keys(paths).forEach(function (p) {
        Object.keys(paths[p]).forEach(function (method) {
          endpoints++;
          var t = paths[p][method].tags || [];
          t.forEach(function (tag) { tags.add(tag); });
        });
      });
      var statsEl = document.getElementById('api-stats');
      if (statsEl) {
        statsEl.innerHTML = '<div class="upgrade-stat"><strong>' + endpoints + '</strong> endpoints</div>'
          + '<div class="upgrade-stat"><strong>' + tags.size + '</strong> tags</div>';
      }

      // Build server selector + authorize button in hero card
      var actionsEl = document.getElementById('api-hero-actions');
      if (!actionsEl) return;

      var servers = spec.servers || [];
      var schemes = (spec.components && spec.components.securitySchemes) || {};
      var schemeNames = Object.keys(schemes);

      var h = '';

      // Server selector
      if (servers.length > 0) {
        h += '<select id="api-server-select" class="upgrade-image-select" style="min-width:180px">';
        servers.forEach(function (s, i) {
          var label = s.url + (s.description ? ' — ' + s.description : '');
          h += '<option value="' + i + '">' + label + '</option>';
        });
        h += '</select>';
      }

      // Authorize button — triggers Swagger's built-in auth modal
      if (schemeNames.length > 0) {
        h += '<button class="btn btn-upgrade" id="btn-api-authorize" style="border-color:var(--color-brand);color:var(--color-brand);font-weight:600">'
          + '<svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><rect x="5" y="9" width="10" height="8" rx="1.5"/><path d="M7 9V6a3 3 0 0 1 6 0v3"/></svg>'
          + 'Authorize</button>';
      }

      actionsEl.innerHTML = h;

      // Wire authorize button → click Swagger's hidden authorize btn
      var authBtn = document.getElementById('btn-api-authorize');
      if (authBtn) {
        authBtn.addEventListener('click', function () {
          // Swagger renders .btn.authorize async — poll briefly if not yet available
          function tryClick(attempts) {
            var swaggerAuth = document.querySelector('.swagger-ui .auth-wrapper .authorize');
            if (swaggerAuth) {
              swaggerAuth.click();
            } else if (attempts > 0) {
              setTimeout(function () { tryClick(attempts - 1); }, 200);
            }
          }
          tryClick(10);
        });
      }

      // Wire server selector → update Swagger's server
      var serverSel = document.getElementById('api-server-select');
      if (serverSel) {
        serverSel.addEventListener('change', function () {
          // Swagger's scheme-container has a select — update it to match
          var swaggerSel = document.querySelector('.swagger-ui .scheme-container select');
          if (swaggerSel) {
            swaggerSel.value = servers[this.value].url;
            swaggerSel.dispatchEvent(new Event('change', { bubbles: true }));
          }
        });
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#ffffff" />
  <title>API Docs — Convos Pool</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!--__POOL_CONFIG__-->
  <link rel="stylesheet" href="/admin/assets/admin.css">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.32.1/swagger-ui.css" integrity="sha384-F7uqyyVZgBbuOv+8gNy6ZGJB8Rf12CczPWm130Pxrau0cyZlj1Dl18cDOWpQSrGh" crossorigin="anonymous" />
  <style>
    /* Undo admin.css global reset inside Swagger — let swagger-ui.css own its styles */
    .swagger-ui * { margin: revert; padding: revert; box-sizing: revert; }
    .swagger-ui table { width: revert; border-collapse: revert; table-layout: revert; }
    .swagger-ui th, .swagger-ui td { text-align: revert; font-size: revert; font-weight: revert; text-transform: revert; letter-spacing: revert; color: revert; padding: revert; border-bottom: revert; vertical-align: revert; overflow: revert; text-overflow: revert; white-space: revert; background: revert; }
    .swagger-ui tr:last-child td { border-bottom: revert; }
    /* Hide Swagger's own topbar and info block — we use the admin header */
    .swagger-ui .topbar { display: none; }
    .swagger-ui .scheme-container { background: transparent; box-shadow: none; border: none; }
    /* Constrain Swagger to content width */
    .swagger-wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
    .swagger-ui .wrapper { padding: 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="28">
            <path d="M27.7736 13.8868C27.7736 21.5563 21.5563 27.7736 13.8868 27.7736C6.21733 27.7736 0 21.5563 0 13.8868C0 6.21733 6.21733 0 13.8868 0C21.5563 0 27.7736 6.21733 27.7736 13.8868Z" fill="var(--color-brand)"/>
            <path d="M13.8868 27.7736L18.0699 35.0189H9.70373L13.8868 27.7736Z" fill="var(--color-brand)"/>
          </svg>
        </div>
        <span class="brand-name">Convos <span class="brand-name-labs">Pool</span></span>
      </div>
      <div class="env-switcher" onclick="this.classList.toggle('open')">
        <button class="env-switcher-btn" id="env-switcher-btn"></button>
        <div class="env-dropdown" id="env-dropdown"></div>
      </div>
    </div>
    <div class="header-right">
      <button class="hamburger-btn" id="hamburger-btn" onclick="document.getElementById('mobile-menu').classList.toggle('open')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <nav class="top-nav" id="mobile-menu">
        <a href="/admin" class="nav-link">Dashboard</a>
        <a href="/admin/upgrades" class="nav-link">Upgrades</a>
        <a href="/admin/api-docs" class="nav-link active">API</a>
        <a href="/admin/skills" class="nav-link">Skills</a>
        <a id="railway-link" href="#" target="_blank" rel="noopener" class="nav-link" style="display:none">Railway <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v10h10v-3"/><path d="M9 2h5v5"/><path d="M14 2L7 9"/></svg></a>
        <a id="playroom-link" href="#" target="_blank" rel="noopener" class="nav-link" style="display:none">Playroom <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v10h10v-3"/><path d="M9 2h5v5"/><path d="M14 2L7 9"/></svg></a>
        <div class="nav-sep"></div>
        <form method="POST" action="/admin/logout" style="display:contents">
          <button class="logout-btn" type="submit">Logout</button>
        </form>
      </nav>
    </div>
  </div>

  <div class="swagger-wrap">
    <div id="swagger-ui"></div>
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5.32.1/swagger-ui-bundle.js" integrity="sha384-SlhRXPBpOIwNajIYH/STl3rsa6P/qCR82bZVQk1pDmWr/+Mh9g/RhaUJ1JBmM99R" crossorigin="anonymous"></script>
  <script>
    var C = window.__POOL_CONFIG__ || {};

    document.title = 'API Docs \u2014 ' + (C.poolEnvironment || '');

    // Env switcher (same as admin.html)
    (function () {
      var env = C.poolEnvironment || '';
      var btn = document.getElementById('env-switcher-btn');
      btn.className = 'env-switcher-btn env-' + env;
      btn.textContent = env;

      var dropdown = document.getElementById('env-dropdown');
      var urls = C.adminUrls || [];
      var h = '';
      if (urls.length) {
        urls.forEach(function (e) {
          var isCurrent = e.env === env;
          var href = isCurrent ? '#' : (e.url + '/admin/api-docs');
          h += '<a href="' + href + '" class="' + (isCurrent ? 'current' : '') + '"><span class="env-dot ' + e.env + '"></span>' + e.env + '</a>';
        });
      }
      dropdown.innerHTML = h;

      document.addEventListener('click', function (e) {
        var switcher = document.querySelector('.env-switcher');
        if (switcher && !switcher.contains(e.target)) switcher.classList.remove('open');
      });
    })();

    // Railway project deeplink
    if (C.railwayProjectId) {
      var rl = document.getElementById('railway-link');
      rl.href = 'https://railway.com/project/' + C.railwayProjectId + (C.railwayEnvironmentId ? '?environmentId=' + C.railwayEnvironmentId : '');
      rl.style.display = '';
    }

    SwaggerUIBundle({
      url: "/admin/assets/openapi.json",
      dom_id: "#swagger-ui",
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout: "BaseLayout",
      defaultModelsExpandDepth: -1,
      docExpansion: "list",
    });
  </script>
</body>
</html>

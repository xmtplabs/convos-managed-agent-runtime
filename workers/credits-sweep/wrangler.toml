name = "credits-sweep"
main = "src/index.ts"
compatibility_date = "2025-03-17"

# --- Per-environment config ---
# Deploy with: wrangler deploy --env dev|staging|production
# Secrets per env: wrangler secret put POSTHOG_API_KEY --env dev
#
# Setup for each environment:
#   1. wrangler kv namespace create STATS_CREDITS --env <env>
#   2. Create read-only Postgres role on that env's DB
#   3. wrangler hyperdrive create pool-db-<env> --connection-string="..."
#   4. Fill in the IDs below
#   5. wrangler secret put POSTHOG_API_KEY --env <env>
#   6. wrangler secret put OPENROUTER_MANAGEMENT_KEY --env <env>

[env.dev]
name = "credits-sweep-dev"
[env.dev.triggers]
crons = ["*/15 * * * *"]
[[env.dev.kv_namespaces]]
binding = "STATS_CREDITS"
id = "PLACEHOLDER_DEV_KV_ID"
[[env.dev.hyperdrive]]
binding = "POOL_DB"
id = "PLACEHOLDER_DEV_HYPERDRIVE_ID"

[env.staging]
name = "credits-sweep-staging"
[env.staging.triggers]
crons = ["*/15 * * * *"]
[[env.staging.kv_namespaces]]
binding = "STATS_CREDITS"
id = "PLACEHOLDER_STAGING_KV_ID"
[[env.staging.hyperdrive]]
binding = "POOL_DB"
id = "PLACEHOLDER_STAGING_HYPERDRIVE_ID"

[env.production]
name = "credits-sweep-production"
[env.production.triggers]
crons = ["*/15 * * * *"]
[[env.production.kv_namespaces]]
binding = "STATS_CREDITS"
id = "PLACEHOLDER_PRODUCTION_KV_ID"
[[env.production.hyperdrive]]
binding = "POOL_DB"
id = "PLACEHOLDER_PRODUCTION_HYPERDRIVE_ID"
